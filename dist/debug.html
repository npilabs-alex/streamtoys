<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Debug Test</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #07070f; color: #fff; font-family: sans-serif; }

#game-area {
  width: 100%; height: 100vh;
  display: flex; align-items: center; justify-content: center;
  background: linear-gradient(#1a1a2e, #0f0f1a);
}

#overlay {
  position: fixed; inset: 0;
  background: rgba(10,5,20,0.95);
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 500;
}
#overlay.show { display: flex; }

#overlay h1 {
  font-size: 32px;
  color: #00e5ff;
  margin-bottom: 20px;
}

#start-btn {
  padding: 20px 50px;
  font-size: 18px;
  background: #ff2d6e;
  color: white;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
#start-btn:active {
  background: #00e5ff;
  transform: scale(0.95);
}

#status {
  margin-top: 20px;
  font-size: 14px;
  color: #888;
}
</style>
</head>
<body>

<div id="game-area">
  <h1>GAME IS RUNNING</h1>
</div>

<div id="overlay" class="show">
  <h1>SONGSUGAR</h1>
  <button id="start-btn">START SESSION</button>
  <div id="status">Waiting for click...</div>
</div>

<script>
console.log('Script starting...');

var btn = document.getElementById('start-btn');
var overlay = document.getElementById('overlay');
var status = document.getElementById('status');

if (!btn) {
  alert('Button not found!');
} else {
  console.log('Button found, adding listeners...');
  
  // Click handler
  btn.addEventListener('click', function(e) {
    console.log('CLICK detected');
    status.textContent = 'Click detected!';
    setTimeout(function() {
      overlay.classList.remove('show');
    }, 500);
  });
  
  // Touch handler for mobile
  btn.addEventListener('touchstart', function(e) {
    console.log('TOUCHSTART detected');
    status.textContent = 'Touch detected!';
    e.preventDefault();
  });
  
  btn.addEventListener('touchend', function(e) {
    console.log('TOUCHEND detected');
    status.textContent = 'Touch end - hiding overlay...';
    e.preventDefault();
    setTimeout(function() {
      overlay.classList.remove('show');
    }, 500);
  });
  
  status.textContent = 'Listeners attached. Tap the button!';
}

console.log('Script complete');
</script>
</body>
</html>
