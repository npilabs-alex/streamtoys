function renderSettings() {
  const p = P(), bg = new PIXI.Graphics();
  bg.beginFill(0, 0.9); bg.drawRect(0, 0, W, H); bg.endFill(); bg.interactive = true;
  layers.overlay.addChild(bg);

  // Responsive panel - scales with screen but has limits
  const maxW = 450, maxH = 380;
  const panelW = Math.min(maxW, W * 0.85);
  const panelH = Math.min(maxH, H * 0.55);
  const panelX = (W - panelW) / 2;
  const panelY = (H - panelH) / 2;

  // Scale factor for content
  const sc = Math.min(panelW / 300, panelH / 280);

  const panel = new PIXI.Graphics();
  panel.beginFill(p.grid); panel.lineStyle(2, p.vibe, 0.6);
  panel.drawRoundedRect(panelX, panelY, panelW, panelH, 12);
  panel.endFill();
  layers.overlay.addChild(panel);

  // Title
  const titleSize = Math.max(12, Math.round(16 * sc));
  const title = new PIXI.Text('SETTINGS', { fontFamily: FONT_GAME, fontSize: titleSize, fill: p.text });
  title.anchor.set(0.5); title.x = W / 2; title.y = panelY + 30 * sc;
  layers.overlay.addChild(title);

  const padX = Math.round(20 * sc);
  const contentW = panelW - padX * 2;
  const labelSize = Math.max(8, Math.round(10 * sc));

  // Volume section
  const volY = panelY + 65 * sc;
  const volLabel = new PIXI.Text('VOLUME', { fontFamily: FONT_GAME, fontSize: labelSize, fill: p.dim });
  volLabel.x = panelX + padX; volLabel.y = volY;
  layers.overlay.addChild(volLabel);

  // Volume slider
  const sliderY = volY + 28 * sc;
  const sliderH = Math.max(10, 14 * sc);
  const btnSize = Math.max(32, 38 * sc);
  const sliderW = contentW - btnSize * 2 - 30;
  const sliderX = panelX + padX;
  const currentVol = Audio.master ? Audio.master.gain.value : 0.7;

  const track = new PIXI.Graphics();
  track.beginFill(p.dim, 0.3); track.drawRoundedRect(sliderX, sliderY, sliderW, sliderH, 5); track.endFill();
  layers.overlay.addChild(track);

  const fill = new PIXI.Graphics();
  fill.beginFill(p.vibe); fill.drawRoundedRect(sliderX, sliderY, sliderW * currentVol, sliderH, 5); fill.endFill();
  layers.overlay.addChild(fill);

  // Volume buttons
  layers.overlay.addChild(makeButton('-', sliderX + sliderW + btnSize/2 + 8, sliderY + sliderH/2, () => {
    if (Audio.master) { Audio.master.gain.value = Math.max(0, Audio.master.gain.value - 0.1); G.dirty = true; }
  }, btnSize, btnSize, p.dim));
  layers.overlay.addChild(makeButton('+', sliderX + sliderW + btnSize * 1.5 + 16, sliderY + sliderH/2, () => {
    if (Audio.master) { Audio.master.gain.value = Math.min(1, Audio.master.gain.value + 0.1); G.dirty = true; }
  }, btnSize, btnSize, p.vibe));

  // Palette section
  const palY = sliderY + 55 * sc;
  const palLabel = new PIXI.Text('PALETTE', { fontFamily: FONT_GAME, fontSize: labelSize, fill: p.dim });
  palLabel.x = panelX + padX; palLabel.y = palY;
  layers.overlay.addChild(palLabel);

  // Palette buttons
  const palBtnY = palY + 30 * sc;
  const palBtnW = Math.floor((contentW - 15) / 2);
  const palBtnH = Math.max(40, 48 * sc);
  const dotSize = Math.max(5, 6 * sc);
  const dotSpacing = Math.max(14, 18 * sc);

  Object.keys(PALETTES).forEach((key, i) => {
    const pal = PALETTES[key];
    const isActive = currentPalette === key;
    const btnX = panelX + padX + i * (palBtnW + 15) + palBtnW / 2;

    const btn = new PIXI.Container();
    const btnBg = new PIXI.Graphics();
    btnBg.beginFill(isActive ? pal.beat : p.grid, isActive ? 0.5 : 0.6);
    btnBg.lineStyle(2, isActive ? pal.vibe : p.dim, isActive ? 1 : 0.3);
    btnBg.drawRoundedRect(-palBtnW/2, -palBtnH/2, palBtnW, palBtnH, 8);
    btnBg.endFill();
    btn.addChild(btnBg);

    // Color dots
    [pal.beat, pal.melody, pal.vibe].forEach((col, j) => {
      const dot = new PIXI.Graphics();
      dot.beginFill(col); dot.drawCircle((j - 1) * dotSpacing, -8 * sc, dotSize); dot.endFill();
      btn.addChild(dot);
    });

    const nameSize = Math.max(7, 9 * sc);
    const name = new PIXI.Text(pal.name, { fontFamily: FONT_GAME, fontSize: nameSize, fill: isActive ? p.text : p.dim });
    name.anchor.set(0.5); name.y = 10 * sc;
    btn.addChild(name);

    btn.x = btnX; btn.y = palBtnY + palBtnH/2;
    btn.interactive = true; btn.cursor = 'pointer';
    btn.on('pointerdown', () => { currentPalette = key; app.renderer.background.color = P().bg; G.dirty = true; });
    layers.overlay.addChild(btn);
  });

  // Bottom buttons
  const btnY = panelY + panelH - 35 * sc;
  const actionBtnW = Math.floor((contentW - 15) / 2);
  const actionBtnH = Math.max(36, 44 * sc);

  layers.overlay.addChild(makeButton('PAUSE', panelX + padX + actionBtnW/2, btnY, () => {
    G.screen = 'PAUSE'; G.dirty = true;
  }, actionBtnW, actionBtnH, p.beat));

  layers.overlay.addChild(makeButton('CLOSE', panelX + padX + actionBtnW + 15 + actionBtnW/2, btnY, () => {
    resumeGame();
  }, actionBtnW, actionBtnH, p.vibe));
}

function renderMix() {
  const p = P(), bg = new PIXI.Graphics();
  bg.beginFill(p.bg); bg.drawRect(0, 0, W, H); bg.endFill();
  layers.overlay.addChild(bg);

  const isMobile = W < 500;
  const pad = isMobile ? 10 : 20;
  const headerH = isMobile ? 40 : 50;
  const footerH = isMobile ? 45 : 55;

  // Title
  const title = new PIXI.Text('MIX', { fontFamily: FONT_GAME, fontSize: isMobile ? 14 : 20, fill: p.text });
  title.anchor.set(0.5); title.x = W/2; title.y = headerH / 2;
  layers.overlay.addChild(title);

  // Close button
  const closeBtnSize = isMobile ? 28 : 36;
  layers.overlay.addChild(makeButton('X', W - closeBtnSize/2 - 8, headerH/2, () => { G.screen = 'PLAY'; G.dirty = true; }, closeBtnSize, closeBtnSize - 6, p.dim));

  let curY = headerH + 8;
  const contentW = W - pad * 2;
  const labelSize = isMobile ? 7 : 10;
  const valueSize = isMobile ? 9 : 13;

  // === ACTIVE LOOPS SECTION ===
  const slotH = isMobile ? 26 : 34;
  const slotGap = isMobile ? 4 : 8;

  CATS.forEach((cat, i) => {
    const color = getColor(cat);
    const active = G.layers[cat];
    const x = pad + i * (contentW / 3);
    const w = contentW / 3 - slotGap;

    // Category label
    const lbl = new PIXI.Text(cat, { fontFamily: FONT_GAME, fontSize: labelSize, fill: color });
    lbl.x = x + w/2; lbl.y = curY; lbl.anchor.set(0.5);
    layers.overlay.addChild(lbl);

    // Active slot
    const slotY = curY + labelSize + 4;
    const slot = new PIXI.Graphics();
    if (active.length > 0) {
      slot.beginFill(color, 0.4); slot.lineStyle(1, color);
    } else {
      slot.lineStyle(1, p.dim, 0.3);
    }
    slot.drawRoundedRect(x, slotY, w, slotH, 4);
    slot.endFill();
    layers.overlay.addChild(slot);

    if (active.length > 0) {
      const names = active.map(l => l.name.split(' ')[0]).join(', ');
      const maxChars = Math.floor(w / (labelSize * 0.65));
      const display = names.length > maxChars ? names.substring(0, maxChars - 2) + '..' : names;
      const txt = new PIXI.Text(display, { fontFamily: FONT_GAME, fontSize: labelSize, fill: p.text });
      txt.anchor.set(0.5); txt.x = x + w/2; txt.y = slotY + slotH/2;
      layers.overlay.addChild(txt);
    } else {
      const empty = new PIXI.Text('---', { fontFamily: FONT_GAME, fontSize: labelSize - 1, fill: p.dim });
      empty.anchor.set(0.5); empty.x = x + w/2; empty.y = slotY + slotH/2;
      layers.overlay.addChild(empty);
    }
  });
  curY += labelSize + slotH + 16;

  // === CONTROLS SECTION ===
  const ctrlH = isMobile ? 28 : 36;
  const ctrlGap = isMobile ? 8 : 12;
  const sliderW = isMobile ? contentW * 0.5 : contentW * 0.45;
  const btnSize = isMobile ? 22 : 28;

  // Helper to draw a slider
  const drawSlider = (x, y, w, value, min, max, color, onChange) => {
    const g = new PIXI.Graphics();
    const trackH = 4;
    const knobR = isMobile ? 8 : 10;
    const norm = (value - min) / (max - min);
    const knobX = x + norm * w;

    // Track background
    g.beginFill(p.dim, 0.3); g.drawRoundedRect(x, y - trackH/2, w, trackH, 2); g.endFill();
    // Track fill
    g.beginFill(color, 0.7); g.drawRoundedRect(x, y - trackH/2, norm * w, trackH, 2); g.endFill();
    // Knob
    g.beginFill(color); g.drawCircle(knobX, y, knobR); g.endFill();
    g.beginFill(p.text); g.drawCircle(knobX, y, knobR - 3); g.endFill();

    g.interactive = true; g.cursor = 'pointer';
    g.hitArea = new PIXI.Rectangle(x - knobR, y - knobR - 5, w + knobR * 2, knobR * 2 + 10);

    const updateFromEvent = (e) => {
      const local = e.data.global.x;
      const newNorm = Math.max(0, Math.min(1, (local - x) / w));
      const newVal = min + newNorm * (max - min);
      onChange(newVal);
      G.dirty = true;
    };

    g.on('pointerdown', updateFromEvent);
    g.on('pointermove', (e) => { if (e.data.buttons) updateFromEvent(e); });
    layers.overlay.addChild(g);
  };

  // BPM Control
  const bpmLbl = new PIXI.Text('BPM', { fontFamily: FONT_GAME, fontSize: labelSize, fill: p.dim });
  bpmLbl.x = pad; bpmLbl.y = curY;
  layers.overlay.addChild(bpmLbl);

  const bpmVal = new PIXI.Text(G.bpm.toString(), { fontFamily: FONT_GAME, fontSize: valueSize, fill: p.vibe });
  bpmVal.anchor.set(1, 0); bpmVal.x = pad + sliderW; bpmVal.y = curY;
  layers.overlay.addChild(bpmVal);

  drawSlider(pad, curY + ctrlH/2 + 6, sliderW, G.bpm, 80, 140, p.vibe, (v) => Audio.setBPM(Math.round(v)));

  // Pitch Control (right side)
  const pitchX = W/2 + pad/2;
  const pitchLbl = new PIXI.Text('PITCH', { fontFamily: FONT_GAME, fontSize: labelSize, fill: p.dim });
  pitchLbl.x = pitchX; pitchLbl.y = curY;
  layers.overlay.addChild(pitchLbl);

  const pitchVal = new PIXI.Text((G.pitch >= 0 ? '+' : '') + G.pitch, { fontFamily: FONT_GAME, fontSize: valueSize, fill: p.melody });
  pitchVal.anchor.set(1, 0); pitchVal.x = pitchX + sliderW - pad; pitchVal.y = curY;
  layers.overlay.addChild(pitchVal);

  drawSlider(pitchX, curY + ctrlH/2 + 6, sliderW - pad, G.pitch, -12, 12, p.melody, (v) => Audio.setPitch(Math.round(v)));

  curY += ctrlH + ctrlGap + 8;

  // Volume Mix Controls (3 in a row)
  const mixLbl = new PIXI.Text('VOLUME MIX', { fontFamily: FONT_GAME, fontSize: labelSize, fill: p.dim });
  mixLbl.x = pad; mixLbl.y = curY;
  layers.overlay.addChild(mixLbl);
  curY += labelSize + 8;

  const mixSliderW = (contentW - slotGap * 2) / 3 - 4;
  CATS.forEach((cat, i) => {
    const color = getColor(cat);
    const x = pad + i * (contentW / 3);

    const catLbl = new PIXI.Text(cat[0], { fontFamily: FONT_GAME, fontSize: labelSize, fill: color });
    catLbl.x = x; catLbl.y = curY;
    layers.overlay.addChild(catLbl);

    const pct = Math.round(G.mix[cat] * 100);
    const pctTxt = new PIXI.Text(pct + '%', { fontFamily: FONT_GAME, fontSize: labelSize, fill: p.dim });
    pctTxt.anchor.set(1, 0); pctTxt.x = x + mixSliderW; pctTxt.y = curY;
    layers.overlay.addChild(pctTxt);

    drawSlider(x, curY + ctrlH/2, mixSliderW, G.mix[cat], 0, 1, color, (v) => Audio.setMix(cat, v));
  });
  curY += ctrlH + 12;

  // === LOOP LIST SECTION ===
  const listLbl = new PIXI.Text('AVAILABLE LOOPS', { fontFamily: FONT_GAME, fontSize: labelSize, fill: p.dim });
  listLbl.x = pad; listLbl.y = curY;
  layers.overlay.addChild(listLbl);
  curY += labelSize + 8;

  const rowH = isMobile ? 22 : 28;
  const rowGap = isMobile ? 2 : 3;
  const colW = (contentW - slotGap * 2) / 3;
  const maxRows = Math.floor((H - footerH - curY) / (rowH + rowGap));

  CATS.forEach((cat, col) => {
    const loops = G.loops[cat];
    const color = getColor(cat);
    const colX = pad + col * (colW + slotGap / 2);

    // Column header
    const hdr = new PIXI.Graphics();
    hdr.beginFill(color, 0.15); hdr.drawRoundedRect(colX, curY, colW - slotGap/2, rowH, 3); hdr.endFill();
    layers.overlay.addChild(hdr);

    const hdrTxt = new PIXI.Text(cat, { fontFamily: FONT_GAME, fontSize: labelSize, fill: color });
    hdrTxt.anchor.set(0.5); hdrTxt.x = colX + colW/2 - slotGap/4; hdrTxt.y = curY + rowH/2;
    layers.overlay.addChild(hdrTxt);

    // Loop rows
    loops.forEach((loop, i) => {
      if (i >= maxRows - 1) return;
      const y = curY + (i + 1) * (rowH + rowGap);
      const isActive = G.layers[cat].some(l => l.id === loop.id);
      const isUnlocked = loop.unlocked;

      const row = new PIXI.Graphics();
      if (isActive) {
        row.beginFill(color, 0.5); row.lineStyle(1, color);
      } else if (isUnlocked) {
        row.beginFill(color, 0.15);
      } else {
        row.beginFill(p.grid, 0.4);
      }
      row.drawRoundedRect(colX, y, colW - slotGap/2, rowH, 3);
      row.endFill();
      row.interactive = true; row.cursor = 'pointer';

      if (isUnlocked) {
        row.on('pointerdown', () => { toggleLoop(cat, loop.id); G.dirty = true; });
      } else {
        row.on('pointerdown', () => unlock(cat, loop.id));
      }
      layers.overlay.addChild(row);

      // Loop name
      const maxChars = Math.floor((colW - 30) / (labelSize * 0.6));
      let name = loop.name.length > maxChars ? loop.name.substring(0, maxChars - 1) + '..' : loop.name;
      const nameTxt = new PIXI.Text(name, { fontFamily: FONT_GAME, fontSize: labelSize, fill: isUnlocked ? p.text : p.dim });
      nameTxt.x = colX + 6; nameTxt.y = y + (rowH - labelSize) / 2;
      layers.overlay.addChild(nameTxt);

      // Status indicator
      if (isActive) {
        const dot = new PIXI.Graphics();
        dot.beginFill(0x00ff00); dot.drawCircle(colX + colW - slotGap/2 - 10, y + rowH/2, 4); dot.endFill();
        layers.overlay.addChild(dot);
      } else if (!isUnlocked) {
        const lock = new PIXI.Text('$', { fontFamily: FONT_GAME, fontSize: labelSize - 1, fill: color });
        lock.anchor.set(0.5); lock.x = colX + colW - slotGap/2 - 10; lock.y = y + rowH/2;
        layers.overlay.addChild(lock);
      }
    });
  });

  // Back button
  const backBtnW = isMobile ? 90 : 130;
  const backBtnH = isMobile ? 32 : 40;
  layers.overlay.addChild(makeButton('BACK', W/2, H - footerH/2, () => { G.screen = 'PLAY'; G.dirty = true; }, backBtnW, backBtnH, p.vibe));
}

function makeButton(text, x, y, action, w, h, borderColor) {
  const p = P(), c = new PIXI.Container(), bg = new PIXI.Graphics();
  bg.beginFill(0, 0.25); bg.drawRoundedRect(-w/2+2, -h/2+2, w, h, 6); bg.endFill();
  bg.beginFill(p.grid, 0.9); bg.lineStyle(2, borderColor || p.vibe); bg.drawRoundedRect(-w/2, -h/2, w, h, 6); bg.endFill();
  c.addChild(bg);
  const lbl = new PIXI.Text(text, { fontFamily: FONT_GAME, fontSize: Math.min(10, h*0.28), fill: p.text });
  lbl.anchor.set(0.5); c.addChild(lbl);
  c.x = x; c.y = y; c.interactive = true; c.cursor = 'pointer';
  c.on('pointerdown', () => c.scale.set(0.92));
  c.on('pointerup', () => { c.scale.set(1); action(); });
  c.on('pointerupoutside', () => c.scale.set(1));
  return c;
}

// Game logic
async function startGame() {
  // Stop any existing audio first
  Audio.stopAll();

  await Audio.init();

  // Initialize audio controls to defaults
  G.bpm = 115; G.pitch = 0;
  G.mix = { BEAT: 0.8, VIBE: 0.7, MELODY: 0.85 };
  Audio.setBPM(G.bpm);
  Audio.setPitch(G.pitch);
  CATS.forEach(cat => Audio.setMix(cat, G.mix[cat]));

  G.score = 0; G.combo = 0; G.lastCollapseTime = 0;
  G.res = { BEAT: 0, VIBE: 0, MELODY: 0 };
  G.layers = { BEAT: [], VIBE: [], MELODY: [] };
  G.loops = JSON.parse(JSON.stringify(LOOPS));
  G.over = false; G.paused = false; G.collapsing = false; G.needsSpawn = false;
  G.clusters = []; G.frozen = false; G.comboPopups = [];
  G.gameOverShown = false; G.pieceVisualY = 0; G.lastRender = 0;

  // Properly destroy all particles
  while (particles.length) {
    const p = particles.pop();
    layers.fx.removeChild(p);
    p.destroy();
  }

  // Clear graphics pool if too large (memory cleanup)
  while (gfxPool.length > MAX_POOL_SIZE) {
    const g = gfxPool.pop();
    g.destroy();
  }

  initGrid();
  spawn();
  G.screen = 'PLAY';
  G.dirty = true;

  // Start default loops
  toggleLoop('BEAT', 'trap_808');
  toggleLoop('VIBE', 'warm_pad');
  toggleLoop('MELODY', 'piano_chords');
}

function spawn() {
  G.piece = G.next || makePiece();
  G.next = makePiece();
  G.pieceVisualY = G.piece.y; // Reset visual Y to match grid position
  if (!canPlace(G.piece, G.piece.x, G.piece.y)) {
    G.over = true; G.piece = null;
    Audio.stopAll();
    showGameOver();
  }
}

function showGameOver() {
  G.gameOverShown = true;
  const p = P(), bg = new PIXI.Graphics();
  bg.beginFill(0, 0.85); bg.drawRect(0, 0, W, H); bg.endFill(); bg.interactive = true;
  layers.overlay.addChild(bg);
  const panel = new PIXI.Graphics();
  panel.beginFill(p.grid); panel.lineStyle(3, p.beat); panel.drawRoundedRect(W/2-110, H/2-120, 220, 240, 12); panel.endFill();
  layers.overlay.addChild(panel);
  const title = new PIXI.Text('GAME OVER', { fontFamily: FONT_GAME, fontSize: 12, fill: p.beat });
  title.anchor.set(0.5); title.x = W/2; title.y = H/2 - 85;
  layers.overlay.addChild(title);
  const sc = new PIXI.Text(G.score.toLocaleString(), { fontFamily: FONT_GAME, fontSize: 20, fill: p.social[1] });
  sc.anchor.set(0.5); sc.x = W/2; sc.y = H/2 - 40;
  layers.overlay.addChild(sc);
  layers.overlay.addChild(makeButton('PLAY AGAIN', W/2, H/2+20, () => { G.gameOverShown = false; layers.overlay.removeChildren(); startGame(); }, 150, 44, p.beat));
  layers.overlay.addChild(makeButton('HOME', W/2, H/2+75, () => { G.gameOverShown = false; layers.overlay.removeChildren(); G.screen = 'HOME'; G.dirty = true; }, 120, 38, p.dim));
}

function toggleLoop(cat, id) {
  const active = G.layers[cat], idx = active.findIndex(l => l.id === id);
  if (idx >= 0) { Audio.stopLoop(cat, id); active.splice(idx, 1); }
  else if (active.length < 3) {
    const loop = G.loops[cat].find(l => l.id === id);
    if (loop?.unlocked) { Audio.startLoop(cat, id); active.push(loop); }
  }
}

function pauseGame() {
  G.paused = true;
  G.screen = 'PAUSE';
  // Pause transport to stop all loops
  if (Audio.ready) {
    try { Tone.Transport.pause(); } catch(e) {}
  }
  G.dirty = true;
}

function resumeGame() {
  G.paused = false;
  G.screen = 'PLAY';
  // Resume transport to restart loops
  if (Audio.ready) {
    try { Tone.Transport.start(); } catch(e) {}
  }
  G.dirty = true;
}

function unlock(cat, id) {
  if (G.res[cat] < G.unlockCost) return;
  const loop = G.loops[cat].find(l => l.id === id);
  if (loop && !loop.unlocked) {
    G.res[cat] -= G.unlockCost;
    loop.unlocked = true;
    // Visual unlock effect
    showUnlockEffect(cat, loop.name);
    // Play unlock sound
    if (Audio.ready) {
      try { Audio.sfx.combo.triggerAttackRelease(['C5', 'E5', 'G5'], '8n', Tone.now(), 0.4); } catch(e) {}
    }
    G.dirty = true;
  }
}

// Unlock popup effect
function showUnlockEffect(cat, loopName) {
  const color = getColor(cat);
  G.comboPopups.push({
    text: 'UNLOCKED!',
    x: W / 2,
    y: H / 2 - 30,
    life: 1.5,
    color: color
  });
  G.comboPopups.push({
    text: loopName,
    x: W / 2,
    y: H / 2 + 10,
    life: 1.5,
    color: P().social[1]
  });
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// Input
let touchX, touchY;
function onKey(e) {
  if (!['ArrowLeft','ArrowRight','ArrowDown','ArrowUp',' ','r','R'].includes(e.key)) return;
  e.preventDefault();
  if (G.screen !== 'PLAY' || G.paused || G.over || G.collapsing || !G.piece) return;
  if (e.key === 'ArrowLeft' && canPlace(G.piece, G.piece.x-1, G.piece.y)) G.piece.x--;
  else if (e.key === 'ArrowRight' && canPlace(G.piece, G.piece.x+1, G.piece.y)) G.piece.x++;
  else if (e.key === 'ArrowDown') { while (canPlace(G.piece, G.piece.x, G.piece.y+1)) G.piece.y++; G.pieceVisualY = G.piece.y; }
  else if (['ArrowUp',' ','r','R'].includes(e.key)) rotate();
  G.dirty = true;
}

function onTouchStart(e) { if (e.touches.length === 1) { touchX = e.touches[0].clientX; touchY = e.touches[0].clientY; } }
function onTouchEnd(e) {
  if (G.screen !== 'PLAY' || !touchX) return;
  const endX = e.changedTouches[0].clientX, endY = e.changedTouches[0].clientY;
  const dx = endX - touchX, dy = endY - touchY;

  if (!G.collapsing && !G.paused && !G.over && G.piece) {
    // Small tap = rotate if on piece area, otherwise let PIXI handle grid taps
    if (Math.abs(dx) < 20 && Math.abs(dy) < 20) {
      // Check if tap is on the falling piece
      const pieceScreenY = gridY + G.pieceVisualY * tileSize;
      const pieceMinX = gridX + G.piece.x * tileSize - 10;
      const pieceMaxX = gridX + (G.piece.x + Math.max(...G.piece.tiles.map(t => t.dx)) + 1) * tileSize + 10;
      const pieceMinY = pieceScreenY - 10;
      const pieceMaxY = pieceScreenY + (Math.max(...G.piece.tiles.map(t => t.dy)) + 1) * tileSize + 10;

      if (endX >= pieceMinX && endX <= pieceMaxX && endY >= pieceMinY && endY <= pieceMaxY) {
        rotate();
        G.dirty = true;
      }
      // Grid taps are handled by PIXI
    } else if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 25) {
      // Horizontal swipe = move piece
      if (dx > 0 && canPlace(G.piece, G.piece.x+1, G.piece.y)) G.piece.x++;
      else if (dx < 0 && canPlace(G.piece, G.piece.x-1, G.piece.y)) G.piece.x--;
      G.dirty = true;
    } else if (dy > 35) {
      // Swipe down = hard drop
      while (canPlace(G.piece, G.piece.x, G.piece.y+1)) G.piece.y++;
      G.pieceVisualY = G.piece.y;
      G.dirty = true;
    }
  }
  touchX = touchY = null;
}

// Game loop - optimized with smooth continuous falling and error handling
let lastTime = 0;
const FALL_SPEED = 1.2; // Grid cells per second (normal speed)
const FALL_SPEED_FROZEN = 0.4; // Slower when frozen
let lastVisualY = 0;
let frameCount = 0;

function gameLoop(delta) {
  try {
    const now = performance.now(), dt = Math.min(now - lastTime, 50) / 1000; // dt in seconds
    lastTime = now;
    frameCount++;

    // Periodic memory cleanup (every ~10 seconds at 60fps)
    if (frameCount % 600 === 0) {
      // Trim graphics pool if oversized
      while (gfxPool.length > MAX_POOL_SIZE) {
        const g = gfxPool.pop();
        try { g.destroy(); } catch(e) {}
      }
    }

    // Update particles - only when we have some
    const hasParticles = particles.length > 0 || G.comboPopups.length > 0 || G.shake.active;
    if (hasParticles) updateParticles();

    // Smooth continuous falling
    if (G.screen === 'PLAY' && !G.paused && !G.over && !G.collapsing && G.piece) {
      const speed = G.frozen ? FALL_SPEED_FROZEN : FALL_SPEED;
      const fallAmount = speed * dt;
      let targetVisualY = G.pieceVisualY + fallAmount;

      // Check if we can move to next row
      const canMoveDown = canPlace(G.piece, G.piece.x, G.piece.y + 1);

      if (canMoveDown) {
        // Can move down - allow visual to progress
        if (targetVisualY >= G.piece.y + 1) {
          G.piece.y++;
        }
        // Clamp visual to not exceed current grid position + 1
        G.pieceVisualY = Math.min(targetVisualY, G.piece.y + 0.99);
      } else {
        // Can't move down - clamp visual to current position and land
        if (G.pieceVisualY >= G.piece.y) {
          G.pieceVisualY = G.piece.y;
          place();
          G.piece = null;
          G.needsSpawn = true; // Flag for spawn instead of setTimeout
        } else {
          // Still catching up to grid position
          G.pieceVisualY = Math.min(targetVisualY, G.piece.y);
        }
      }

      // Only mark dirty if visual position changed enough to matter (more than 0.5 pixels)
      if (Math.abs(G.pieceVisualY - lastVisualY) * tileSize > 0.5) {
        G.dirty = true;
        lastVisualY = G.pieceVisualY;
      }
    }

    // Check and reset freeze state
    if (G.frozen && Date.now() >= G.freezeEnd) {
      G.frozen = false;
      G.dirty = true;
    }

    // Spawn new piece when ready (not collapsing, no current piece)
    // Also force spawn if somehow we have no piece and aren't collapsing (safety net)
    if (G.screen === 'PLAY' && !G.paused && !G.over && !G.collapsing && !G.piece) {
      G.needsSpawn = false;
      spawn();
    }

    // Render at ~60fps when needed
    const timeSinceRender = now - G.lastRender;
    const needsRender = G.dirty || hasParticles || (G.frozen && Date.now() < G.freezeEnd) || G.screen === 'HOME';

    if (needsRender && timeSinceRender > 16) {
      G.lastRender = now;
      render();
    }
  } catch (err) {
    console.error('Game loop error:', err);
    // Try to recover by resetting state
    G.collapsing = false;
    G.dirty = true;
  }
}

init();
</script>
