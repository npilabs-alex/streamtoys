<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SONGSUGAR</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/7.3.2/pixi.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0a14;
      font-family: 'Segoe UI', system-ui, sans-serif;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
    }
    #game-container {
      width: 100%;
      height: 100%;
      position: fixed;
      top: 0;
      left: 0;
    }
    canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
    }
  </style>
</head>
<body>
<div id="game-container"></div>

<script>
// ============================================================================
// SONGSUGAR - Musical Puzzle Game
// ============================================================================

const CONFIG = {
  GRID_COLS: 8,
  GRID_ROWS: 12,
  TILE_SIZE: 40,
  TILE_GAP: 2,

  COLORS: {
    BEAT: 0xff2d6e,
    VIBE: 0x00e5ff,
    MELODY: 0x39ff14,
    WILD: 0xffd700,
    BOMB: 0xff6600,
    FREEZE: 0x88ccff,
    BACKGROUND: 0x0a0a14,
    HUD_BG: 0x1a1a2e,
    TEXT: 0xffffff,
    TEXT_DIM: 0x888899
  },

  FALL_SPEED: 1.5,
  CLUSTER_MIN: 3,
  WILD_CHANCE: 0.10,
  SPECIAL_CHANCE: 0.05,
  MAX_LAYERS_PER_CATEGORY: 3,
  BPM: 115,
  LOOP_BARS: 4,
  COLLAPSE_DELAY: 150,
  CHAIN_DELAY: 200
};

const TILE_TYPES = ['BEAT', 'VIBE', 'MELODY', 'WILD', 'BOMB', 'FREEZE'];
const CATEGORY_TYPES = ['BEAT', 'VIBE', 'MELODY'];
const SPECIAL_TYPES = ['BOMB', 'FREEZE'];

// Loop definitions
const LOOPS = {
  BEAT: [
    { id: 'trap_808', name: 'TRAP 808s', unlocked: true },
    { id: 'boom_bap', name: 'BOOM BAP', unlocked: true },
    { id: 'lofi_drums', name: 'LOFI DRUMS', unlocked: true },
    { id: 'afrobeat', name: 'AFROBEAT', unlocked: false },
    { id: 'house_4x4', name: 'HOUSE 4x4', unlocked: false },
    { id: 'drill', name: 'DRILL', unlocked: false },
    { id: 'amapiano', name: 'AMAPIANO', unlocked: false },
    { id: 'breakbeat', name: 'BREAKBEAT', unlocked: false }
  ],
  VIBE: [
    { id: 'warm_pad', name: 'WARM PAD', unlocked: true },
    { id: 'dark_drone', name: 'DARK DRONE', unlocked: true },
    { id: 'lofi_texture', name: 'LOFI TEXTURE', unlocked: true },
    { id: 'ethereal_choir', name: 'ETHEREAL CHOIR', unlocked: false },
    { id: 'strings_swell', name: 'STRINGS SWELL', unlocked: false },
    { id: 'synth_wash', name: 'SYNTH WASH', unlocked: false },
    { id: 'sub_drone', name: 'SUB DRONE', unlocked: false },
    { id: 'glitch_texture', name: 'GLITCH TEXTURE', unlocked: false }
  ],
  MELODY: [
    { id: 'piano_chords', name: 'PIANO CHORDS', unlocked: true },
    { id: 'synth_arp', name: 'SYNTH ARP', unlocked: true },
    { id: 'pluck_lead', name: 'PLUCK LEAD', unlocked: true },
    { id: 'guitar_clean', name: 'GUITAR CLEAN', unlocked: false },
    { id: 'vocal_chop', name: 'VOCAL CHOP', unlocked: false },
    { id: 'bell_melody', name: 'BELL MELODY', unlocked: false },
    { id: 'flute_line', name: 'FLUTE LINE', unlocked: false },
    { id: 'glide_lead', name: 'GLIDE LEAD', unlocked: false }
  ]
};

// ============================================================================
// GAME STATE
// ============================================================================

const GameState = {
  screen: 'HOME',
  score: 0,
  resources: { BEAT: 0, VIBE: 0, MELODY: 0 },
  resourcesForUnlock: 50,
  activeLayers: { BEAT: [], VIBE: [], MELODY: [] },
  loops: JSON.parse(JSON.stringify(LOOPS)),
  grid: [],
  currentPiece: null,
  nextPiece: null,
  gameOver: false,
  paused: false,
  combo: 0,
  bpm: CONFIG.BPM,
  pitch: 0,
  screenShake: { active: false, intensity: 0 },
  glowTime: 0,
  previewingLoop: null,
  isCollapsing: false,
  validClusters: [],
  frozen: false,
  freezeEndTime: 0
};

// MIX screen scroll state
const mixScrollState = { BEAT: 0, VIBE: 0, MELODY: 0 };

// Background visualization particles
const bgParticles = [];
const visualizerState = {
  beatPulse: 0,
  vibeWave: 0,
  melodyFlow: 0
};

// ============================================================================
// PIXI APPLICATION
// ============================================================================

let app, bgContainer, gameContainer, hudContainer, overlayContainer, particleContainer;
let scaleFactor = 1;
let gridOffsetX = 0;
let gridOffsetY = 0;

function initPixi() {
  const container = document.getElementById('game-container');
  const width = window.innerWidth;
  const height = window.innerHeight;

  app = new PIXI.Application({
    width,
    height,
    backgroundColor: CONFIG.COLORS.BACKGROUND,
    antialias: true,
    resolution: Math.min(window.devicePixelRatio || 1, 2),
    autoDensity: true,
    resizeTo: window
  });

  container.appendChild(app.view);

  bgContainer = new PIXI.Container();
  gameContainer = new PIXI.Container();
  hudContainer = new PIXI.Container();
  overlayContainer = new PIXI.Container();
  particleContainer = new PIXI.Container();

  app.stage.addChild(bgContainer);
  app.stage.addChild(gameContainer);
  app.stage.addChild(particleContainer);
  app.stage.addChild(hudContainer);
  app.stage.addChild(overlayContainer);

  window.addEventListener('resize', onResize);
  window.addEventListener('orientationchange', () => setTimeout(onResize, 100));
  onResize();
}

function onResize() {
  const width = window.innerWidth;
  const height = window.innerHeight;

  // Calculate optimal tile size for current screen
  const baseGridWidth = CONFIG.GRID_COLS * (40 + CONFIG.TILE_GAP);
  const baseGridHeight = CONFIG.GRID_ROWS * (40 + CONFIG.TILE_GAP);

  const availableWidth = width - 30;
  const availableHeight = height - 180;

  const scaleX = availableWidth / baseGridWidth;
  const scaleY = availableHeight / baseGridHeight;
  scaleFactor = Math.min(scaleX, scaleY, 1.5);

  CONFIG.TILE_SIZE = Math.floor(40 * scaleFactor);

  const gridWidth = CONFIG.GRID_COLS * (CONFIG.TILE_SIZE + CONFIG.TILE_GAP);
  gridOffsetX = (width - gridWidth) / 2;
  gridOffsetY = Math.max(70, height * 0.08);

  renderCurrentScreen();
}

// ============================================================================
// AUDIO ENGINE
// ============================================================================

class AudioEngine {
  constructor() {
    this.initialized = false;
    this.masterGain = null;
    this.activeSequences = { BEAT: [], VIBE: [], MELODY: [] };
    this.analyser = null;
  }

  async init() {
    if (this.initialized) return;

    await Tone.start();
    Tone.Transport.bpm.value = CONFIG.BPM;

    this.compressor = new Tone.Compressor(-20, 3).toDestination();
    this.limiter = new Tone.Limiter(-1).connect(this.compressor);
    this.masterGain = new Tone.Gain(0.8).connect(this.limiter);

    // Analyser for visualization
    this.analyser = new Tone.Analyser('waveform', 64);
    this.masterGain.connect(this.analyser);

    // Synths for loops
    this.categorySynths = {
      BEAT: new Tone.MembraneSynth({ pitchDecay: 0.05, octaves: 4 }).connect(this.masterGain),
      VIBE: new Tone.PolySynth(Tone.Synth, { oscillator: { type: 'sine' }, envelope: { attack: 0.5, decay: 0.3, sustain: 0.8, release: 1 } }).connect(this.masterGain),
      MELODY: new Tone.PolySynth(Tone.Synth, { oscillator: { type: 'triangle' }, envelope: { attack: 0.02, decay: 0.1, sustain: 0.3, release: 0.4 } }).connect(this.masterGain)
    };

    this.categorySynths.BEAT.volume.value = -6;
    this.categorySynths.VIBE.volume.value = -12;
    this.categorySynths.MELODY.volume.value = -8;

    // Patterns
    this.patterns = {
      BEAT: {
        trap_808: ['C2', null, 'C2', null, 'E2', null, 'C2', 'C2'],
        boom_bap: ['C2', null, null, 'C2', 'E2', null, 'C2', null],
        lofi_drums: ['C2', null, 'D2', null, 'C2', null, 'D2', null],
        afrobeat: ['C2', 'D2', 'C2', 'D2', 'E2', 'D2', 'C2', 'D2'],
        house_4x4: ['C2', null, 'C2', null, 'C2', null, 'C2', null],
        drill: ['C2', null, null, 'C2', null, 'C2', 'C2', null],
        amapiano: ['C2', null, 'D2', 'C2', null, 'D2', 'C2', null],
        breakbeat: ['C2', 'C2', null, 'C2', 'E2', null, 'C2', 'D2']
      },
      VIBE: {
        warm_pad: ['C3', 'Eb3', 'G3'],
        dark_drone: ['C2', 'G2', 'Bb2'],
        lofi_texture: ['C3', 'Eb3', 'F3'],
        ethereal_choir: ['C4', 'Eb4', 'G4', 'Bb4'],
        strings_swell: ['C3', 'G3', 'C4'],
        synth_wash: ['C3', 'Eb3', 'G3', 'Bb3'],
        sub_drone: ['C1', 'G1'],
        glitch_texture: ['C3', 'D3', 'Eb3']
      },
      MELODY: {
        piano_chords: ['C4', 'Eb4', 'G4', 'Bb4', 'G4', 'Eb4', 'C4', 'Bb3'],
        synth_arp: ['C4', 'Eb4', 'G4', 'C5', 'G4', 'Eb4', 'C4', 'G3'],
        pluck_lead: ['C5', null, 'Bb4', null, 'G4', null, 'Eb4', null],
        guitar_clean: ['C4', 'Eb4', 'G4', null, 'F4', 'Eb4', 'C4', null],
        vocal_chop: ['C4', null, 'C4', 'Eb4', null, 'G4', null, 'Eb4'],
        bell_melody: ['G5', null, 'Eb5', null, 'C5', null, 'G4', null],
        flute_line: ['C5', 'D5', 'Eb5', 'G5', 'F5', 'Eb5', 'D5', 'C5'],
        glide_lead: ['C4', null, null, 'G4', null, null, 'Eb4', null]
      }
    };

    // SFX
    this.sfx = {
      collapse: new Tone.PolySynth(Tone.Synth).connect(this.masterGain),
      combo: new Tone.PolySynth(Tone.Synth).connect(this.masterGain),
      unlock: new Tone.PolySynth(Tone.Synth).connect(this.masterGain),
      land: new Tone.MembraneSynth().connect(this.masterGain),
      bomb: new Tone.NoiseSynth({ noise: { type: 'white' }, envelope: { attack: 0.01, decay: 0.3, sustain: 0 }}).connect(this.masterGain),
      freeze: new Tone.PolySynth(Tone.Synth, { oscillator: { type: 'sine' }}).connect(this.masterGain)
    };

    this.sfx.collapse.set({ envelope: { attack: 0.01, decay: 0.2, sustain: 0.1, release: 0.3 } });

    this.initialized = true;
    Tone.Transport.start();
  }

  startLoop(category, loopId) {
    const synth = this.categorySynths[category];
    const pattern = this.patterns[category][loopId];
    if (!pattern) return;

    let sequence;
    if (category === 'VIBE') {
      sequence = new Tone.Loop((time) => {
        synth.triggerAttackRelease(pattern, '2n', time);
        visualizerState.vibeWave = 1;
      }, '1m');
    } else if (category === 'BEAT') {
      sequence = new Tone.Sequence((time, note) => {
        if (note) {
          synth.triggerAttackRelease(note, '16n', time);
          visualizerState.beatPulse = 1;
        }
      }, pattern, '8n');
    } else {
      sequence = new Tone.Sequence((time, note) => {
        if (note) {
          synth.triggerAttackRelease(note, '8n', time);
          visualizerState.melodyFlow = 1;
        }
      }, pattern, '8n');
    }

    sequence.start(0);
    this.activeSequences[category].push({ loopId, sequence });
  }

  stopLoop(category, loopId) {
    const index = this.activeSequences[category].findIndex(s => s.loopId === loopId);
    if (index !== -1) {
      this.activeSequences[category][index].sequence.stop();
      this.activeSequences[category][index].sequence.dispose();
      this.activeSequences[category].splice(index, 1);
    }
  }

  stopAllLoops() {
    for (const category of CATEGORY_TYPES) {
      for (const seq of this.activeSequences[category]) {
        seq.sequence.stop();
        seq.sequence.dispose();
      }
      this.activeSequences[category] = [];
    }
  }

  playCollapse(category, size) {
    const chord = ['C', 'Eb', 'G'].map(n => n + (category === 'BEAT' ? '3' : category === 'VIBE' ? '4' : '5'));
    this.sfx.collapse.triggerAttackRelease(chord, '8n', Tone.now(), 0.3 + (size * 0.05));
  }

  playCombo(level) {
    const notes = ['C4', 'Eb4', 'G4', 'Bb4', 'C5'].slice(0, Math.min(level + 1, 5));
    notes.forEach((note, i) => {
      this.sfx.combo.triggerAttackRelease(note, '16n', Tone.now() + i * 0.05, 0.2);
    });
  }

  playUnlock() {
    const notes = ['C5', 'Eb5', 'G5', 'C6'];
    notes.forEach((note, i) => {
      this.sfx.unlock.triggerAttackRelease(note, '8n', Tone.now() + i * 0.1, 0.3);
    });
  }

  playLand() {
    this.sfx.land.triggerAttackRelease('C1', '32n', Tone.now(), 0.15);
  }

  playBomb() {
    this.sfx.bomb.triggerAttackRelease('8n', Tone.now(), 0.5);
  }

  playFreeze() {
    this.sfx.freeze.triggerAttackRelease(['C6', 'G6', 'C7'], '4n', Tone.now(), 0.3);
  }

  setBPM(bpm) {
    Tone.Transport.bpm.value = bpm;
    GameState.bpm = bpm;
  }

  startPreview(category, loopId) {
    this.stopPreview();
    const synth = this.categorySynths[category];
    const pattern = this.patterns[category][loopId];
    if (!pattern) return;

    if (category === 'VIBE') {
      this.previewSequence = new Tone.Loop((time) => {
        synth.triggerAttackRelease(pattern, '2n', time, 0.5);
      }, '1m');
    } else {
      this.previewSequence = new Tone.Sequence((time, note) => {
        if (note) synth.triggerAttackRelease(note, '8n', time, 0.5);
      }, pattern, '8n');
    }
    this.previewSequence.start(0);
  }

  stopPreview() {
    if (this.previewSequence) {
      this.previewSequence.stop();
      this.previewSequence.dispose();
      this.previewSequence = null;
    }
  }

  getAnalyserData() {
    if (this.analyser) {
      return this.analyser.getValue();
    }
    return new Float32Array(64);
  }
}

const audioEngine = new AudioEngine();

// ============================================================================
// GRID & TILES
// ============================================================================

function initGrid() {
  GameState.grid = [];
  for (let row = 0; row < CONFIG.GRID_ROWS; row++) {
    GameState.grid[row] = [];
    for (let col = 0; col < CONFIG.GRID_COLS; col++) {
      GameState.grid[row][col] = null;
    }
  }
}

function getRandomTileType() {
  const rand = Math.random();
  if (rand < CONFIG.SPECIAL_CHANCE) {
    return SPECIAL_TYPES[Math.floor(Math.random() * SPECIAL_TYPES.length)];
  }
  if (rand < CONFIG.SPECIAL_CHANCE + CONFIG.WILD_CHANCE) {
    return 'WILD';
  }
  return CATEGORY_TYPES[Math.floor(Math.random() * CATEGORY_TYPES.length)];
}

function createPiece() {
  const shapes = [
    [[0, 0], [1, 0]],           // Horizontal 2
    [[0, 0], [0, 1]],           // Vertical 2
    [[0, 0], [1, 0], [2, 0]],   // Horizontal 3
    [[0, 0], [0, 1], [0, 2]],   // Vertical 3
    [[0, 0], [1, 0], [0, 1]],   // L
    [[0, 0], [1, 0], [1, 1]],   // Reverse L
    [[0, 0], [1, 1]],           // Diagonal 2
    [[0, 0], [1, 0], [0, 1], [1, 1]] // Square
  ];

  const shape = shapes[Math.floor(Math.random() * shapes.length)];
  const tiles = shape.map(([dx, dy]) => ({
    type: getRandomTileType(),
    dx,
    dy
  }));

  return {
    x: Math.floor(CONFIG.GRID_COLS / 2) - 1,
    y: 0,
    tiles,
    rotation: 0
  };
}

function rotatePiece(piece) {
  if (!piece || piece.tiles.length < 2) return false;

  // Store original
  const originalTiles = piece.tiles.map(t => ({...t}));

  // Rotate around center
  piece.tiles = piece.tiles.map(tile => ({
    ...tile,
    dx: -tile.dy,
    dy: tile.dx
  }));

  // Normalize to positive coordinates
  const minDx = Math.min(...piece.tiles.map(t => t.dx));
  const minDy = Math.min(...piece.tiles.map(t => t.dy));
  piece.tiles = piece.tiles.map(tile => ({
    ...tile,
    dx: tile.dx - minDx,
    dy: tile.dy - minDy
  }));

  // Check if rotation is valid
  if (!canPlacePiece(piece, piece.x, piece.y)) {
    // Try wall kicks
    const kicks = [
      { dx: -1, dy: 0 },
      { dx: 1, dy: 0 },
      { dx: 0, dy: -1 },
      { dx: -2, dy: 0 },
      { dx: 2, dy: 0 }
    ];

    let valid = false;
    for (const kick of kicks) {
      if (canPlacePiece(piece, piece.x + kick.dx, piece.y + kick.dy)) {
        piece.x += kick.dx;
        piece.y += kick.dy;
        valid = true;
        break;
      }
    }

    if (!valid) {
      piece.tiles = originalTiles;
      return false;
    }
  }

  return true;
}

function canPlacePiece(piece, x, y) {
  for (const tile of piece.tiles) {
    const col = x + tile.dx;
    const row = y + tile.dy;
    if (col < 0 || col >= CONFIG.GRID_COLS || row >= CONFIG.GRID_ROWS) return false;
    if (row >= 0 && GameState.grid[row][col] !== null) return false;
  }
  return true;
}

function placePiece(piece) {
  for (const tile of piece.tiles) {
    const col = piece.x + tile.dx;
    const row = piece.y + tile.dy;
    if (row >= 0 && row < CONFIG.GRID_ROWS && col >= 0 && col < CONFIG.GRID_COLS) {
      GameState.grid[row][col] = { type: tile.type };
    }
  }

  audioEngine.playLand();
  applyGravity();
  updateValidClusters();
}

// ============================================================================
// CLUSTER DETECTION
// ============================================================================

function findAllClusters() {
  const visited = new Set();
  const clusters = [];

  for (let row = 0; row < CONFIG.GRID_ROWS; row++) {
    for (let col = 0; col < CONFIG.GRID_COLS; col++) {
      const key = `${row},${col}`;
      if (visited.has(key) || !GameState.grid[row][col]) continue;

      const cluster = findClusterAt(row, col, new Set());
      if (cluster.tiles.length >= CONFIG.CLUSTER_MIN) {
        clusters.push(cluster);
      }
      cluster.tiles.forEach(t => visited.add(`${t.row},${t.col}`));
    }
  }

  return clusters;
}

function findClusterAt(startRow, startCol, visited) {
  const tile = GameState.grid[startRow][startCol];
  if (!tile) return { tiles: [], type: null, hasWild: false, hasSpecial: [] };

  // Special tiles don't form clusters
  if (SPECIAL_TYPES.includes(tile.type)) {
    return { tiles: [{ row: startRow, col: startCol, type: tile.type }], type: tile.type, hasWild: false, hasSpecial: [tile.type] };
  }

  const cluster = {
    tiles: [],
    type: tile.type === 'WILD' ? null : tile.type,
    hasWild: tile.type === 'WILD',
    hasSpecial: []
  };
  const queue = [[startRow, startCol]];

  while (queue.length > 0) {
    const [row, col] = queue.shift();
    const key = `${row},${col}`;

    if (visited.has(key)) continue;

    const currentTile = GameState.grid[row][col];
    if (!currentTile) continue;

    // Skip special tiles in cluster forming
    if (SPECIAL_TYPES.includes(currentTile.type)) continue;

    const isWild = currentTile.type === 'WILD';
    const matchesType = isWild || cluster.type === null || currentTile.type === cluster.type;

    if (!matchesType) continue;

    visited.add(key);
    cluster.tiles.push({ row, col, type: currentTile.type });

    if (isWild) cluster.hasWild = true;
    if (!isWild && cluster.type === null) cluster.type = currentTile.type;

    const directions = [[-1, 0], [1, 0], [0, -1], [0, 1]];
    for (const [dr, dc] of directions) {
      const newRow = row + dr;
      const newCol = col + dc;
      if (newRow >= 0 && newRow < CONFIG.GRID_ROWS && newCol >= 0 && newCol < CONFIG.GRID_COLS) {
        const newKey = `${newRow},${newCol}`;
        if (!visited.has(newKey) && GameState.grid[newRow][newCol]) {
          const newTile = GameState.grid[newRow][newCol];
          if (!SPECIAL_TYPES.includes(newTile.type)) {
            const newIsWild = newTile.type === 'WILD';
            const newMatches = newIsWild || cluster.type === null || newTile.type === cluster.type;
            if (newMatches) queue.push([newRow, newCol]);
          }
        }
      }
    }
  }

  return cluster;
}

function updateValidClusters() {
  GameState.validClusters = findAllClusters();
}

function getClusterAtPosition(row, col) {
  for (const cluster of GameState.validClusters) {
    if (cluster.tiles.some(t => t.row === row && t.col === col)) {
      return cluster;
    }
  }
  return null;
}

// Tap to collapse - NO chain reactions
async function collapseClusterAt(row, col) {
  if (GameState.isCollapsing) return;

  const tile = GameState.grid[row][col];
  if (!tile) return;

  // Handle special tiles
  if (tile.type === 'BOMB') {
    GameState.isCollapsing = true;
    await triggerBomb(row, col);
    GameState.isCollapsing = false;
    updateValidClusters();
    renderGame();
    return;
  }

  if (tile.type === 'FREEZE') {
    GameState.isCollapsing = true;
    await triggerFreeze(row, col);
    GameState.isCollapsing = false;
    updateValidClusters();
    renderGame();
    return;
  }

  const cluster = getClusterAtPosition(row, col);
  if (!cluster || cluster.tiles.length < CONFIG.CLUSTER_MIN) return;

  GameState.isCollapsing = true;

  // Only collapse the clicked cluster - NO chain reactions
  for (const t of cluster.tiles) {
    createCollapseParticles(t.row, t.col, cluster.type || 'WILD');
    GameState.grid[t.row][t.col] = null;
  }

  const points = calculatePoints(cluster.tiles.length, 1);
  GameState.score += points;

  if (cluster.type && cluster.type !== 'WILD') {
    GameState.resources[cluster.type] += points;
  }

  audioEngine.playCollapse(cluster.type || 'BEAT', cluster.tiles.length);

  if (cluster.tiles.length >= 5) {
    triggerScreenShake(cluster.tiles.length);
  }

  renderGame();
  await sleep(CONFIG.COLLAPSE_DELAY);

  applyGravity();

  GameState.isCollapsing = false;
  updateValidClusters();
  renderGame();
}

async function triggerBomb(row, col) {
  audioEngine.playBomb();

  // Clear 3x3 area
  for (let dr = -1; dr <= 1; dr++) {
    for (let dc = -1; dc <= 1; dc++) {
      const r = row + dr;
      const c = col + dc;
      if (r >= 0 && r < CONFIG.GRID_ROWS && c >= 0 && c < CONFIG.GRID_COLS && GameState.grid[r][c]) {
        createCollapseParticles(r, c, 'BOMB');
        GameState.grid[r][c] = null;
        GameState.score += 5;
      }
    }
  }

  triggerScreenShake(10);
  renderGame();
  await sleep(200);
  applyGravity();
}

async function triggerFreeze(row, col) {
  audioEngine.playFreeze();

  GameState.grid[row][col] = null;
  createCollapseParticles(row, col, 'FREEZE');

  GameState.frozen = true;
  GameState.freezeEndTime = Date.now() + 5000;

  renderGame();
  await sleep(100);
  applyGravity();
}

function calculatePoints(size, chain) {
  const base = size * 3 + Math.max(0, (size - 3) * 2);
  return Math.floor(base * (1 + (chain - 1) * 0.5));
}

function applyGravity() {
  for (let col = 0; col < CONFIG.GRID_COLS; col++) {
    let writeRow = CONFIG.GRID_ROWS - 1;
    for (let row = CONFIG.GRID_ROWS - 1; row >= 0; row--) {
      if (GameState.grid[row][col] !== null) {
        if (row !== writeRow) {
          GameState.grid[writeRow][col] = GameState.grid[row][col];
          GameState.grid[row][col] = null;
        }
        writeRow--;
      }
    }
  }
}

const particles = [];

function createCollapseParticles(row, col, type) {
  const color = CONFIG.COLORS[type] || CONFIG.COLORS.WILD;
  const x = gridOffsetX + col * (CONFIG.TILE_SIZE + CONFIG.TILE_GAP) + CONFIG.TILE_SIZE / 2;
  const y = gridOffsetY + row * (CONFIG.TILE_SIZE + CONFIG.TILE_GAP) + CONFIG.TILE_SIZE / 2;

  for (let i = 0; i < 12; i++) {
    const particle = new PIXI.Graphics();
    particle.beginFill(color);
    particle.drawCircle(0, 0, 3 + Math.random() * 5);
    particle.endFill();
    particle.x = x;
    particle.y = y;
    particle.vx = (Math.random() - 0.5) * 12;
    particle.vy = (Math.random() - 0.5) * 12 - 5;
    particle.life = 1;
    particle.decay = 0.02 + Math.random() * 0.02;

    particleContainer.addChild(particle);
    particles.push(particle);
  }
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.3;
    p.life -= p.decay;
    p.alpha = p.life;
    p.scale.set(p.life);

    if (p.life <= 0) {
      particleContainer.removeChild(p);
      particles.splice(i, 1);
    }
  }
}

function triggerScreenShake(intensity) {
  GameState.screenShake = { active: true, intensity: Math.min(intensity * 2, 15), startTime: Date.now() };
}

function updateScreenShake() {
  if (!GameState.screenShake.active) return;

  const elapsed = Date.now() - GameState.screenShake.startTime;
  if (elapsed > 300) {
    GameState.screenShake.active = false;
    gameContainer.x = 0;
    gameContainer.y = 0;
    return;
  }

  const intensity = GameState.screenShake.intensity * (1 - elapsed / 300);
  gameContainer.x = (Math.random() - 0.5) * intensity;
  gameContainer.y = (Math.random() - 0.5) * intensity;
}

function renderBackground() {
  bgContainer.removeChildren();

  const width = app.screen.width;
  const height = app.screen.height;
  const time = Date.now() / 1000;

  const bg = new PIXI.Graphics();
  bg.beginFill(CONFIG.COLORS.BACKGROUND);
  bg.drawRect(0, 0, width, height);
  bg.endFill();
  bgContainer.addChild(bg);

  // Only render if music is playing
  const hasBeat = GameState.activeLayers.BEAT.length > 0;
  const hasVibe = GameState.activeLayers.VIBE.length > 0;
  const hasMelody = GameState.activeLayers.MELODY.length > 0;

  if (!hasBeat && !hasVibe && !hasMelody) return;

  const visuals = new PIXI.Graphics();

  // BEAT: Pulsing circles from center
  if (hasBeat) {
    const beatIntensity = visualizerState.beatPulse;
    const baseRadius = 50 + beatIntensity * 100;

    for (let i = 0; i < 4; i++) {
      const radius = baseRadius + i * 80 + Math.sin(time * 2 + i) * 20;
      const alpha = (0.15 - i * 0.03) * (0.5 + beatIntensity * 0.5);
      visuals.lineStyle(2, CONFIG.COLORS.BEAT, alpha);
      visuals.drawCircle(width / 2, height * 0.4, radius);
    }
  }

  // VIBE: Horizontal waves
  if (hasVibe) {
    const vibeIntensity = visualizerState.vibeWave;
    visuals.lineStyle(2, CONFIG.COLORS.VIBE, 0.15 + vibeIntensity * 0.1);

    for (let wave = 0; wave < 3; wave++) {
      visuals.moveTo(0, height * (0.3 + wave * 0.2));
      for (let x = 0; x <= width; x += 10) {
        const y = height * (0.3 + wave * 0.2) +
                  Math.sin(x * 0.02 + time * (1 + wave * 0.3)) * (20 + vibeIntensity * 30) +
                  Math.sin(x * 0.01 + time * 0.5) * 10;
        visuals.lineTo(x, y);
      }
    }
  }

  // MELODY: Flowing diagonal lines
  if (hasMelody) {
    const melodyIntensity = visualizerState.melodyFlow;

    for (let i = 0; i < 5; i++) {
      const offset = (time * 50 + i * 100) % (width + height);
      visuals.lineStyle(1.5, CONFIG.COLORS.MELODY, 0.1 + melodyIntensity * 0.1);
      visuals.moveTo(offset, 0);
      visuals.lineTo(offset - height, height);
    }
  }

  bgContainer.addChild(visuals);

  // Decay visualizer state
  visualizerState.beatPulse *= 0.92;
  visualizerState.vibeWave *= 0.95;
  visualizerState.melodyFlow *= 0.93;
}

function renderGame() {
  gameContainer.removeChildren();

  const width = app.screen.width;
  const gridWidth = CONFIG.GRID_COLS * (CONFIG.TILE_SIZE + CONFIG.TILE_GAP);
  const gridHeight = CONFIG.GRID_ROWS * (CONFIG.TILE_SIZE + CONFIG.TILE_GAP);

  // Grid background
  const gridBg = new PIXI.Graphics();
  gridBg.beginFill(CONFIG.COLORS.HUD_BG, 0.5);
  gridBg.drawRoundedRect(gridOffsetX - 10, gridOffsetY - 10, gridWidth + 20, gridHeight + 20, 12);
  gridBg.endFill();
  gameContainer.addChild(gridBg);

  // Build cluster map
  const clusterMap = new Map();
  for (const cluster of GameState.validClusters) {
    for (const tile of cluster.tiles) {
      clusterMap.set(`${tile.row},${tile.col}`, cluster);
    }
  }

  const gridGraphics = new PIXI.Graphics();

  // Draw cluster outlines as smooth blob shapes
  for (const cluster of GameState.validClusters) {
    if (cluster.tiles.length >= CONFIG.CLUSTER_MIN) {
      const color = CONFIG.COLORS[cluster.type] || CONFIG.COLORS.WILD;

      // Calculate outline path
      const outlinePoints = getClusterOutline(cluster.tiles);

      if (outlinePoints.length > 0) {
        // Glow effect
        const pulseAlpha = 0.3 + Math.sin(Date.now() / 200) * 0.15;
        gridGraphics.lineStyle(6, color, pulseAlpha * 0.5);
        gridGraphics.beginFill(color, pulseAlpha * 0.15);

        gridGraphics.moveTo(outlinePoints[0].x, outlinePoints[0].y);
        for (let i = 1; i < outlinePoints.length; i++) {
          gridGraphics.lineTo(outlinePoints[i].x, outlinePoints[i].y);
        }
        gridGraphics.closePath();
        gridGraphics.endFill();

        // Sharp outline
        gridGraphics.lineStyle(3, color, 0.9);
        gridGraphics.moveTo(outlinePoints[0].x, outlinePoints[0].y);
        for (let i = 1; i < outlinePoints.length; i++) {
          gridGraphics.lineTo(outlinePoints[i].x, outlinePoints[i].y);
        }
        gridGraphics.closePath();
      }
    }
  }
  gridGraphics.lineStyle(0);

  // Draw tiles
  for (let row = 0; row < CONFIG.GRID_ROWS; row++) {
    for (let col = 0; col < CONFIG.GRID_COLS; col++) {
      const x = gridOffsetX + col * (CONFIG.TILE_SIZE + CONFIG.TILE_GAP);
      const y = gridOffsetY + row * (CONFIG.TILE_SIZE + CONFIG.TILE_GAP);

      // Empty cell
      gridGraphics.beginFill(0x1a1a2e, 0.3);
      gridGraphics.drawRoundedRect(x, y, CONFIG.TILE_SIZE, CONFIG.TILE_SIZE, 6);
      gridGraphics.endFill();

      const tile = GameState.grid[row][col];
      if (tile) {
        const color = CONFIG.COLORS[tile.type];

        // Main tile
        gridGraphics.beginFill(color);
        gridGraphics.drawRoundedRect(x, y, CONFIG.TILE_SIZE, CONFIG.TILE_SIZE, 6);
        gridGraphics.endFill();

        // Highlight
        gridGraphics.beginFill(0xffffff, 0.3);
        gridGraphics.drawRoundedRect(x + 3, y + 3, CONFIG.TILE_SIZE - 6, CONFIG.TILE_SIZE / 3, 3);
        gridGraphics.endFill();

        // Special tile icons
        if (tile.type === 'BOMB') {
          gridGraphics.beginFill(0x000000, 0.6);
          gridGraphics.drawCircle(x + CONFIG.TILE_SIZE/2, y + CONFIG.TILE_SIZE/2, CONFIG.TILE_SIZE * 0.25);
          gridGraphics.endFill();
          // Fuse
          gridGraphics.lineStyle(2, 0xffaa00);
          gridGraphics.moveTo(x + CONFIG.TILE_SIZE/2, y + CONFIG.TILE_SIZE * 0.25);
          gridGraphics.lineTo(x + CONFIG.TILE_SIZE * 0.65, y + CONFIG.TILE_SIZE * 0.1);
          gridGraphics.lineStyle(0);
        } else if (tile.type === 'FREEZE') {
          // Snowflake
          gridGraphics.lineStyle(2, 0xffffff, 0.8);
          const cx = x + CONFIG.TILE_SIZE/2;
          const cy = y + CONFIG.TILE_SIZE/2;
          const r = CONFIG.TILE_SIZE * 0.25;
          for (let a = 0; a < 6; a++) {
            const angle = a * Math.PI / 3;
            gridGraphics.moveTo(cx, cy);
            gridGraphics.lineTo(cx + Math.cos(angle) * r, cy + Math.sin(angle) * r);
          }
          gridGraphics.lineStyle(0);
        } else if (tile.type === 'WILD') {
          // Star
          gridGraphics.beginFill(0xffffff, 0.8);
          const cx = x + CONFIG.TILE_SIZE/2;
          const cy = y + CONFIG.TILE_SIZE/2;
          const or = CONFIG.TILE_SIZE * 0.25;
          const ir = CONFIG.TILE_SIZE * 0.1;
          gridGraphics.moveTo(cx, cy - or);
          for (let i = 1; i < 10; i++) {
            const r = i % 2 === 0 ? or : ir;
            const angle = (i * Math.PI / 5) - Math.PI/2;
            gridGraphics.lineTo(cx + Math.cos(angle) * r, cy + Math.sin(angle) * r);
          }
          gridGraphics.closePath();
          gridGraphics.endFill();
        }
      }
    }
  }
  gameContainer.addChild(gridGraphics);

  // Grid hit area for tap-to-collapse
  const gridHitArea = new PIXI.Graphics();
  gridHitArea.beginFill(0x000000, 0.001);
  gridHitArea.drawRect(gridOffsetX, gridOffsetY, gridWidth, gridHeight);
  gridHitArea.endFill();
  gridHitArea.interactive = true;
  gridHitArea.on('pointerdown', (e) => {
    if (GameState.isCollapsing || GameState.paused) return;

    const localX = e.data.global.x - gridOffsetX;
    const localY = e.data.global.y - gridOffsetY;
    const col = Math.floor(localX / (CONFIG.TILE_SIZE + CONFIG.TILE_GAP));
    const row = Math.floor(localY / (CONFIG.TILE_SIZE + CONFIG.TILE_GAP));

    if (row >= 0 && row < CONFIG.GRID_ROWS && col >= 0 && col < CONFIG.GRID_COLS) {
      collapseClusterAt(row, col);
    }
  });
  gameContainer.addChild(gridHitArea);

  // Current piece
  if (GameState.currentPiece && !GameState.paused && !GameState.isCollapsing) {
    const pieceGraphics = new PIXI.Graphics();
    for (const tile of GameState.currentPiece.tiles) {
      const col = GameState.currentPiece.x + tile.dx;
      const row = GameState.currentPiece.y + tile.dy;
      if (row < 0) continue;

      const x = gridOffsetX + col * (CONFIG.TILE_SIZE + CONFIG.TILE_GAP);
      const y = gridOffsetY + row * (CONFIG.TILE_SIZE + CONFIG.TILE_GAP);
      const color = CONFIG.COLORS[tile.type];

      // Glow
      pieceGraphics.beginFill(color, 0.4);
      pieceGraphics.drawRoundedRect(x - 2, y - 2, CONFIG.TILE_SIZE + 4, CONFIG.TILE_SIZE + 4, 8);
      pieceGraphics.endFill();

      // Tile
      pieceGraphics.beginFill(color);
      pieceGraphics.drawRoundedRect(x, y, CONFIG.TILE_SIZE, CONFIG.TILE_SIZE, 6);
      pieceGraphics.endFill();

      // Highlight
      pieceGraphics.beginFill(0xffffff, 0.35);
      pieceGraphics.drawRoundedRect(x + 3, y + 3, CONFIG.TILE_SIZE - 6, CONFIG.TILE_SIZE / 3, 3);
      pieceGraphics.endFill();
    }
    gameContainer.addChild(pieceGraphics);
  }

  // Freeze indicator
  if (GameState.frozen && Date.now() < GameState.freezeEndTime) {
    const remaining = Math.ceil((GameState.freezeEndTime - Date.now()) / 1000);
    const freezeText = new PIXI.Text(`FREEZE: ${remaining}s`, {
      fontFamily: 'system-ui',
      fontSize: 18,
      fontWeight: 'bold',
      fill: CONFIG.COLORS.FREEZE
    });
    freezeText.anchor.set(0.5);
    freezeText.x = width / 2;
    freezeText.y = gridOffsetY - 30;
    gameContainer.addChild(freezeText);
  } else if (GameState.frozen) {
    GameState.frozen = false;
  }
}

// Get outline points for a cluster as a single polygon
function getClusterOutline(tiles) {
  if (tiles.length === 0) return [];

  const tileSet = new Set(tiles.map(t => `${t.row},${t.col}`));
  const edges = [];

  // Collect all outer edges
  for (const tile of tiles) {
    const x = gridOffsetX + tile.col * (CONFIG.TILE_SIZE + CONFIG.TILE_GAP);
    const y = gridOffsetY + tile.row * (CONFIG.TILE_SIZE + CONFIG.TILE_GAP);
    const s = CONFIG.TILE_SIZE;
    const padding = 3;

    // Top edge
    if (!tileSet.has(`${tile.row - 1},${tile.col}`)) {
      edges.push({ x1: x - padding, y1: y - padding, x2: x + s + padding, y2: y - padding });
    }
    // Bottom edge
    if (!tileSet.has(`${tile.row + 1},${tile.col}`)) {
      edges.push({ x1: x + s + padding, y1: y + s + padding, x2: x - padding, y2: y + s + padding });
    }
    // Left edge
    if (!tileSet.has(`${tile.row},${tile.col - 1}`)) {
      edges.push({ x1: x - padding, y1: y + s + padding, x2: x - padding, y2: y - padding });
    }
    // Right edge
    if (!tileSet.has(`${tile.row},${tile.col + 1}`)) {
      edges.push({ x1: x + s + padding, y1: y - padding, x2: x + s + padding, y2: y + s + padding });
    }
  }

  if (edges.length === 0) return [];

  // Build connected path from edges
  const points = [];
  const used = new Set();

  let current = edges[0];
  points.push({ x: current.x1, y: current.y1 });
  points.push({ x: current.x2, y: current.y2 });
  used.add(0);

  while (used.size < edges.length) {
    const lastPoint = points[points.length - 1];
    let found = false;

    for (let i = 0; i < edges.length; i++) {
      if (used.has(i)) continue;

      const edge = edges[i];
      const dist1 = Math.abs(edge.x1 - lastPoint.x) + Math.abs(edge.y1 - lastPoint.y);
      const dist2 = Math.abs(edge.x2 - lastPoint.x) + Math.abs(edge.y2 - lastPoint.y);

      if (dist1 < 2) {
        points.push({ x: edge.x2, y: edge.y2 });
        used.add(i);
        found = true;
        break;
      } else if (dist2 < 2) {
        points.push({ x: edge.x1, y: edge.y1 });
        used.add(i);
        found = true;
        break;
      }
    }

    if (!found) break;
  }

  return points;
}

      barFill.endFill();
      if (progress > 0.9) barFill.alpha = 0.7 + Math.sin(Date.now() / 100) * 0.3;
      hudContainer.addChild(barFill);
    }

    if (progress >= 1) {
      const readyText = new PIXI.Text('!', {

  // Header
  const header = new PIXI.Graphics();
  header.beginFill(CONFIG.COLORS.HUD_BG);
  header.drawRect(0, 0, width, 55);
  header.endFill();
  overlayContainer.addChild(header);

  const title = new PIXI.Text('MIX', {
    fontFamily: 'system-ui',
    fontSize: 26,
    fontWeight: 'bold',
    fill: CONFIG.COLORS.TEXT
  });
  title.anchor.set(0.5);
  title.x = width / 2;
  title.y = 28;
  overlayContainer.addChild(title);

  const closeBtn = createButton('X', width - 40, 28, () => setScreen('PLAY'), 45, 40);
  overlayContainer.addChild(closeBtn);

  // Layer grid
  const gridY = 75;
  const slotSize = Math.min(55, (width - 60) / 3);
  const slotGap = 10;
  const totalGridWidth = 3 * slotSize + 2 * slotGap;
  const gridStartX = (width - totalGridWidth) / 2;

  CATEGORY_TYPES.forEach((category, col) => {
    const color = CONFIG.COLORS[category];
    const activeLayers = GameState.activeLayers[category];

    const label = new PIXI.Text(category, {
      fontFamily: 'system-ui',
      fontSize: 12,
      fontWeight: 'bold',
      fill: color
    });
    label.anchor.set(0.5);
    label.x = gridStartX + col * (slotSize + slotGap) + slotSize / 2;
    label.y = gridY;
    overlayContainer.addChild(label);

    for (let row = 0; row < 3; row++) {
      const x = gridStartX + col * (slotSize + slotGap);
      const y = gridY + 18 + row * (slotSize + slotGap);

      const slot = new PIXI.Graphics();
      const isActive = row < activeLayers.length;

      if (isActive) {
        slot.beginFill(color, 0.7);
        slot.lineStyle(2, color);
      } else {
        slot.lineStyle(1, CONFIG.COLORS.TEXT_DIM, 0.4);
      }
      slot.drawRoundedRect(x, y, slotSize, slotSize, 8);
      slot.endFill();

      if (isActive) {
        const loop = activeLayers[row];
        const name = loop.name.split(' ')[0];
        const slotText = new PIXI.Text(name, {
          fontFamily: 'system-ui',
          fontSize: 9,
          fill: CONFIG.COLORS.TEXT
        });
        slotText.anchor.set(0.5);
        slotText.x = x + slotSize / 2;
        slotText.y = y + slotSize / 2;
        overlayContainer.addChild(slotText);

        slot.interactive = true;
        slot.cursor = 'pointer';
        slot.on('pointerdown', () => toggleLoop(category, loop.id));
      }

      overlayContainer.addChild(slot);
    }
  });

  // Cards section
  const cardsY = gridY + 210;
  const cardHeight = 42;
  const cardGap = 6;
  const cardWidth = (width - 50) / 3;
  const cardsAreaHeight = height - cardsY - 140;

  CATEGORY_TYPES.forEach((category, col) => {
    const loops = GameState.loops[category];
    const color = CONFIG.COLORS[category];
    const colX = 15 + col * (cardWidth + 10);
    const canUnlock = Math.floor(GameState.resources[category] / GameState.resourcesForUnlock);

    if (canUnlock > 0) {
      const readyText = new PIXI.Text(`${canUnlock} ready`, {
        fontFamily: 'system-ui',
        fontSize: 11,
        fill: color
      });
      readyText.anchor.set(0.5);
      readyText.x = colX + cardWidth / 2;
      readyText.y = cardsY - 14;
      overlayContainer.addChild(readyText);
    }

    loops.forEach((loop, i) => {
      const y = cardsY + i * (cardHeight + cardGap);
      if (y > height - 150) return;

      const isActive = GameState.activeLayers[category].some(l => l.id === loop.id);
      const isUnlocked = loop.unlocked;
      const isPreviewing = GameState.previewingLoop === loop.id;

      const card = new PIXI.Graphics();

      if (isActive) {
        card.beginFill(color, 0.85);
        card.lineStyle(2, color);
      } else if (isUnlocked) {
        card.beginFill(color, 0.25);
        card.lineStyle(1, color, 0.5);
      } else {
        card.beginFill(0x2a2a3e, 0.6);
        card.lineStyle(1, CONFIG.COLORS.TEXT_DIM, 0.3);
      }
      card.drawRoundedRect(colX, y, cardWidth, cardHeight, 6);
      card.endFill();

      card.interactive = true;
      card.cursor = 'pointer';

      if (isUnlocked) {
        card.on('pointerdown', () => {
          toggleLoop(category, loop.id);
          renderMixScreen();
        });
      } else {
        card.on('pointerdown', () => {
          unlockLoop(category, loop.id);
        });
      }

      overlayContainer.addChild(card);

      const nameText = new PIXI.Text(loop.name, {
        fontFamily: 'system-ui',
        fontSize: 11,
        fontWeight: isActive ? 'bold' : 'normal',
        fill: isUnlocked ? CONFIG.COLORS.TEXT : CONFIG.COLORS.TEXT_DIM
      });
      nameText.x = colX + 8;
      nameText.y = y + 7;
      overlayContainer.addChild(nameText);

      const status = isActive ? 'ON' : isUnlocked ? 'OFF' : `${GameState.resourcesForUnlock}`;
      const statusText = new PIXI.Text(status, {
        fontFamily: 'system-ui',
        fontSize: 10,
        fill: isActive ? 0x00ff00 : CONFIG.COLORS.TEXT_DIM
      });
      statusText.x = colX + 8;
      statusText.y = y + 25;
      overlayContainer.addChild(statusText);

      if (!isUnlocked) {
        const previewBtn = new PIXI.Graphics();
        previewBtn.beginFill(isPreviewing ? color : 0x444455, 0.8);
        previewBtn.drawRoundedRect(colX + cardWidth - 30, y + 6, 24, 30, 4);
        previewBtn.endFill();

        previewBtn.beginFill(0xffffff);
        if (isPreviewing) {
          previewBtn.drawRect(colX + cardWidth - 24, y + 13, 4, 16);
          previewBtn.drawRect(colX + cardWidth - 16, y + 13, 4, 16);
        } else {
          previewBtn.moveTo(colX + cardWidth - 24, y + 12);
          previewBtn.lineTo(colX + cardWidth - 24, y + 30);
          previewBtn.lineTo(colX + cardWidth - 10, y + 21);
          previewBtn.closePath();
        }
        previewBtn.endFill();

        previewBtn.interactive = true;
        previewBtn.cursor = 'pointer';
        previewBtn.on('pointerdown', (e) => {
          e.stopPropagation();
          togglePreview(category, loop.id);
        });
        overlayContainer.addChild(previewBtn);
      }
    });
  });

  // Controls
  const controlsY = height - 115;

  const bpmLabel = new PIXI.Text(`BPM: ${GameState.bpm}`, {
    fontFamily: 'system-ui',
    fontSize: 14,
    fill: CONFIG.COLORS.TEXT
  });
  bpmLabel.x = 20;
  bpmLabel.y = controlsY;
  overlayContainer.addChild(bpmLabel);

  const bpmSlider = createSlider(20, controlsY + 24, width - 40, GameState.bpm, 95, 135, (val) => {
    audioEngine.setBPM(Math.round(val));
    renderMixScreen();
  });
  overlayContainer.addChild(bpmSlider);

  const pitchLabel = new PIXI.Text(`PITCH: ${GameState.pitch >= 0 ? '+' : ''}${GameState.pitch}`, {
    fontFamily: 'system-ui',
    fontSize: 14,
    fill: CONFIG.COLORS.TEXT
  });
  pitchLabel.x = 20;
  pitchLabel.y = controlsY + 48;
  overlayContainer.addChild(pitchLabel);

  const pitchSlider = createSlider(20, controlsY + 72, width - 40, GameState.pitch + 5, 0, 10, (val) => {
    GameState.pitch = Math.round(val) - 5;
    renderMixScreen();
  });
  overlayContainer.addChild(pitchSlider);

  const backBtn = createButton('BACK TO GAME', width / 2, height - 28, () => setScreen('PLAY'), 180, 42);
  overlayContainer.addChild(backBtn);
}

function togglePreview(category, loopId) {
  if (GameState.previewingLoop === loopId) {
    audioEngine.stopPreview();
    GameState.previewingLoop = null;
  } else {
    audioEngine.stopPreview();
    audioEngine.startPreview(category, loopId);
    GameState.previewingLoop = loopId;
  }
  renderMixScreen();
}

function renderSettingsScreen() {
  const width = app.screen.width;
  const height = app.screen.height;

  const bg = new PIXI.Graphics();
  bg.beginFill(CONFIG.COLORS.BACKGROUND);
  bg.drawRect(0, 0, width, height);
  bg.endFill();
  overlayContainer.addChild(bg);

  const title = new PIXI.Text('SETTINGS', {
    fontFamily: 'system-ui',
    fontSize: 30,
    fontWeight: 'bold',
    fill: CONFIG.COLORS.TEXT
  });
  title.anchor.set(0.5);
  title.x = width / 2;
  title.y = 70;
  overlayContainer.addChild(title);

  const infoText = new PIXI.Text('Volume and other settings\ncoming soon!', {
    fontFamily: 'system-ui',
    fontSize: 16,
    fill: CONFIG.COLORS.TEXT_DIM,
    align: 'center'
  });
  infoText.anchor.set(0.5);
  infoText.x = width / 2;
  infoText.y = height / 2;
  overlayContainer.addChild(infoText);

  const backBtn = createButton('BACK', width / 2, height - 100, () => {
    setScreen(GameState.score > 0 ? 'PAUSE' : 'HOME');
  }, 160, 50);
  overlayContainer.addChild(backBtn);
}

// ============================================================================
// UI HELPERS
// ============================================================================

function createButton(text, x, y, action, w = 160, h = 45) {
  const container = new PIXI.Container();

  const bg = new PIXI.Graphics();
  bg.beginFill(CONFIG.COLORS.HUD_BG);
  bg.lineStyle(2, CONFIG.COLORS.VIBE);
  bg.drawRoundedRect(-w/2, -h/2, w, h, 10);
  bg.endFill();
  container.addChild(bg);

  const label = new PIXI.Text(text, {
    fontFamily: 'system-ui',
    fontSize: Math.min(16, h * 0.4),
    fontWeight: 'bold',
    fill: CONFIG.COLORS.TEXT
  });
  label.anchor.set(0.5);
  container.addChild(label);

  container.x = x;
  container.y = y;
  container.interactive = true;
  container.cursor = 'pointer';

  container.on('pointerdown', () => container.scale.set(0.95));
  container.on('pointerup', () => { container.scale.set(1); action(); });
  container.on('pointerupoutside', () => container.scale.set(1));

  return container;
}

function createSlider(x, y, width, value, min, max, onChange) {
  const container = new PIXI.Container();
  container.x = x;
  container.y = y;

  const track = new PIXI.Graphics();
  track.beginFill(0x333344);
  track.drawRoundedRect(0, 0, width, 8, 4);
  track.endFill();
  container.addChild(track);

  const percent = (value - min) / (max - min);

  const fill = new PIXI.Graphics();
  fill.beginFill(CONFIG.COLORS.VIBE);
  fill.drawRoundedRect(0, 0, width * percent, 8, 4);
  fill.endFill();
  container.addChild(fill);

  const handle = new PIXI.Graphics();
  handle.beginFill(CONFIG.COLORS.TEXT);
  handle.drawCircle(width * percent, 4, 10);
  handle.endFill();
  container.addChild(handle);

  track.interactive = true;
  track.hitArea = new PIXI.Rectangle(0, -12, width, 32);
  track.on('pointerdown', (e) => {
    const localX = e.data.global.x - x;
    const newPercent = Math.max(0, Math.min(1, localX / width));
    onChange(min + (max - min) * newPercent);
  });

  return container;
}

let toastTimeout;
function showToast(message) {
  const existing = overlayContainer.children.find(c => c.isToast);
  if (existing) overlayContainer.removeChild(existing);

  const width = app.screen.width;

  const container = new PIXI.Container();
  container.isToast = true;

  const bg = new PIXI.Graphics();
  bg.beginFill(CONFIG.COLORS.HUD_BG, 0.95);
  bg.drawRoundedRect(0, 0, width - 40, 50, 10);
  bg.endFill();
  container.addChild(bg);

  const text = new PIXI.Text(message, {
    fontFamily: 'system-ui',
    fontSize: 14,
    fill: CONFIG.COLORS.TEXT
  });
  text.anchor.set(0.5);
  text.x = (width - 40) / 2;
  text.y = 25;
  container.addChild(text);

  container.x = 20;
  container.y = 75;
  overlayContainer.addChild(container);

  clearTimeout(toastTimeout);
  toastTimeout = setTimeout(() => {
    if (container.parent) overlayContainer.removeChild(container);
  }, 2000);
}

// ============================================================================
// GAME LOGIC
// ============================================================================

function setScreen(screen) {
  GameState.screen = screen;
  GameState.paused = (screen === 'PAUSE' || screen === 'MIX');
  renderCurrentScreen();
}

async function startGame() {
  await audioEngine.init();

  GameState.score = 0;
  GameState.resources = { BEAT: 0, VIBE: 0, MELODY: 0 };
  GameState.activeLayers = { BEAT: [], VIBE: [], MELODY: [] };
  GameState.loops = JSON.parse(JSON.stringify(LOOPS));
  GameState.gameOver = false;
  GameState.paused = false;
  GameState.combo = 0;
  GameState.isCollapsing = false;
  GameState.validClusters = [];
  GameState.frozen = false;

  initGrid();
  spawnPiece();

  setScreen('PLAY');

  toggleLoop('BEAT', 'trap_808');
  toggleLoop('VIBE', 'warm_pad');
  toggleLoop('MELODY', 'piano_chords');
}

function spawnPiece() {
  if (GameState.nextPiece) {
    GameState.currentPiece = GameState.nextPiece;
  } else {
    GameState.currentPiece = createPiece();
  }
  GameState.nextPiece = createPiece();

  if (!canPlacePiece(GameState.currentPiece, GameState.currentPiece.x, GameState.currentPiece.y)) {
    GameState.gameOver = true;
    audioEngine.stopAllLoops();
    showGameOver();
  }
}

function showGameOver() {
  const width = app.screen.width;
  const height = app.screen.height;

  const bg = new PIXI.Graphics();
  bg.beginFill(0x000000, 0.8);
  bg.drawRect(0, 0, width, height);
  bg.endFill();
  bg.interactive = true;
  overlayContainer.addChild(bg);

  const panel = new PIXI.Graphics();
  panel.beginFill(CONFIG.COLORS.HUD_BG);
  panel.lineStyle(3, CONFIG.COLORS.BEAT);
  panel.drawRoundedRect(width / 2 - 140, height / 2 - 150, 280, 300, 18);
  panel.endFill();
  overlayContainer.addChild(panel);

  const title = new PIXI.Text('GAME OVER', {
    fontFamily: 'system-ui',
    fontSize: 32,
    fontWeight: 'bold',
    fill: CONFIG.COLORS.BEAT
  });
  title.anchor.set(0.5);
  title.x = width / 2;
  title.y = height / 2 - 110;
  overlayContainer.addChild(title);

  const scoreText = new PIXI.Text(GameState.score.toLocaleString(), {
    fontFamily: 'system-ui',
    fontSize: 42,
    fontWeight: 'bold',
    fill: CONFIG.COLORS.WILD
  });
  scoreText.anchor.set(0.5);
  scoreText.x = width / 2;
  scoreText.y = height / 2 - 50;
  overlayContainer.addChild(scoreText);

  const playAgainBtn = createButton('PLAY AGAIN', width / 2, height / 2 + 30, () => {
    overlayContainer.removeChildren();
    startGame();
  }, 180, 50);
  overlayContainer.addChild(playAgainBtn);

  const homeBtn = createButton('HOME', width / 2, height / 2 + 95, () => {
    overlayContainer.removeChildren();
    setScreen('HOME');
  }, 140, 45);
  overlayContainer.addChild(homeBtn);
}

function toggleLoop(category, loopId) {
  const activeLayers = GameState.activeLayers[category];
  const index = activeLayers.findIndex(l => l.id === loopId);

  if (index !== -1) {
    audioEngine.stopLoop(category, loopId);
    activeLayers.splice(index, 1);
  } else {
    if (activeLayers.length >= CONFIG.MAX_LAYERS_PER_CATEGORY) {
      showToast(`Max ${category} layers!`);
      return;
    }

    const loop = GameState.loops[category].find(l => l.id === loopId);
    if (loop && loop.unlocked) {
      audioEngine.startLoop(category, loopId);
      activeLayers.push(loop);
    }
  }

  if (GameState.screen === 'MIX') renderMixScreen();
}

function unlockLoop(category, loopId) {
  const cost = GameState.resourcesForUnlock;

  if (GameState.resources[category] < cost) {
    showToast(`Need ${cost - GameState.resources[category]} more ${category} pts!`);
    return;
  }

  const loop = GameState.loops[category].find(l => l.id === loopId);
  if (loop && !loop.unlocked) {
    GameState.resources[category] -= cost;
    loop.unlocked = true;
    audioEngine.playUnlock();
    showToast(`${loop.name} unlocked!`);
    renderMixScreen();
  }
}

function sleep(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

// ============================================================================
// INPUT
// ============================================================================

function handleInput(key) {
  if (GameState.screen !== 'PLAY' || GameState.paused || GameState.gameOver || GameState.isCollapsing) return;
  if (!GameState.currentPiece) return;

  switch (key) {
    case 'ArrowLeft':
      if (canPlacePiece(GameState.currentPiece, GameState.currentPiece.x - 1, GameState.currentPiece.y)) {
        GameState.currentPiece.x--;
      }
      break;
    case 'ArrowRight':
      if (canPlacePiece(GameState.currentPiece, GameState.currentPiece.x + 1, GameState.currentPiece.y)) {
        GameState.currentPiece.x++;
      }
      break;
    case 'ArrowDown':
      while (canPlacePiece(GameState.currentPiece, GameState.currentPiece.x, GameState.currentPiece.y + 1)) {
        GameState.currentPiece.y++;
      }
      break;
    case 'ArrowUp':
    case ' ':
      rotatePiece(GameState.currentPiece);
      break;
  }

  renderGame();
}

document.addEventListener('keydown', (e) => {
  if (['ArrowLeft', 'ArrowRight', 'ArrowDown', 'ArrowUp', ' '].includes(e.key)) {
    e.preventDefault();
    handleInput(e.key);
  }
});

// Touch controls with rotation
let touchStartX = null, touchStartY = null, touchStartTime = null;

document.addEventListener('touchstart', (e) => {
  if (e.touches.length === 1) {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
    touchStartTime = Date.now();
  }
}, { passive: true });

document.addEventListener('touchend', (e) => {
  if (GameState.screen !== 'PLAY' || !touchStartX) return;

  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  const elapsed = Date.now() - touchStartTime;

  // Quick tap = handled by grid click for collapse
  if (Math.abs(dx) < 20 && Math.abs(dy) < 20 && elapsed < 300) {
    touchStartX = null;
    return;
  }

  // Swipe gestures for piece control
  if (!GameState.isCollapsing && !GameState.paused && GameState.currentPiece) {
    if (Math.abs(dx) > Math.abs(dy)) {
      // Horizontal swipe
      if (Math.abs(dx) > 30) {
        handleInput(dx > 0 ? 'ArrowRight' : 'ArrowLeft');
      }
    } else {
      // Vertical swipe
      if (dy > 40) {
        handleInput('ArrowDown');
      } else if (dy < -40) {
        // Swipe up = rotate
        rotatePiece(GameState.currentPiece);
        renderGame();
      }
    }
  }

  touchStartX = null;
  touchStartY = null;
  touchStartTime = null;
}, { passive: true });

// ============================================================================
// GAME LOOP
// ============================================================================

let lastTime = 0;
let fallAccumulator = 0;

function gameLoop(currentTime) {
  const deltaTime = currentTime - lastTime;
  lastTime = currentTime;

  updateParticles();
  updateScreenShake();

  // Update visualizer state decay
  if (GameState.screen === 'PLAY') {
    renderBackground();
  }

  if (GameState.screen === 'PLAY' && !GameState.paused && !GameState.gameOver && !GameState.isCollapsing && GameState.currentPiece) {
    // Check freeze
    const fallSpeed = GameState.frozen ? CONFIG.FALL_SPEED * 0.3 : CONFIG.FALL_SPEED;

    fallAccumulator += deltaTime;
    const fallInterval = 1000 / fallSpeed;

    if (fallAccumulator >= fallInterval) {
      fallAccumulator = 0;

      if (canPlacePiece(GameState.currentPiece, GameState.currentPiece.x, GameState.currentPiece.y + 1)) {
        GameState.currentPiece.y++;
      } else {
        placePiece(GameState.currentPiece);
        GameState.currentPiece = null;

        renderGame();

        setTimeout(() => {
          if (!GameState.gameOver && !GameState.isCollapsing) {
            spawnPiece();
            renderGame();
          }
        }, 100);
      }

      renderGame();
    }
  }

  requestAnimationFrame(gameLoop);
}

// ============================================================================
// INIT
// ============================================================================

initPixi();
renderCurrentScreen();
requestAnimationFrame(gameLoop);

console.log('SONGSUGAR initialized - Tap clusters to clear!');
</script>
