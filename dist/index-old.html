<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>SONGSUGAR — Soundscape</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Barlow+Condensed:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --beat:#ff2d6e; --vibe:#00e5ff; --melody:#39ff14; --wild:#ffd700;
  --ep:#ff9de2; --album:#ffd700;
  --viral:#ff4444; --chart:#00ffaa; --collab:#aaffee;
  --bg:#07070f; --text:#eeeeff; --dim:rgba(200,200,255,0.4);
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
  --hud-width:60px;
}
@media (min-width: 480px) { :root { --hud-width:72px; } }
@media (min-width: 768px) { :root { --hud-width:84px; } }
@media (min-width: 1024px) { :root { --hud-width:96px; } }

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;background:#07070f;color:var(--text);
  font-family:'Barlow Condensed',sans-serif;touch-action:none;
  overscroll-behavior:none;-webkit-overflow-scrolling:touch;}

#bg-canvas{position:fixed;inset:0;z-index:0;}
#crt{position:fixed;inset:0;z-index:999;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.025) 3px,rgba(0,0,0,0.025) 4px);}

/* ROOT: left HUD + play column */
#app{position:relative;z-index:1;width:100%;height:100%;
  display:flex;flex-direction:row;align-items:stretch;overflow:hidden;}

/* LEFT HUD - responsive width for mobile */
#hud{
  width:var(--hud-width);flex-shrink:0;
  padding:max(8px,var(--safe-top)) 4px 8px;
  background:linear-gradient(180deg,rgba(8,8,20,0.96),rgba(4,4,14,0.98));
  border-right:1px solid rgba(255,255,255,0.05);
  display:flex;flex-direction:column;align-items:center;
  position:relative;z-index:10;
  box-shadow:2px 0 20px rgba(0,0,0,0.5);
}
#rank-pill{
  display:flex;flex-direction:column;align-items:center;width:100%;
  background:linear-gradient(180deg,rgba(255,230,0,0.18),rgba(255,180,0,0.06));
  border:1px solid rgba(255,230,0,0.4);border-radius:6px;
  padding:5px 2px 4px;margin-bottom:5px;
  box-shadow:0 0 12px rgba(255,215,0,0.15),inset 0 0 8px rgba(255,215,0,0.05);
}
#rank-num{font-family:'Press Start 2P',monospace;font-size:14px;line-height:1;
  color:var(--wild);text-shadow:0 0 15px rgba(255,230,0,0.7);}
@media (min-width:480px){#rank-num{font-size:16px;}}
@media (min-width:768px){#rank-num{font-size:18px;}}
#rank-lbl{font-family:'Press Start 2P',monospace;font-size:3px;color:var(--dim);
  margin-top:2px;letter-spacing:0.5px;}
@media (min-width:480px){#rank-lbl{font-size:3.5px;}}
#stage-tag{
  font-family:'Press Start 2P',monospace;font-size:3px;
  color:var(--vibe);letter-spacing:0.5px;text-align:center;
  writing-mode:vertical-rl;transform:rotate(180deg);
  line-height:1.3;margin-bottom:6px;
  text-shadow:0 0 10px rgba(0,229,255,0.6);max-height:70px;overflow:hidden;
}
@media (min-width:480px){#stage-tag{font-size:3.5px;max-height:85px;}}
.stat-block{width:100%;display:flex;flex-direction:column;align-items:center;margin-bottom:6px;
  transition:transform 0.15s ease,filter 0.15s ease;}
.stat-block.flash{transform:scale(1.15);filter:brightness(1.5) drop-shadow(0 0 10px currentColor);}
.stat-icon-big{width:16px;height:16px;margin-bottom:2px;filter:drop-shadow(0 0 6px currentColor);
  transition:transform 0.2s ease;position:relative;}
@media (min-width:480px){.stat-icon-big{width:18px;height:18px;}}
@media (min-width:768px){.stat-icon-big{width:20px;height:20px;}}

/* BEAT icon - circle with inner rings (drum) */
.hud-icon-beat::before{content:'';position:absolute;inset:0;border-radius:50%;
  border:2px solid currentColor;box-shadow:inset 0 0 3px currentColor;}
.hud-icon-beat::after{content:'';position:absolute;top:25%;left:25%;right:25%;bottom:25%;
  border-radius:50%;background:currentColor;opacity:0.6;}

/* VIBE icon - wave lines */
.hud-icon-vibe{overflow:hidden;}
.hud-icon-vibe::before{content:'';position:absolute;left:0;right:0;top:35%;height:2px;
  background:currentColor;box-shadow:0 -5px 0 currentColor,0 5px 0 currentColor;
  border-radius:2px;}

/* MELODY icon - note shape */
.hud-icon-melody::before{content:'';position:absolute;bottom:2px;left:3px;width:5px;height:5px;
  background:currentColor;border-radius:50%;}
.hud-icon-melody::after{content:'';position:absolute;bottom:5px;left:6px;width:2px;height:10px;
  background:currentColor;border-radius:1px;}

/* SCORE icon - star */
.hud-icon-score{clip-path:polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);
  background:currentColor;}
.stat-val{font-family:'Press Start 2P',monospace;font-size:10px;font-weight:700;
  line-height:1.1;text-align:center;margin-bottom:2px;transition:transform 0.2s ease,color 0.2s ease;
  text-shadow:0 0 8px currentColor;}
@media (min-width:480px){.stat-val{font-size:12px;}}
@media (min-width:768px){.stat-val{font-size:14px;}}
.stat-name{font-family:'Press Start 2P',monospace;font-size:5px;color:var(--dim);
  letter-spacing:0.5px;text-align:center;margin-bottom:3px;}
@media (min-width:480px){.stat-name{font-size:6px;}}
@media (min-width:768px){.stat-name{font-size:7px;}}
.stat-track{width:100%;height:3px;background:rgba(255,255,255,0.08);border-radius:2px;overflow:hidden;
  box-shadow:inset 0 1px 3px rgba(0,0,0,0.4);}
@media (min-width:480px){.stat-track{height:4px;}}
.stat-fill{height:100%;border-radius:2px;transition:width 0.4s cubic-bezier(.4,0,.2,1);
  box-shadow:0 0 8px currentColor;}
#streams-fill  {background:linear-gradient(90deg,#00b4cc,var(--vibe),#39ff14);}
#followers-fill{background:linear-gradient(90deg,#8822cc,var(--beat),#ff80ff);}
#visibility-fill{background:linear-gradient(90deg,#cc8800,var(--wild),#ff9900);}
.hud-div{width:80%;height:1px;background:rgba(255,255,255,0.07);margin:3px 0;}

/* PLAY COLUMN */
#play-col{flex:1;display:flex;flex-direction:column;align-items:center;overflow:hidden;position:relative;}

/* GAME AREA — full height, board centred */
#game-area{
  flex:1;display:flex;align-items:center;justify-content:center;
  width:100%;position:relative;overflow:hidden;
}
#board-canvas{display:block;border-radius:8px;
  box-shadow:0 0 40px rgba(0,0,0,0.8),0 0 80px rgba(0,0,0,0.5),
    inset 0 0 30px rgba(0,0,0,0.3),
    0 0 100px rgba(0,229,255,0.08),0 0 150px rgba(255,45,110,0.05);
  border:1px solid rgba(255,255,255,0.06);}

/* NEXT PIECE + hint bar — slim strip above bottom safe area */
#info-bar{
  width:100%;display:flex;align-items:center;justify-content:space-between;
  padding:6px 8px max(10px,calc(var(--safe-bottom)+6px));
  background:linear-gradient(0deg,rgba(3,3,14,0.98) 60%,transparent);
  position:relative;z-index:10;
  gap:8px;
}
@media (min-width:480px){#info-bar{padding:8px 12px max(12px,calc(var(--safe-bottom)+8px));}}
.info-label{font-family:'Press Start 2P',monospace;font-size:4px;color:var(--dim);letter-spacing:1px;margin-bottom:2px;}
@media (min-width:480px){.info-label{font-size:5px;}}
#next-canvas{display:block;border-radius:6px;box-shadow:0 0 15px rgba(0,0,0,0.5);
  border:1px solid rgba(255,255,255,0.08);}
#ability-hint{font-family:'Press Start 2P',monospace;font-size:4px;color:var(--dim);
  text-align:right;line-height:1.9;max-width:120px;opacity:0.8;}
@media (min-width:480px){#ability-hint{font-size:5px;max-width:160px;}}

/* SWIPE ZONES — invisible touch areas covering the full board */
#swipe-left,#swipe-right{
  position:absolute;top:0;bottom:0;width:30%;
  z-index:5;cursor:pointer;
}
#swipe-left{left:0;}
#swipe-right{right:0;}

/* Combo popup - AAA QUALITY */
#combo-text{
  position:absolute;top:22%;left:50%;transform:translateX(-50%);
  font-family:'Press Start 2P',monospace;font-size:clamp(16px,4vw,28px);text-align:center;
  pointer-events:none;z-index:20;opacity:0;white-space:nowrap;
  text-shadow:0 0 30px currentColor,0 0 60px currentColor,0 0 90px currentColor,
    0 2px 0 rgba(0,0,0,0.8),0 4px 8px rgba(0,0,0,0.5);
  filter:drop-shadow(0 0 20px currentColor);
  letter-spacing:3px;
  background:linear-gradient(180deg,#fff 0%,currentColor 50%,rgba(255,255,255,0.7) 100%);
  -webkit-background-clip:text;background-clip:text;
  -webkit-text-stroke:1px currentColor;
}
#combo-text.show{animation:comboAnim 1.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;}
@keyframes comboAnim{
  0%  {opacity:0;transform:translateX(-50%) translateY(30px) scale(0.3) rotateX(90deg);filter:blur(10px);}
  15% {opacity:1;transform:translateX(-50%) translateY(-5px) scale(1.4) rotateX(0deg);filter:blur(0);}
  25% {transform:translateX(-50%) translateY(0) scale(1.1) rotateX(0deg);}
  40% {transform:translateX(-50%) translateY(-8px) scale(1.15);}
  60% {opacity:1;transform:translateX(-50%) translateY(-4px) scale(1.05);}
  100%{opacity:0;transform:translateX(-50%) translateY(-40px) scale(0.9);filter:blur(4px);}
}
/* Combo shake effect */
#combo-text.shake{animation:comboAnim 1.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards, comboShake 0.1s ease-in-out 3;}
@keyframes comboShake{
  0%,100%{transform:translateX(-50%) translateY(-5px) scale(1.4);}
  25%{transform:translateX(calc(-50% + 4px)) translateY(-5px) scale(1.4);}
  75%{transform:translateX(calc(-50% - 4px)) translateY(-5px) scale(1.4);}
}

/* Toast - PREMIUM STYLING */
#toast{
  position:fixed;top:max(52px,calc(var(--safe-top)+44px));left:50%;
  transform:translateX(-50%) translateY(-12px) scale(0.9);
  font-family:'Press Start 2P',monospace;font-size:clamp(6px,1.5vw,9px);padding:10px 20px;
  border-radius:8px;border:2px solid currentColor;
  background:linear-gradient(135deg,rgba(8,8,20,0.98),rgba(20,15,35,0.98));
  pointer-events:none;z-index:200;opacity:0;
  transition:all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
  white-space:nowrap;letter-spacing:2px;
  text-shadow:0 0 12px currentColor,0 0 24px currentColor;
  box-shadow:0 0 20px currentColor,0 0 40px rgba(0,0,0,0.5),
    inset 0 0 20px rgba(255,255,255,0.05),inset 0 1px 0 rgba(255,255,255,0.1);
  backdrop-filter:blur(8px);
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0) scale(1);}

/* Overlay - Premium Title Screen */
#overlay{
  position:fixed;inset:0;
  background:radial-gradient(ellipse at 50% 30%,rgba(20,10,40,0.97),rgba(2,2,12,0.98));
  display:none;flex-direction:column;align-items:center;justify-content:center;
  z-index:500;gap:20px;padding:32px;
  overflow:hidden;
}
#overlay::before{
  content:'';position:absolute;inset:0;
  background:url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events:none;
}
#overlay.show{display:flex;}
#overlay h2{
  font-family:'Press Start 2P',monospace;font-size:clamp(18px,6vw,32px);text-align:center;line-height:1.4;
  background:linear-gradient(180deg,#fff 0%,var(--vibe) 50%,var(--beat) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  text-shadow:none;filter:drop-shadow(0 0 20px var(--vibe)) drop-shadow(0 0 40px var(--beat));
  animation:titleGlow 3s ease-in-out infinite alternate;
  letter-spacing:3px;position:relative;z-index:1;
}
@keyframes titleGlow{
  0%{filter:drop-shadow(0 0 15px var(--vibe)) drop-shadow(0 0 30px rgba(255,45,110,0.4));}
  100%{filter:drop-shadow(0 0 25px var(--beat)) drop-shadow(0 0 50px rgba(0,229,255,0.5));}
}
#overlay-subtitle{
  font-family:'Press Start 2P',monospace;font-size:clamp(5px,2vw,8px);
  color:var(--wild);letter-spacing:4px;text-shadow:0 0 15px var(--wild);
  margin-top:-10px;animation:subtitlePulse 2s ease-in-out infinite;
}
@keyframes subtitlePulse{0%,100%{opacity:0.7;}50%{opacity:1;}}
#overlay-msg{
  font-family:'Press Start 2P',monospace;font-size:clamp(5px,1.5vw,7px);color:var(--dim);
  text-align:center;line-height:2.8;max-width:320px;position:relative;z-index:1;
}
#overlay-btn{
  font-family:'Press Start 2P',monospace;font-size:clamp(7px,2vw,10px);
  padding:14px 36px;
  background:linear-gradient(135deg,rgba(255,45,110,0.15),rgba(0,229,255,0.15));
  border:2px solid var(--vibe);color:var(--vibe);border-radius:8px;
  cursor:pointer;letter-spacing:3px;position:relative;z-index:1;
  box-shadow:0 0 20px rgba(0,229,255,0.3),inset 0 0 20px rgba(0,229,255,0.1);
  transition:all 0.25s ease;text-transform:uppercase;
}
#overlay-btn:hover{
  transform:scale(1.05);
  box-shadow:0 0 35px rgba(0,229,255,0.5),inset 0 0 25px rgba(0,229,255,0.2);
  border-color:#fff;color:#fff;
}
#overlay-btn:active{
  background:linear-gradient(135deg,var(--beat),var(--vibe));
  color:#000;transform:scale(0.98);
}
/* Animated background orbs */
.overlay-orb{
  position:absolute;border-radius:50%;filter:blur(60px);opacity:0.4;
  animation:orbFloat 8s ease-in-out infinite;pointer-events:none;
}
.overlay-orb:nth-child(1){width:200px;height:200px;background:var(--beat);top:10%;left:10%;animation-delay:0s;}
.overlay-orb:nth-child(2){width:150px;height:150px;background:var(--vibe);top:60%;right:15%;animation-delay:-3s;}
.overlay-orb:nth-child(3){width:180px;height:180px;background:var(--melody);bottom:20%;left:20%;animation-delay:-5s;}
@keyframes orbFloat{
  0%,100%{transform:translate(0,0) scale(1);}
  25%{transform:translate(30px,-20px) scale(1.1);}
  50%{transform:translate(-20px,30px) scale(0.9);}
  75%{transform:translate(20px,20px) scale(1.05);}
}

/* Loop Panel - Mobile Optimized Slide-in */
#loop-panel{
  position:fixed;right:-100%;top:0;bottom:0;
  width:min(280px,85vw);
  background:linear-gradient(180deg,rgba(7,7,18,0.98),rgba(5,3,14,0.99));
  border-left:1px solid rgba(255,255,255,0.1);
  z-index:400;transition:right 0.35s cubic-bezier(0.4,0,0.2,1);
  overflow:hidden;display:flex;flex-direction:column;
  box-shadow:-5px 0 40px rgba(0,0,0,0.7);
  padding-top:env(safe-area-inset-top,0px);
  padding-bottom:env(safe-area-inset-bottom,0px);
}
#loop-panel.open{right:0;}
#loop-panel-backdrop{
  position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:399;
  opacity:0;pointer-events:none;transition:opacity 0.3s ease;
}
#loop-panel.open ~ #loop-panel-backdrop{opacity:1;pointer-events:auto;}
.loop-panel-header{
  display:flex;justify-content:space-between;align-items:center;
  padding:14px 16px;
  background:linear-gradient(90deg,rgba(255,45,110,0.1),rgba(0,229,255,0.1));
  font-family:'Press Start 2P',monospace;font-size:9px;
  border-bottom:1px solid rgba(255,255,255,0.12);
  color:var(--vibe);text-shadow:0 0 10px var(--vibe);
}
#loop-panel-close{
  background:rgba(255,255,255,0.1);border:none;color:var(--text);font-size:20px;
  cursor:pointer;padding:4px 10px;border-radius:6px;
  transition:all 0.15s;
}
#loop-panel-close:active{background:rgba(255,255,255,0.2);transform:scale(0.95);}
.loop-categories{
  flex:1;overflow-y:auto;padding:12px;
  -webkit-overflow-scrolling:touch;
}
.loop-category{margin-bottom:18px;}
.cat-header{
  font-family:'Press Start 2P',monospace;font-size:8px;
  margin-bottom:10px;letter-spacing:2px;
  display:flex;align-items:center;gap:8px;
}
.cat-header::after{content:'';flex:1;height:1px;background:currentColor;opacity:0.3;}
.loop-list{display:flex;flex-direction:column;gap:6px;}
.loop-item{
  display:flex;justify-content:space-between;align-items:center;
  padding:12px 14px;background:rgba(255,255,255,0.05);
  border-radius:8px;cursor:pointer;transition:all 0.2s ease;
  font-size:12px;border:1px solid transparent;
  -webkit-tap-highlight-color:transparent;
}
.loop-item:active{transform:scale(0.98);background:rgba(255,255,255,0.12);}
.loop-item.locked{opacity:0.4;filter:grayscale(0.5);}
.loop-item.active{
  background:linear-gradient(135deg,rgba(255,255,255,0.12),rgba(255,255,255,0.06));
  border:1px solid currentColor;
  box-shadow:0 0 15px currentColor,inset 0 0 15px rgba(255,255,255,0.05);
}
.loop-item .name{flex:1;font-weight:600;}
.loop-item .cost{
  font-family:'Press Start 2P',monospace;font-size:7px;
  padding:3px 8px;border-radius:4px;background:rgba(0,0,0,0.3);
}
.loop-item .status{font-size:14px;margin-left:10px;filter:drop-shadow(0 0 4px currentColor);}
#loop-panel-toggle{
  position:fixed;right:8px;top:50%;transform:translateY(-50%);
  width:44px;height:44px;border-radius:50%;
  background:linear-gradient(135deg,var(--beat),var(--vibe));
  border:2px solid rgba(255,255,255,0.2);
  font-size:20px;cursor:pointer;z-index:398;
  box-shadow:0 0 20px rgba(0,229,255,0.5),0 4px 15px rgba(0,0,0,0.4);
  transition:all 0.25s ease;
  display:flex;align-items:center;justify-content:center;
}
#loop-panel-toggle:active{transform:translateY(-50%) scale(0.92);}
#loop-panel-toggle.hidden{display:none;}
@media (min-width:768px){
  #loop-panel{width:300px;right:-320px;top:10%;bottom:10%;border-radius:12px 0 0 12px;}
  #loop-panel.open{right:0;}
}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>

<body>
<canvas id="bg-canvas"></canvas>
<div id="crt"></div>
<div id="app">

  <!-- LEFT VERTICAL HUD -->
  <div id="hud">
    <div id="rank-pill">
      <div id="rank-num">#99</div>
      <div id="rank-lbl">CHART</div>
    </div>
    <div id="stage-tag">BEDROOM PRODUCER</div>
    <div class="hud-div"></div>
    <!-- Resource Points -->
    <div class="stat-block">
      <div class="stat-icon-big hud-icon-beat" style="color:var(--beat)"></div>
      <div class="stat-val" id="beat-val" style="color:var(--beat)">0</div>
      <div class="stat-name">BEAT</div>
      <div class="stat-track"><div class="stat-fill" id="beat-fill" style="width:0%;background:var(--beat)"></div></div>
    </div>
    <div class="stat-block">
      <div class="stat-icon-big hud-icon-vibe" style="color:var(--vibe)"></div>
      <div class="stat-val" id="vibe-val" style="color:var(--vibe)">0</div>
      <div class="stat-name">VIBE</div>
      <div class="stat-track"><div class="stat-fill" id="vibe-fill" style="width:0%;background:var(--vibe)"></div></div>
    </div>
    <div class="stat-block">
      <div class="stat-icon-big hud-icon-melody" style="color:var(--melody)"></div>
      <div class="stat-val" id="melody-val" style="color:var(--melody)">0</div>
      <div class="stat-name">MELODY</div>
      <div class="stat-track"><div class="stat-fill" id="melody-fill" style="width:0%;background:var(--melody)"></div></div>
    </div>
    <div class="hud-div"></div>
    <!-- Score -->
    <div class="stat-block">
      <div class="stat-icon-big hud-icon-score" style="color:var(--wild)"></div>
      <div class="stat-val" id="streams-val" style="color:var(--wild)">0</div>
      <div class="stat-name">SCORE</div>
      <div class="stat-track"><div class="stat-fill" id="streams-fill" style="width:0%;background:var(--wild)"></div></div>
    </div>
  </div>

  <!-- PLAY COLUMN -->
  <div id="play-col">
    <div id="game-area">
      <canvas id="board-canvas"></canvas>
      <div id="combo-text"></div>
    </div>
    <div id="info-bar">
      <div>
        <div class="info-label">NEXT</div>
        <canvas id="next-canvas" width="60" height="60"></canvas>
      </div>
      <div id="ability-hint"></div>
    </div>

// ── AUDIO ENGINE ─────────────────────────────────────
let audioCtx = null;
function getAudio() {
  if(!audioCtx) { audioCtx = new (window.AudioContext||window.webkitAudioContext)(); }
  if(audioCtx.state==='suspended') audioCtx.resume();
  return audioCtx;
}

// Master compressor so everything stays punchy
let masterOut = null;
function getMaster() {
  if(masterOut) return masterOut;
  const ac = getAudio();
  const comp = ac.createDynamicsCompressor();
  comp.threshold.value=-12; comp.knee.value=8;
  comp.ratio.value=4; comp.attack.value=0.003; comp.release.value=0.15;
  comp.connect(ac.destination);
  masterOut = comp;
  return masterOut;
}

function note(freq, type='sine', vol=0.18, atk=0.008, dec=0.22, freqEnd=null) {
  try {
    const ac=getAudio(), o=ac.createOscillator(), g=ac.createGain();
    const now=ac.currentTime;
    o.type=type; o.frequency.setValueAtTime(freq,now);
    if(freqEnd) o.frequency.exponentialRampToValueAtTime(freqEnd,now+dec*0.6);
    g.gain.setValueAtTime(0,now);
    g.gain.linearRampToValueAtTime(vol,now+atk);
    g.gain.exponentialRampToValueAtTime(0.001,now+atk+dec);
    o.connect(g); g.connect(getMaster());
    o.start(now); o.stop(now+atk+dec+0.05);
  } catch(e){}
}

function chord(freqs, type='sine', vol=0.1, dec=0.3, stagger=0.025) {
  freqs.forEach((f,i)=>setTimeout(()=>note(f,type,vol,0.006,dec),i*stagger*1000));
}

function popSound(pitch=880) {
  // The satisfying Candy Crush 'pop' — sine with pitch drop
  note(pitch*1.2,'sine',0.22,0.004,0.12,pitch*0.5);
  note(pitch*0.5,'sine',0.08,0.002,0.08);
}

function crunchSound() {
  // Noise burst shaped like a crunch
  try {
    const ac=getAudio(), dur=0.15;
    const buf=ac.createBuffer(1,ac.sampleRate*dur,ac.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,0.5);
    const src=ac.createBufferSource();
    const hi=ac.createBiquadFilter(); hi.type='highpass'; hi.frequency.value=1200;
    const g=ac.createGain(); const now=ac.currentTime;
    g.gain.setValueAtTime(0.3,now); g.gain.exponentialRampToValueAtTime(0.001,now+dur);
    src.buffer=buf; src.connect(hi); hi.connect(g); g.connect(getMaster());
    src.start(now); src.stop(now+dur+0.02);
  } catch(e){}
}

  // Rising sparkle arpeggio

class SoundscapeEngine {

        threshold: -12,
        ratio: 4,
        attack: 0.003,
        release: 0.15

        this.loopGains[cat] = new Tone.Gain(0).connect(this.effects.masterComp);
      });

        oscillator: { type: 'sine' },
        envelope: { attack: 0.001, decay: 0.5, sustain: 0, release: 0.2 }
      }).connect(this.effects.drumBus);
      this.instruments.kickSub.volume.value = -10;

        type: 'bandpass', frequency: 3000, Q: 1.5

  startBeatSequence(loopId) {
    const pattern = this.getBeatPattern(loopId);
    const subdivision = '16n';

    if (this.sequences.beat) {
      this.sequences.beat.forEach(seq => { try { seq.dispose(); } catch(e){} });
    }
    this.sequences.beat = [];

    // Kick
    const kickSeq = new Tone.Sequence((time, step) => {
      if (pattern.kick[step]) {
        this.instruments.kick.triggerAttackRelease(pattern.kickSub ? 'C0' : 'C1', '8n', time);
        if (pattern.kickSub) this.instruments.kickSub.triggerAttackRelease('C1', '8n', time, 0.6);
      }
    }, [...Array(pattern.kick.length).keys()], subdivision);
    kickSeq.loop = true; kickSeq.start(0);
    this.sequences.beat.push(kickSeq);

    // Snare
    const snareSeq = new Tone.Sequence((time, step) => {
      if (pattern.snare[step]) {
        this.instruments.snareNoise.triggerAttackRelease('8n', time);
        this.instruments.snareBody.triggerAttackRelease('E2', '8n', time);
      }
    }, [...Array(pattern.snare.length).keys()], subdivision);
    snareSeq.loop = true; snareSeq.start(0);
    this.sequences.beat.push(snareSeq);

    // Hi-hats
    const hihatSeq = new Tone.Sequence((time, step) => {
      if (pattern.hihat[step]) this.instruments.hihatClosed.triggerAttackRelease('32n', time, 0.3);
      if (pattern.hihatOpen && pattern.hihatOpen[step]) this.instruments.hihatOpen.triggerAttackRelease('8n', time, 0.25);
    }, [...Array(pattern.hihat.length).keys()], subdivision);
    hihatSeq.loop = true; hihatSeq.start(0);
    this.sequences.beat.push(hihatSeq);

    // Congas
    if (pattern.conga) {
      const congaSeq = new Tone.Sequence((time, step) => {
        if (pattern.conga[step]) {
          this.instruments.conga.triggerAttackRelease(['G3','A3','C4'][step%3], '16n', time, 0.6);
        }
      }, [...Array(pattern.conga.length).keys()], subdivision);
      congaSeq.loop = true; congaSeq.start(0);
      this.sequences.beat.push(congaSeq);
    }

    // Rimshots
    if (pattern.rimshot) {
      const rimSeq = new Tone.Sequence((time, step) => {
        if (pattern.rimshot[step]) this.instruments.rimshot.triggerAttackRelease('32n', time);
      }, [...Array(pattern.rimshot.length).keys()], subdivision);
      rimSeq.loop = true; rimSeq.start(0);
      this.sequences.beat.push(rimSeq);
    }
  }

  // ═══════════════════════════════════════════════════════════════
  // VIBE PATTERNS - 6 unique chord progressions
  // ═══════════════════════════════════════════════════════════════

  getVibePattern(variant) {
    const patterns = {
      ambient_pad: {
        chords: [['C3','E3','G3','B3'],['A2','C3','E3','G3'],['F2','A2','C3','E3'],['G2','B2','D3','F3']],
        style: 'pad', attack: 1.2
      },
      lofi_texture: {
        chords: [['D3','F3','A3','C4'],['G2','B2','D3','F3'],['C3','E3','G3','B3'],['A2','C3','E3','G3']],
        style: 'lofi', attack: 0.8
      },
      strings_swell: {
        chords: [['E3','G3','B3','D4'],['C3','E3','G3','C4'],['G2','B2','D3','G3'],['D3','F#3','A3','D4']],
        style: 'strings', attack: 1.5
      },
      synth_wash: {
        chords: [['F3','A3','C4','E4'],['E3','G3','B3','D4'],['D3','F3','A3','C4'],['C3','E3','G3','B3']],
        style: 'synth', attack: 0.6
      },
      choir_hum: {
        chords: [['A2','E3','A3','C4'],['F2','C3','F3','A3'],['C3','G3','C4','E4'],['G2','D3','G3','B3']],
        style: 'choir', attack: 1.0
      },
      noise_bed: {
        chords: [['C3','G3','C4'],['D3','A3','D4'],['E3','B3','E4'],['C3','G3','C4']],
        style: 'noise', attack: 2.0
      }
    };
    return patterns[variant] || patterns.ambient_pad;
  }

  startVibeSequence(loopId) {
    const pattern = this.getVibePattern(loopId);

    if (this.sequences.vibe) {
      this.sequences.vibe.forEach(seq => { try { seq.dispose(); } catch(e){} });
      try { if (this.instruments.noiseTexture.state === 'started') this.instruments.noiseTexture.stop(); } catch(e){}
    }
    this.sequences.vibe = [];

    try {
      this.instruments.pad.set({ envelope: { attack: pattern.attack, decay: 0.5, sustain: 0.8, release: 2 } });
    } catch(e){}

    const chordSeq = new Tone.Sequence((time, step) => {
      const chord = pattern.chords[step];
      try { this.instruments.pad.releaseAll(time); this.instruments.texture.releaseAll(time); } catch(e){}

      if (pattern.style === 'lofi') {
        chord.forEach((note, i) => this.instruments.pad.triggerAttack(note, time + i * 0.02));
      } else if (pattern.style === 'noise') {
        this.instruments.texture.triggerAttack(chord.slice(0, 2), time);
        try { if (this.instruments.noiseTexture.state !== 'started') this.instruments.noiseTexture.start(time); } catch(e){}
      } else {
        this.instruments.pad.triggerAttack(chord, time);
        const textureNotes = chord.map(n => Tone.Frequency(n).transpose(12).toNote());
        this.instruments.texture.triggerAttack(textureNotes, time + 0.1);
      }
    }, [0, 1, 2, 3], '1m');

    chordSeq.loop = true; chordSeq.start(0);
    this.sequences.vibe.push(chordSeq);
  }

  // ═══════════════════════════════════════════════════════════════
  // MELODY PATTERNS - 6 unique arpeggios constrained to scales
  // ═══════════════════════════════════════════════════════════════

  getMelodyPattern(variant) {
    const scales = {
      major: ['C4','D4','E4','F4','G4','A4','B4','C5'],
      minor: ['A3','B3','C4','D4','E4','F4','G4','A4'],
      pentatonic: ['C4','D4','E4','G4','A4','C5','D5','E5'],
      dorian: ['D4','E4','F4','G4','A4','B4','C5','D5']
    };

    const patterns = {
      piano_riff: {
        notes: [0,2,4,5,4,2,3,1,0,2,4,7,5,4,2,0], scale: scales.major, instrument: 'piano', subdivision: '8n',
        velocity: [0.8,0.6,0.7,0.9,0.6,0.5,0.7,0.6,0.8,0.6,0.7,0.9,0.7,0.6,0.5,0.8]
      },
      synth_arp: {
        notes: [0,2,4,7,4,2,0,2,4,7,9,7,4,2,4,0], scale: scales.pentatonic, instrument: 'arp', subdivision: '16n',
        velocity: [0.7,0.5,0.6,0.8,0.5,0.4,0.7,0.5,0.6,0.8,0.9,0.7,0.5,0.4,0.6,0.7]
      },
      guitar_lick: {
        notes: [0,-1,2,4,2,0,-1,2,4,5,4,2,0,2,4,0], scale: scales.dorian, instrument: 'pluck', subdivision: '8n',
        velocity: [0.9,0,0.7,0.8,0.6,0.8,0,0.7,0.8,0.9,0.7,0.6,0.8,0.6,0.7,0.9]
      },
      brass_stab: {
        notes: [0,-1,-1,4,-1,2,-1,-1,0,-1,-1,5,4,-1,2,0], scale: scales.minor, instrument: 'brass', subdivision: '8n',
        velocity: [0.9,0,0,0.8,0,0.7,0,0,0.9,0,0,0.8,0.7,0,0.6,0.9]
      },
      pluck_melody: {
        notes: [4,2,0,2,4,5,7,5,4,2,0,-1,0,2,4,2], scale: scales.pentatonic, instrument: 'pluck', subdivision: '8n',
        velocity: [0.6,0.5,0.7,0.5,0.6,0.7,0.8,0.6,0.6,0.5,0.7,0.4,0.6,0.5,0.6,0.5]
      },
      bell_chime: {
        notes: [7,-1,4,-1,5,-1,2,-1,7,-1,5,4,-1,2,-1,0], scale: scales.major, instrument: 'bell', subdivision: '8n',
        velocity: [0.7,0,0.5,0,0.6,0,0.4,0,0.7,0,0.5,0.6,0,0.4,0,0.5]
      }
    };
    return patterns[variant] || patterns.piano_riff;
  }

  startMelodySequence(loopId) {
    const pattern = this.getMelodyPattern(loopId);

    if (this.sequences.melody) {
      this.sequences.melody.forEach(seq => { try { seq.dispose(); } catch(e){} });
    }
    this.sequences.melody = [];

    const instrument = this.instruments[pattern.instrument];
    if (!instrument) return;

    const melodySeq = new Tone.Sequence((time, step) => {
      const noteIdx = pattern.notes[step];
      const velocity = pattern.velocity[step];

      if (noteIdx >= 0 && velocity > 0) {
        const note = pattern.scale[noteIdx % pattern.scale.length];
        try {
          if (pattern.instrument === 'pluck') instrument.triggerAttack(note, time);
          else instrument.triggerAttackRelease(note, pattern.subdivision, time, velocity);
        } catch(e){}
      }
    }, [...Array(pattern.notes.length).keys()], pattern.subdivision);

    melodySeq.loop = true; melodySeq.start(0);
    this.sequences.melody.push(melodySeq);
  }

  // ═══════════════════════════════════════════════════════════════
  // API METHODS (compatible with existing game code)
  // ═══════════════════════════════════════════════════════════════

  addLoop(category, loopId) {
    if (!this.initialized) return;
    if (this.activeLoops[category] === loopId) return;

    const now = Tone.now();
    const categoryVolumes = { beat: 0.8, vibe: 0.6, melody: 0.7 };

    this.loopGains[category].gain.linearRampToValueAtTime(0, now + this.crossfadeDuration);
    this.activeLoops[category] = loopId;

    setTimeout(() => {
      if (this.activeLoops[category] !== loopId) return;
      if (category === 'beat') this.startBeatSequence(loopId);
      else if (category === 'vibe') this.startVibeSequence(loopId);
      else if (category === 'melody') this.startMelodySequence(loopId);

      this.loopGains[category].gain.linearRampToValueAtTime(categoryVolumes[category], Tone.now() + this.crossfadeDuration);
    }, this.crossfadeDuration * 1000);

    if (typeof logSessionEvent === 'function') logSessionEvent('loop_add', { category, loopId });
  }

  removeLoop(category) {
    if (!this.initialized || !this.activeLoops[category]) return;

    const now = Tone.now();
    this.loopGains[category].gain.linearRampToValueAtTime(0, now + this.crossfadeDuration);

    setTimeout(() => {
      if (this.sequences[category]) {
        this.sequences[category].forEach(seq => { try { seq.dispose(); } catch(e){} });
        this.sequences[category] = [];
      }
      if (category === 'vibe') {
        try { if (this.instruments.noiseTexture.state === 'started') this.instruments.noiseTexture.stop(); } catch(e){}
      }
    }, this.crossfadeDuration * 1000);

    if (typeof logSessionEvent === 'function') logSessionEvent('loop_remove', { category });
    this.activeLoops[category] = null;
  }

  muteLoop(category, muted) {
    if (!this.initialized || !this.loopGains[category]) return;
    const now = Tone.now();
    const categoryVolumes = { beat: 0.8, vibe: 0.6, melody: 0.7 };
    this.loopGains[category].gain.linearRampToValueAtTime(muted ? 0 : categoryVolumes[category], now + 0.1);
  }

  getActiveTints() {
    const tints = [];
    ['beat', 'vibe', 'melody'].forEach(cat => {
      if (this.activeLoops[cat]) {
        const loop = LOOP_POOLS[cat].find(l => l.id === this.activeLoops[cat]);
        if (loop) tints.push(loop.tint);
      }
    });
    return tints;
  }

  setMasterVolume(value) {
    try { Tone.Destination.volume.value = Tone.gainToDb(value); } catch(e){}
  }

  dispose() {
    ['beat', 'vibe', 'melody'].forEach(cat => {
      if (this.sequences[cat]) this.sequences[cat].forEach(seq => { try { seq.dispose(); } catch(e){} });
    });
    try { Tone.Transport.stop(); } catch(e){}
    this.isPlaying = false;
  }
}

function earnResources(tileType, clusterSize) {
  const base = clusterSize * 3;
  const bonus = Math.max(0, clusterSize - MIN_CLUSTER) * 2;
  const total = base + bonus;

  const catMap = { BEAT: 'beat', VIBE: 'vibe', MELODY: 'melody' };
  const cat = catMap[tileType];
  if (cat) {
    resources[cat] += total;
    logSessionEvent('cluster_clear', { category: cat, size: clusterSize, earned: total });

    // Visual feedback - flash the stat block
    flashStatBlock(cat, total);
  }

  return total;
}

// Flash stat block when earning resources
function flashStatBlock(category, amount) {
  const colorMap = { beat: '#ff2d6e', vibe: '#00e5ff', melody: '#39ff14' };
  const valEl = document.getElementById(`${category}-val`);
  const blocks = document.querySelectorAll('.stat-block');

  // Find the correct stat block (beat=0, vibe=1, melody=2)
  const blockIndex = { beat: 0, vibe: 1, melody: 2 }[category];
  const block = blocks[blockIndex];

  if (block) {
    block.classList.add('flash');
    setTimeout(() => block.classList.remove('flash'), 300);
  }

  // Animate the value with a pop effect
  if (valEl) {
    valEl.style.transform = 'scale(1.4)';
    valEl.style.color = '#ffffff';
    setTimeout(() => {
      valEl.style.transform = 'scale(1)';
      valEl.style.color = colorMap[category];
    }, 200);
  }

  // Spawn floating particles from board toward HUD
  spawnResourceParticles(category, amount);
}

// Spawn particles that fly toward the resource counter
function spawnResourceParticles(category, amount) {
  const colorMap = { beat: '#ff2d6e', vibe: '#00e5ff', melody: '#39ff14' };
  const color = colorMap[category];

  // Spawn particles from center of board flying toward top-left
  const startX = boardCvs.width / 2;
  const startY = boardCvs.height / 2;

  const particleCount = Math.min(amount, 12);
  for (let i = 0; i < particleCount; i++) {
    setTimeout(() => {
      particles.push({
        x: startX + rnd(-30, 30),
        y: startY + rnd(-30, 30),
        vx: rnd(-8, -3),  // Move toward left (HUD)
        vy: rnd(-6, -2),  // Move upward
        life: 1.2,
        decay: 0.025,
        size: rnd(4, 8),
        color: i % 2 === 0 ? color : '#ffffff',
        shrink: 0.96,
        glow: true,
        shape: 'circle',
        gravity: -0.05  // Float upward
      });
    }, i * 40);
  }
}

function canUnlockLoop(category, loopIndex) {
  if (resources.unlocked[category].includes(loopIndex)) return false;
  const cost = UNLOCK_COSTS[loopIndex] || UNLOCK_COSTS[UNLOCK_COSTS.length - 1];
  return resources[category] >= cost;
}

function unlockLoop(category, loopIndex) {
  if (!canUnlockLoop(category, loopIndex)) return false;
  const cost = UNLOCK_COSTS[loopIndex] || UNLOCK_COSTS[UNLOCK_COSTS.length - 1];
  resources[category] -= cost;
  resources.unlocked[category].push(loopIndex);
  return true;
}

function activateLoop(category, loopIndex) {
  if (!resources.unlocked[category].includes(loopIndex)) return false;
  const loop = LOOP_POOLS[category][loopIndex];
  if (!loop) return false;

  resources.active[category] = loopIndex;
  if (soundscape) {
    soundscape.addLoop(category, loop.id);
  }
  return true;
}

// Column x positions and widths (computed on resize)
let colX = [], colW = [], TS = 36;

function recalcSize() {
  const playcol = document.getElementById('play-col') || document.getElementById('game-area');
  // Get actual HUD width from CSS variable
  const hudEl = document.getElementById('hud');
  const hudWidth = hudEl ? hudEl.offsetWidth : 48;

  // Calculate available space - use more width on mobile for better board visibility
  const isMobile = window.innerWidth < 600;
  const isTablet = window.innerWidth >= 600 && window.innerWidth < 1024;

  // Board should fill most of available height
  const heightPercent = isMobile ? 0.82 : isTablet ? 0.85 : 0.88;
  const widthPercent = isMobile ? 0.98 : 0.96;

  const availW = (playcol ? playcol.clientWidth : window.innerWidth - hudWidth) * widthPercent;
  const availH = window.innerHeight * heightPercent;

  // Calculate tile size to fit both dimensions
  TS = Math.floor(Math.min(availH / ROWS, availW / COLS));

  // Responsive min/max tile sizes - bigger for better visuals
  const minTS = isMobile ? 28 : 32;
  const maxTS = isMobile ? 52 : isTablet ? 60 : 72;
  TS = Math.max(minTS, Math.min(TS, maxTS));

  const totalGap = COL_GAP * (COLS - 1);
  const totalTileW = COLS * TS;
  boardCvs.width = totalTileW + totalGap;
  boardCvs.height = ROWS * TS;

  colX = []; colW = [];
  for(let c=0;c<COLS;c++) {
    colX.push(c * (TS + COL_GAP));
    colW.push(TS);
  }

  bgCvs.width = window.innerWidth;
  bgCvs.height = window.innerHeight;
}

  S_SHAPE:[[[1,0],[2,0],[0,1],[1,1]], [[0,0],[0,1],[1,1],[1,2]]],
  Z_SHAPE:[[[0,0],[1,0],[1,1],[2,1]], [[1,0],[0,1],[1,1],[0,2]]],
  I_SHAPE:[[[0,0],[0,1],[0,2],[0,3]], [[0,0],[1,0],[2,0],[3,0]]],
  O_SHAPE:[[[0,0],[1,0],[0,1],[1,1]]],
};
const PIECE_POOL = [
  'DOMINO','DOMINO','DOMINO','DOMINO',
  'TRI_I','TRI_I','TRI_I',
  'TRI_L','TRI_L','TRI_L',
  'L_SHAPE','J_SHAPE','T_SHAPE','T_SHAPE',
  'S_SHAPE','Z_SHAPE','I_SHAPE','O_SHAPE',
];

function mkPiece() {
  // Rare special tile (~12% chance)
  if(Math.random() < 0.12) return mkSpecialPiece();
  const typePool  = [...TYPES];
  const shapeName = PIECE_POOL[rndI(0,PIECE_POOL.length)];
  const rots      = PIECE_SHAPES[shapeName];
  const n         = rots[0].length;
  const base      = typePool[rndI(0,typePool.length)];
  const mixed     = Math.random()<0.18;
  const tiles     = Array.from({length:n},()=> mixed?typePool[rndI(0,typePool.length)]:base);
  const maxCol    = Math.max(...rots[0].map(([c])=>c));
  const startX    = Math.max(0,Math.floor((COLS-maxCol-1)/2));
  return {x:startX,y:0,tiles,shapeName,rot:0,special:false};
}

function mkSpecialPiece() {
  const sp = SPECIALS[rndI(0,SPECIALS.length)];
  return {x:Math.floor(COLS/2)-1,y:0,tiles:[sp],shapeName:'DOMINO',rot:0,special:true,spType:sp};
}

function pieceCells(p) {
  if(p.special) {
    return [{x:p.x,y:p.y,t:p.spType},{x:p.x,y:p.y+1,t:p.spType}];
  }
  const rots   = PIECE_SHAPES[p.shapeName];
  const offsets= rots[p.rot % rots.length];
  return offsets.map(([dc,dr],i)=>({x:p.x+dc,y:p.y+dr,t:p.tiles[i]??p.tiles[0]}));
}

function fits(p,brd) {
  for(const {x,y} of pieceCells(p)) {
    if(x<0||x>=COLS||y>=ROWS) return false;
    if(y>=0&&brd[y][x]) return false;
  }
  return true;
}

// ── CLUSTER FINDER ───────────────────────────────────
function findClusters(brd) {
  const vis=mkBoard().map(r=>r.map(()=>false));
  const clusters=[];
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++) {
    if(vis[r][c]||!brd[r][c]) continue;
    const raw=brd[r][c];
    const type=typeof raw==='string'?raw.replace('_F_',''):raw;
    if(type==='FROZEN'||type==='GARBAGE') continue;
    if(SPECIALS.includes(type)) continue;
    const cells=[],q=[[r,c]];
    vis[r][c]=true;
    while(q.length) {
      const [cr,cc]=q.shift(); cells.push([cr,cc]);
      for(const[dr,dc] of [[-1,0],[1,0],[0,-1],[0,1]]) {
        const nr=cr+dr,nc=cc+dc;
        if(nr<0||nr>=ROWS||nc<0||nc>=COLS||vis[nr][nc]) continue;
        const nt=brd[nr][nc]; if(!nt) continue;
        const ntc=typeof nt==='string'?nt.replace('_F_',''):nt;
        if(ntc===type||ntc==='WILD'){vis[nr][nc]=true;q.push([nr,nc]);}
      }
    }
    if(cells.length>=MIN_CLUSTER) clusters.push({type,cells});
  }
  return clusters;
}

function getClusterAt(row,col) {
  const raw=board[row][col]; if(!raw) return null;
  const type=typeof raw==='string'?raw.replace('_F_',''):raw;
  if(type==='FROZEN'||type==='GARBAGE') return null;
  if(SPECIALS.includes(type)) return {type,cells:[[row,col]],isSpecial:true};
  const vis=mkBoard().map(r=>r.map(()=>false));
  const cells=[],q=[[row,col]];
  vis[row][col]=true;
  while(q.length) {
    const [cr,cc]=q.shift(); cells.push([cr,cc]);
    for(const[dr,dc] of [[-1,0],[1,0],[0,-1],[0,1]]) {
      const nr=cr+dr,nc=cc+dc;
      if(nr<0||nr>=ROWS||nc<0||nc>=COLS||vis[nr][nc]) continue;
      const nt=board[nr][nc]; if(!nt) continue;
      const ntc=typeof nt==='string'?nt.replace('_F_',''):nt;
      if(ntc===type||ntc==='WILD'){vis[nr][nc]=true;q.push([nr,nc]);}
    }
  }
  return {type,cells};
}

function applyGravity(brd) {
  for(let c=0;c<COLS;c++) {
    let w=ROWS-1;
    for(let r=ROWS-1;r>=0;r--) {
      if(brd[r][c]) {
        // Always strip flash prefix before settling
        const val = typeof brd[r][c]==='string' ? brd[r][c].replace('_F_','') : brd[r][c];
        brd[w][c]=val;
        if(w!==r) brd[r][c]=null;
        w--;
      }
    }
    while(w>=0){brd[w][c]=null;w--;}
  }
}

// ── COLLAPSE ─────────────────────────────────────────
function tapCollapse(row,col) {
  if(resolving) return;
  const cluster=getClusterAt(row,col);
  if(!cluster) return;
  if(cluster.isSpecial) { resolveSpecial(cluster.type,row,col); return; }
  if(cluster.cells.length<MIN_CLUSTER) { flashInvalid(cluster.cells); SFX.invalid(); return; }
  resolveFromTap(cluster);
}

async function resolveFromTap(cluster) {
  resolving=true;
  SFX.tap();

  // Flash
  cluster.cells.forEach(([r,c])=>{board[r][c]='_F_'+board[r][c];});
  await delay(110);
  cluster.cells.forEach(([r,c])=>{board[r][c]=board[r][c].replace('_F_','');});

  // Particles + sound — pass tile type for directional FX
  const col=COLORS[cluster.type]||'#fff';
  cluster.cells.forEach(([r,c])=>spawnBurst(colX[c]+colW[c]/2, r*TS+TS/2, col, 18, cluster.type));
  (SFX.collapse[cluster.type]||SFX.collapse.GARBAGE)();

  // Clear cluster
  cluster.cells.forEach(([r,c])=>{board[r][c]=null;});
  const cleared=cluster.cells.length;

  // Adjacency-clear GARBAGE tiles — any GARBAGE touching a cleared cell gets removed
  // This makes pressure row clearing explicit and predictable: build clusters next to them
  let garbageCleared=0;
  const adjDirs=[[-1,0],[1,0],[0,-1],[0,1]];
  cluster.cells.forEach(([r,c])=>{
    adjDirs.forEach(([dr,dc])=>{
      const nr=r+dr, nc=c+dc;
      if(nr>=0&&nr<ROWS&&nc>=0&&nc<COLS&&board[nr][nc]==='GARBAGE'){
        spawnBurst(colX[nc]+colW[nc]/2,nr*TS+TS/2,'#ff0033',10,'BEAT');
        board[nr][nc]=null;
        garbageCleared++;
      }
    });
  });
  if(garbageCleared>0) showToast(`💀 ${garbageCleared} PRESSURE BLOCK${garbageCleared>1?'S':''} SMASHED`,'var(--beat)',1200);

  // Stats
  const mult = viralMult * (collabPending?2:1);
  collabPending=false;
  const base=cleared*12;
  const pts=Math.floor(base*mult*(1+Math.max(0,cleared-MIN_CLUSTER)*0.18));

  addStreams(pts*40);
  addFollowers(pts*8);
  addVisibility(pts*15);
  rank=Math.max(1,rank-Math.floor(pts/20));
  screenShake=cleared>=8?12:cleared>=6?7:0;

  // Score popup at collapse centre
  const th2=TILE_THEMES[cluster.type]||TILE_THEMES.GARBAGE;
  const cx2=cluster.cells.reduce((s,[,c2])=>s+colX[c2]+colW[c2]/2,0)/cluster.cells.length;
  const cy2=cluster.cells.reduce((s,[r2])=>s+r2*TS+TS/2,0)/cluster.cells.length;
  spawnScorePopup(cx2, cy2, `+${fmtNum(pts*40)} 🎧`, th2.glow||th2.mid);

  if(viralLeft>0){ viralLeft--; if(viralLeft===0){viralMult=1;showToast('🔥 VIRAL ENDED','var(--dim)',1200);} }

  showCombo(cleared,cluster.type,pts);
  updateHUD();
  checkStageUp();

  // Ability
  await delay(80);
  triggerAbility(cluster.type,cluster.cells,cleared);

  await delay(160);
  applyGravity(board);
  await delay(90);
  resolving=false;
  if(!piece) spawnNext();
}

async function resolveSpecial(spType,row,col) {
  resolving=true;
  SFX.special();
  spawnBurst(colX[col]+colW[col]/2,row*TS+TS/2,COLORS[spType]);
  board[row][col]=null;

  switch(spType) {
    case 'EP':
      addStreams(8000); addFollowers(2000); addVisibility(3000);
      showToast('💿 EP DROP! +Streams +Fans','var(--ep)',2200);
      break;
    case 'ALBUM':
      // Clear all non-garbage tiles
      for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++) {
        if(board[r][c]&&board[r][c]!=='GARBAGE'){
          spawnBurst(colX[c]+colW[c]/2,r*TS+TS/2,COLORS[board[r][c]]||'#fff');
          board[r][c]=null;
        }
      }
      addStreams(25000); addFollowers(8000); addVisibility(12000);
      screenShake=18;
      showToast('🎵 ALBUM DROP! MEGA CLEAR!','var(--album)',2800);
      break;
    case 'VIRAL':
      viralMult=3; viralLeft=3;
      showToast('🔥 VIRAL MOMENT! 3× for 3 collapses','var(--viral)',2500);
      break;
    case 'CHART':
      rank=Math.max(1,rank-Math.floor(rnd(5,15)));
      addVisibility(20000);
      showToast('📊 CHART ENTRY! Rank jump!','var(--chart)',2000);
      break;
    case 'COLLAB':
      collabPending=true;
      showToast('🤝 COLLAB! Next collapse ×2','var(--collab)',2000);
      break;
  }

  updateHUD();
  checkStageUp();
  await delay(200);
  applyGravity(board);
  await delay(80);
  resolving=false;
  if(!piece) spawnNext();
}

async function flashInvalid(cells) {
  invalidCells=cells; await delay(280); invalidCells=[];
}

// ── ABILITIES ────────────────────────────────────────
function triggerAbility(type,cells,size) {
  switch(type) {
    case 'BEAT': {
      // Beat clusters earn beat points and clear bottom row on large clusters
      const earned = earnResources('BEAT', size);
      if(size >= 5) {
        let cleared=0;
        for(let c=0;c<COLS;c++) if(board[ROWS-1][c]){spawnBurst(colX[c]+colW[c]/2,(ROWS-1)*TS+TS/2,'#ff2d6e');board[ROWS-1][c]=null;cleared++;}
        if(cleared) { applyGravity(board); }
        showToast(`🥁 BEAT! +${earned} pts + floor clear!`,'var(--beat)',1500);
      } else {
        showToast(`🥁 BEAT! +${earned} beat points`,'var(--beat)',1500);
      }
      break;
    }
    case 'VIBE': {
      // Vibe clusters earn vibe points (already handled in collapse)
      const earned = earnResources('VIBE', size);
      showToast(`🌊 VIBE! +${earned} vibe points`,'var(--vibe)',1600);
      break;
    }
    case 'MELODY': {
      // Melody clusters earn melody points (already handled in collapse)
      const earned = earnResources('MELODY', size);
      showToast(`🎵 MELODY! +${earned} melody points`,'var(--melody)',1400);
      break;
    }
    case 'WILD': {
      // WILD triggers audio effects!
      triggerWildcardEffect(size);

      if(size >= 4) {
