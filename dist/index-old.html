}

// ── STATS HELPERS ────────────────────────────────────
const STREAM_CAP=999999, FOL_CAP=999999, VIS_CAP=999999;
function addStreams(n)   { streams   =clamp(streams+n,   0,STREAM_CAP); }
function addFollowers(n){ followers =clamp(followers+n, 0,FOL_CAP); }
function addVisibility(n){visibility=clamp(visibility+n,0,VIS_CAP); }
function fmtNum(n) {
  if(n>=1000000) return (n/1000000).toFixed(1)+'M';
  if(n>=1000)    return (n/1000).toFixed(1)+'K';
  return String(n);
}

// ── PRESSURE ─────────────────────────────────────────
function addPressureRow() {
  // If any tile is already at row 0, game over
  if(board[0].some(t=>t)){endGame();return;}

  // Simulate the board shift and check if the live piece would conflict.
  // Only force-commit if there's an actual collision — otherwise let it keep falling.
  if(piece && !resolving) {
    const wouldConflict = pieceCells(piece).some(({x,y}) => {
      const shiftedY = y - 1; // after board shifts up, board content moves up by 1
      // Conflict if the shifted board row at this cell would be occupied
      // i.e. board[y][x] is occupied (it will move to y-1, which is where piece is at y-1)
      // Simpler: check if piece cell at (x, y) would overlap after shift
      // The board shifts up: board[r] = board[r+1]. So a tile at board[y+1][x] moves to board[y][x].
      // Piece stays at y. So conflict if board[y+1][x] is occupied (it will rise into piece).
      const newBoardAtPieceRow = y + 1; // what will be at row y after shift
      return newBoardAtPieceRow < ROWS && board[newBoardAtPieceRow][x];
    });

    if(wouldConflict) {
      // Board is about to rise into the piece — hard drop and commit it first
      let dropped = {...piece};
      while(fits({...dropped, y:dropped.y+1}, board)) dropped.y++;
      piece = dropped;
      pieceYf = piece.y;
      commitPiece();
    }
    // else: piece is fine, let it keep falling naturally
  }

  for(let r=0;r<ROWS-1;r++) board[r]=[...board[r+1]];
  const gap=rndI(0,COLS);
  board[ROWS-1]=Array.from({length:COLS},(_,c)=>c===gap?null:'GARBAGE');
  screenShake=5;
  pressureSpeed=Math.max(6000,pressureSpeed-350);
  SFX.pressure();
  showToast('⚠ PRESSURE RISING','var(--beat)',1000);
}

// ── PIECE MOVEMENT ───────────────────────────────────
function spawnNext() {
  piece=nextPiece; nextPiece=mkPiece();
  if(!fits(piece,board)){endGame();return;}
  gravTimer=0; lockTimer=0; pieceYf=piece.y;
  drawNext();
  updateAbilityHint();
}

function commitPiece() {
  if(!piece) return; // guard against double-commit
  
  // Always snap piece to lowest valid position before writing to board.
  // This handles cases where board shifted (pressure row) mid-fall.
  while(fits({...piece,y:piece.y+1},board)) piece.y++;
  pieceYf=piece.y;

  const cells=pieceCells(piece);
  let ok=true;
  cells.forEach(({x,y,t})=>{
    if(y<0) ok=false;
  });
  if(!ok){endGame();return;}
  
  // Final overlap guard: if any cell is already occupied, something went wrong — end game
  for(const {x,y} of cells) {
    if(y>=0 && board[y][x]) {
      // This should not happen — but if it does, protect state
      endGame(); return;
    }
  }

  cells.forEach(({x,y,t})=>{
    if(y>=0) board[y][x] = typeof t==='string' ? t.replace('_F_','') : t;
  });
  spawnLandFX(cells.filter(c=>c.y>=0));
  SFX.land();
  applyGravity(board);
  piece=null;
  spawnNext();
}

function moveH(dir) {
  if(!piece||resolving) return;
  const np={...piece,x:piece.x+dir};
  if(fits(np,board)){piece=np;lockTimer=0;}
}

function rotate() {
  if(!piece||resolving||piece.special) return;
  const rots=PIECE_SHAPES[piece.shapeName];
  if(rots.length<=1) return; // O_SHAPE — no rotation states
  const np={...piece,rot:(piece.rot+1)%rots.length};
  if(fits(np,board)){piece=np;SFX.rotate();return;}
  // Wall-kick: try horizontal offsets
  for(const k of[-1,1,-2,2,-3,3]){const kp={...np,x:np.x+k};if(fits(kp,board)){piece=kp;SFX.rotate();return;}}
  // Floor-kick: piece blocked at bottom, nudge up
  const up={...np,y:np.y-1};if(fits(up,board)){piece=up;SFX.rotate();return;}
  // Rotation blocked — silently ignore
}

function hardDrop() {
  if(!piece||resolving) return;
  // Work on a copy, then assign atomically to avoid loop race
  let dropped={...piece};
  while(fits({...dropped,y:dropped.y+1},board)) dropped.y++;
  piece=dropped;
  pieceYf=piece.y;
  gravTimer=0; lockTimer=0;
  SFX.hardDrop(); // Play thud sound on hard drop
  commitPiece();
}

// ── DRAW TILE — CANDY JEWEL STYLE ────────────────────
// Each tile type has a unique gem shape + colour palette
const TILE_THEMES = {
  BEAT:   { base:'#ff1a5e', mid:'#ff2d6e', light:'#ff6b9d', dark:'#cc1a4a', glow:'#ff2d6e' },
  VIBE:   { base:'#0099cc', mid:'#00e5ff', light:'#66f0ff', dark:'#006688', glow:'#00e5ff' },
  MELODY: { base:'#2acc10', mid:'#39ff14', light:'#7fff5e', dark:'#1a8808', glow:'#39ff14' },
  WILD:   { base:'#ccaa00', mid:'#ffd700', light:'#ffe766', dark:'#aa8800', glow:'#ffd700' },
  EP:     { base:'#cc44aa', mid:'#ff9de2', light:'#ffccee', dark:'#881166', glow:'#ff66cc' },
  ALBUM:  { base:'#aa8800', mid:'#ffd700', light:'#fff0aa', dark:'#664400', glow:'#ffdd44' },
  VIRAL:  { base:'#cc1111', mid:'#ff4444', light:'#ff9999', dark:'#880000', glow:'#ff3333' },
  CHART:  { base:'#009966', mid:'#00ffaa', light:'#99ffdd', dark:'#005533', glow:'#00ffaa' },
  COLLAB: { base:'#66aacc', mid:'#aaffee', light:'#ddfff8', dark:'#224466', glow:'#88ffee' },
  GARBAGE:{ base:'#0d0d18', mid:'#161626', light:'#2a2a44', dark:'#060610', glow:'#ff0033' },
  FROZEN: { base:'#224488', mid:'#4488bb', light:'#99ccee', dark:'#112244', glow:'#5599cc' },
};

function drawTile(xc, px, py, w, h, type, alpha=1, flash=false, pulse=0) {
  if(!type||alpha<=0) return;
  const th = TILE_THEMES[type] || TILE_THEMES.GARBAGE;
  const pad = Math.max(2, w*0.06);
  const iw = w-pad*2, ih=h-pad*2;
  const rad = Math.min(iw,ih)*0.24;
  const isSpecial = SPECIALS.includes(type);
  const time = Date.now() * 0.001;

  xc.save();
  xc.globalAlpha = alpha;

  if(flash) {
    // Enhanced flash with color burst
    const flashGrad = xc.createRadialGradient(
      px+w*0.5, py+h*0.5, 0,
      px+w*0.5, py+h*0.5, w*0.7
    );
    flashGrad.addColorStop(0, '#ffffff');
    flashGrad.addColorStop(0.5, th.light);
    flashGrad.addColorStop(1, th.mid);
    xc.fillStyle = flashGrad;
    xc.shadowColor = '#ffffff';
    xc.shadowBlur = 25;
    rrect(xc, px+pad, py+pad, iw, ih, rad);
    xc.fill();
    xc.restore();
    return;
  }

  // Outer glow for pulsing/special tiles - enhanced with multiple layers
  if(pulse>0 || isSpecial) {
    const glowPhase = isSpecial ? Math.sin(time * 3) * 0.5 + 0.5 : pulse;
    const glowSize = 10 + glowPhase * 10;

    // Outer soft glow
    xc.shadowColor = th.glow;
    xc.shadowBlur = glowSize * 1.5;
    xc.globalAlpha = alpha * 0.4;
    xc.fillStyle = th.glow;
    rrect(xc, px+pad, py+pad, iw, ih, rad);
    xc.fill();
    xc.globalAlpha = alpha;

    // Sharp inner glow ring
    xc.shadowBlur = glowSize;
    xc.strokeStyle = th.light;
    xc.lineWidth = 2 + glowPhase;
    rrect(xc, px+pad-1, py+pad-1, iw+2, ih+2, rad+1);
    xc.stroke();
    xc.shadowBlur = 0;
  }

  // Enhanced drop shadow with blur
  xc.shadowColor = 'rgba(0,0,0,0.7)';
  xc.shadowBlur = 6;
  xc.shadowOffsetX = 1;
  xc.shadowOffsetY = 3;

  // Rich multi-stop gradient for gem body
  const bg = xc.createLinearGradient(px+pad, py+pad, px+pad, py+pad+ih);
  bg.addColorStop(0, th.light);
  bg.addColorStop(0.15, th.mid);
  bg.addColorStop(0.5, th.base);
  bg.addColorStop(0.85, th.dark);
  bg.addColorStop(1, 'rgba(0,0,0,0.3)');
  xc.fillStyle = bg;
  rrect(xc, px+pad, py+pad, iw, ih, rad);
  xc.fill();
  xc.shadowBlur = 0;
  xc.shadowOffsetX = 0;
  xc.shadowOffsetY = 0;

  // Side facet gradient - creates 3D beveled look
  const sg = xc.createLinearGradient(px+pad, py+pad, px+pad+iw, py+pad+ih);
  sg.addColorStop(0, 'rgba(255,255,255,0.18)');
  sg.addColorStop(0.3, 'rgba(255,255,255,0.05)');
  sg.addColorStop(0.7, 'rgba(0,0,0,0.0)');
  sg.addColorStop(1, 'rgba(0,0,0,0.2)');
  xc.fillStyle = sg;
  rrect(xc, px+pad, py+pad, iw, ih, rad);
  xc.fill();

  // Premium specular highlight - asymmetric for realism
  const specX = px+pad+iw*0.35;
  const specY = py+pad+ih*0.2;
  const hg = xc.createRadialGradient(specX, specY, 0, specX+iw*0.1, specY+ih*0.1, iw*0.55);
  hg.addColorStop(0, 'rgba(255,255,255,0.65)');
  hg.addColorStop(0.3, 'rgba(255,255,255,0.25)');
  hg.addColorStop(0.6, 'rgba(255,255,255,0.08)');
  hg.addColorStop(1, 'rgba(255,255,255,0)');
  xc.fillStyle = hg;
  rrect(xc, px+pad, py+pad, iw, ih*0.6, rad);
  xc.fill();

  // Sharp specular glint (top-left)
  const glintSize = iw * 0.14;
  const dg = xc.createRadialGradient(
    px+pad+iw*0.22, py+pad+ih*0.16, 0,
    px+pad+iw*0.22, py+pad+ih*0.16, glintSize
  );
  dg.addColorStop(0, 'rgba(255,255,255,0.95)');
  dg.addColorStop(0.5, 'rgba(255,255,255,0.4)');
  dg.addColorStop(1, 'rgba(255,255,255,0)');
  xc.fillStyle = dg;
  xc.beginPath();
  xc.arc(px+pad+iw*0.22, py+pad+ih*0.16, glintSize, 0, Math.PI*2);
  xc.fill();

  // Secondary micro-glint
  xc.fillStyle = 'rgba(255,255,255,0.8)';
  xc.beginPath();
  xc.arc(px+pad+iw*0.28, py+pad+ih*0.28, glintSize*0.25, 0, Math.PI*2);
  xc.fill();

  // Inner shadow at bottom for depth
  const innerShadow = xc.createLinearGradient(px+pad, py+pad+ih*0.7, px+pad, py+pad+ih);
  innerShadow.addColorStop(0, 'rgba(0,0,0,0)');
  innerShadow.addColorStop(1, 'rgba(0,0,0,0.25)');
  xc.fillStyle = innerShadow;
  rrect(xc, px+pad, py+pad, iw, ih, rad);
  xc.fill();

  // Refined border with gradient
  const borderGrad = xc.createLinearGradient(px+pad, py+pad, px+pad, py+pad+ih);
  borderGrad.addColorStop(0, th.light);
  borderGrad.addColorStop(0.5, 'rgba(255,255,255,0.3)');
  borderGrad.addColorStop(1, th.dark);
  xc.strokeStyle = borderGrad;
  xc.lineWidth = 1.5;
  xc.globalAlpha = alpha * 0.7;
  rrect(xc, px+pad, py+pad, iw, ih, rad);
  xc.stroke();

  // Icon with enhanced shadow
  xc.globalAlpha = alpha;
  xc.shadowColor = 'rgba(0,0,0,0.5)';
  xc.shadowBlur = 3;
  xc.shadowOffsetY = 1;
  drawTileIcon(xc, px+w*0.5, py+h*0.5, Math.min(w,h)*0.34, type, th);
  xc.shadowBlur = 0;

  // Special tiles get animated sparkles
  if(isSpecial) {
    const sparkleCount = 6;
    for(let i=0; i<sparkleCount; i++){
      const angle = time*2 + i*(Math.PI*2/sparkleCount);
      const dist = iw*0.32 + Math.sin(time*3+i)*iw*0.05;
      const sx = px+pad+iw*0.5 + Math.cos(angle)*dist;
      const sy = py+pad+ih*0.5 + Math.sin(angle)*dist;
      const sparkleAlpha = 0.5 + Math.sin(time*4+i*1.5)*0.4;
      const sparkleSize = 2 + Math.sin(time*5+i)*0.8;

      xc.fillStyle = `rgba(255,255,255,${sparkleAlpha})`;
      xc.shadowColor = th.glow;
      xc.shadowBlur = 4;
      xc.beginPath();
      xc.arc(sx, sy, sparkleSize, 0, Math.PI*2);
      xc.fill();
    }
  }

  xc.restore();
}

function drawTileIcon(xc, cx, cy, r, type, th) {
  xc.save();
  xc.shadowBlur=4; xc.shadowColor='rgba(0,0,0,0.7)';

  switch(type) {
    case 'BEAT': {
      // Drum with sticks
      xc.strokeStyle='rgba(255,255,255,0.9)'; xc.lineWidth=r*0.14;
      xc.beginPath(); xc.ellipse(cx,cy+r*0.1,r*0.7,r*0.38,0,0,Math.PI*2); xc.stroke();
      xc.beginPath(); xc.ellipse(cx,cy-r*0.1,r*0.7,r*0.2,0,0,Math.PI); xc.stroke();
      // Sticks
      xc.lineWidth=r*0.1;
      xc.beginPath(); xc.moveTo(cx-r*0.45,cy-r*0.6); xc.lineTo(cx-r*0.15,cy-r*0.2); xc.stroke();
      xc.beginPath(); xc.moveTo(cx+r*0.45,cy-r*0.6); xc.lineTo(cx+r*0.15,cy-r*0.2); xc.stroke();
      // Drum top
      xc.fillStyle='rgba(255,255,255,0.15)';
      xc.beginPath(); xc.ellipse(cx,cy-r*0.1,r*0.7,r*0.2,0,0,Math.PI*2); xc.fill();
      break;
    }
    case 'VIBE': {
      // Wave/texture icon - sound waves emanating
      xc.strokeStyle='rgba(255,255,255,0.9)'; xc.lineWidth=r*0.12;
      // Multiple curved wave lines
      for(let i=0;i<3;i++) {
        const offset = (i-1)*r*0.35;
        xc.beginPath();
        xc.arc(cx+offset,cy,r*0.25+i*r*0.15,Math.PI*0.3,Math.PI*1.7);
        xc.stroke();
      }
      // Central dot
      xc.fillStyle='rgba(255,255,255,0.85)';
      xc.beginPath(); xc.arc(cx,cy,r*0.15,0,Math.PI*2); xc.fill();
      break;
    }
    case 'MELODY': {
      // Musical note icon
      xc.fillStyle='rgba(255,255,255,0.92)';
      xc.strokeStyle='rgba(255,255,255,0.92)'; xc.lineWidth=r*0.14;
      // Note head (ellipse)
      xc.beginPath();
      xc.ellipse(cx-r*0.2,cy+r*0.35,r*0.28,r*0.2,-0.3,0,Math.PI*2);
      xc.fill();
      // Stem
      xc.beginPath();
      xc.moveTo(cx+r*0.05,cy+r*0.3);
      xc.lineTo(cx+r*0.05,cy-r*0.55);
      xc.stroke();
      // Flag
      xc.beginPath();
      xc.moveTo(cx+r*0.05,cy-r*0.55);
      xc.quadraticCurveTo(cx+r*0.45,cy-r*0.35,cx+r*0.15,cy-r*0.1);
      xc.stroke();
      break;
    }
    case 'FLOW': {
      // EQ bars — animated heights (legacy fallback)
      const t=Date.now()*0.003;
      const heights=[0.6,1,0.75,0.9,0.55,0.8];
      const bw=r*1.6/heights.length;
      heights.forEach((h2,i)=>{
        const anim=h2+Math.sin(t+i*1.1)*0.15;
        const bh=r*1.5*anim;
        const bx=cx-r*0.8+i*bw;
        const by=cy+r*0.75-bh;
        const bg2=xc.createLinearGradient(bx,by,bx,by+bh);
        bg2.addColorStop(0,'rgba(255,255,255,0.9)');
        bg2.addColorStop(1,'rgba(255,255,255,0.4)');
        xc.fillStyle=bg2;
        xc.beginPath(); xc.roundRect(bx,by,bw*0.75,bh,2); xc.fill();
      });
      break;
    }
    case 'HYPE': {
      // Bold lightning bolt
      xc.fillStyle='rgba(255,255,255,0.95)';
      xc.shadowColor=th.light; xc.shadowBlur=8;
      xc.beginPath();
      xc.moveTo(cx+r*0.18,cy-r*0.92);
      xc.lineTo(cx-r*0.28,cy+r*0.08);
      xc.lineTo(cx+r*0.06,cy+r*0.08);
      xc.lineTo(cx-r*0.18,cy+r*0.92);
      xc.lineTo(cx+r*0.38,cy-r*0.08);
      xc.lineTo(cx+r*0.02,cy-r*0.08);
      xc.closePath(); xc.fill();
      break;
    }
    case 'LABEL': {
      // Price tag with star
      xc.fillStyle='rgba(255,255,255,0.2)';
      xc.strokeStyle='rgba(255,255,255,0.9)'; xc.lineWidth=r*0.13;
      xc.beginPath();
      xc.moveTo(cx-r*0.7,cy-r*0.38);
      xc.lineTo(cx+r*0.22,cy-r*0.38);
      xc.lineTo(cx+r*0.72,cy);
      xc.lineTo(cx+r*0.22,cy+r*0.38);
      xc.lineTo(cx-r*0.7,cy+r*0.38);
      xc.closePath(); xc.fill(); xc.stroke();
      // Hole
      xc.fillStyle='rgba(255,255,255,0.85)';
      xc.beginPath(); xc.arc(cx+r*0.35,cy,r*0.13,0,Math.PI*2); xc.fill();
      break;
    }
    case 'WILD': {
      // 5-point star
      xc.fillStyle='rgba(255,255,255,0.95)';
      xc.shadowColor=th.light; xc.shadowBlur=6;
      xc.beginPath();
      for(let i=0;i<5;i++){
        const ao=(i*4*Math.PI/5)-Math.PI/2;
        const ai=ao+2*Math.PI/5;
        const x1=cx+Math.cos(ao)*r*0.88, y1=cy+Math.sin(ao)*r*0.88;
        const x2=cx+Math.cos(ai)*r*0.38, y2=cy+Math.sin(ai)*r*0.38;
        i===0?xc.moveTo(x1,y1):xc.lineTo(x1,y1);
        xc.lineTo(x2,y2);
      }
      xc.closePath(); xc.fill();
      break;
    }
    case 'GARBAGE': {
      // Skull & crossbones — menacing
      xc.save();
      xc.fillStyle='rgba(200,0,30,0.7)';
      xc.shadowColor='#ff0033'; xc.shadowBlur=6;
      // Skull dome
      xc.beginPath(); xc.arc(cx, cy-r*0.12, r*0.5, Math.PI, 0); xc.closePath(); xc.fill();
      // Jaw
      xc.beginPath();
      xc.moveTo(cx-r*0.4, cy-r*0.12);
      xc.lineTo(cx-r*0.38, cy+r*0.28);
      xc.lineTo(cx-r*0.14, cy+r*0.28);
      xc.lineTo(cx-r*0.14, cy+r*0.08);
      xc.lineTo(cx+r*0.14, cy+r*0.08);
      xc.lineTo(cx+r*0.14, cy+r*0.28);
      xc.lineTo(cx+r*0.38, cy+r*0.28);
      xc.lineTo(cx+r*0.4, cy-r*0.12);
      xc.fill();
      // Eyes — dark holes
      xc.fillStyle='rgba(5,4,15,0.95)';
      xc.beginPath(); xc.ellipse(cx-r*0.2,cy-r*0.18,r*0.14,r*0.16,0,0,Math.PI*2); xc.fill();
      xc.beginPath(); xc.ellipse(cx+r*0.2,cy-r*0.18,r*0.14,r*0.16,0,0,Math.PI*2); xc.fill();
      // Nose
      xc.beginPath(); xc.moveTo(cx,cy+r*0.0); xc.lineTo(cx-r*0.1,cy+r*0.18); xc.lineTo(cx+r*0.1,cy+r*0.18); xc.fill();
      // Crossbones
      xc.strokeStyle='rgba(180,0,25,0.6)'; xc.lineWidth=r*0.13; xc.lineCap='round';
      xc.shadowBlur=4;
      xc.beginPath(); xc.moveTo(cx-r*0.7,cy+r*0.55); xc.lineTo(cx+r*0.7,cy+r*0.9); xc.stroke();
      xc.beginPath(); xc.moveTo(cx+r*0.7,cy+r*0.55); xc.lineTo(cx-r*0.7,cy+r*0.9); xc.stroke();
      // Bone ends
      [[cx-r*0.7,cy+r*0.55],[cx+r*0.7,cy+r*0.9],[cx+r*0.7,cy+r*0.55],[cx-r*0.7,cy+r*0.9]].forEach(([bx,by])=>{
        xc.beginPath(); xc.arc(bx,by,r*0.1,0,Math.PI*2); xc.fillStyle='rgba(180,0,25,0.6)'; xc.fill();
      });
      xc.restore();
      break;
    }
    case 'EP': {
      // Vinyl with label
      xc.strokeStyle='rgba(255,255,255,0.8)'; xc.lineWidth=r*0.12;
      xc.beginPath(); xc.arc(cx,cy,r*0.78,0,Math.PI*2); xc.stroke();
      // Grooves
      for(let i=1;i<=3;i++){
        xc.globalAlpha*=0.5;
        xc.beginPath(); xc.arc(cx,cy,r*(0.4+i*0.12),0,Math.PI*2); xc.stroke();
        xc.globalAlpha=1;
      }
      xc.fillStyle='rgba(255,255,255,0.75)';
      xc.beginPath(); xc.arc(cx,cy,r*0.25,0,Math.PI*2); xc.fill();
      xc.fillStyle=th.base;
      xc.beginPath(); xc.arc(cx,cy,r*0.1,0,Math.PI*2); xc.fill();
      break;
    }
    case 'ALBUM': {
      const t=Date.now()*0.001;
      // Spinning vinyl (rotates!)
      xc.save(); xc.translate(cx,cy); xc.rotate(t*0.8);
      xc.strokeStyle='rgba(255,215,0,0.85)'; xc.lineWidth=r*0.12;
      xc.beginPath(); xc.arc(0,0,r*0.78,0,Math.PI*2); xc.stroke();
      for(let i=1;i<=4;i++){
        xc.globalAlpha=0.6-i*0.1;
        xc.beginPath(); xc.arc(0,0,r*(0.3+i*0.12),0,Math.PI*2); xc.stroke();
      }
      xc.globalAlpha=1;
      xc.fillStyle='rgba(255,215,0,0.9)';
      xc.beginPath(); xc.arc(0,0,r*0.18,0,Math.PI*2); xc.fill();
      xc.restore();
      break;
    }
    case 'VIRAL': {
      // Flame
      xc.fillStyle='rgba(255,80,30,0.95)'; xc.shadowColor='#ff4400'; xc.shadowBlur=8;
      xc.beginPath();
      xc.moveTo(cx,cy-r*0.92);
      xc.bezierCurveTo(cx+r*0.65,cy-r*0.3,cx+r*0.55,cy+r*0.35,cx,cy+r*0.92);
      xc.bezierCurveTo(cx-r*0.55,cy+r*0.35,cx-r*0.65,cy-r*0.3,cx,cy-r*0.92);
      xc.fill();
      xc.fillStyle='rgba(255,200,0,0.88)'; xc.shadowBlur=4;
      xc.beginPath();
      xc.moveTo(cx,cy-r*0.45);
      xc.bezierCurveTo(cx+r*0.32,cy+r*0.1,cx+r*0.28,cy+r*0.55,cx,cy+r*0.88);
      xc.bezierCurveTo(cx-r*0.28,cy+r*0.55,cx-r*0.32,cy+r*0.1,cx,cy-r*0.45);
      xc.fill();
      break;
    }
    case 'CHART': {
      // Rising bars + arrow
      const barH=[0.45,0.7,0.55,0.88,0.62];
      barH.forEach((h2,i)=>{
        const bh2=r*1.4*h2, bx2=cx-r*0.82+i*r*0.42, by2=cy+r*0.7-bh2;
        const cg2=xc.createLinearGradient(bx2,by2,bx2,by2+bh2);
        cg2.addColorStop(0,'rgba(0,255,170,0.95)'); cg2.addColorStop(1,'rgba(0,180,100,0.6)');
        xc.fillStyle=cg2;
        xc.beginPath(); xc.roundRect(bx2,by2,r*0.35,bh2,2); xc.fill();
      });
      // Up arrow overlay
      xc.fillStyle='rgba(255,255,255,0.9)';
      xc.beginPath();
      xc.moveTo(cx+r*0.52,cy-r*0.75); xc.lineTo(cx+r*0.82,cy-r*0.3);
      xc.lineTo(cx+r*0.65,cy-r*0.3); xc.lineTo(cx+r*0.65,cy+r*0.1);
      xc.lineTo(cx+r*0.38,cy+r*0.1); xc.lineTo(cx+r*0.38,cy-r*0.3);
      xc.lineTo(cx+r*0.2,cy-r*0.3); xc.closePath(); xc.fill();
      break;
    }
    case 'COLLAB': {
      // Two overlapping gems/circles
      xc.strokeStyle='rgba(255,255,255,0.85)'; xc.lineWidth=r*0.14;
      xc.fillStyle='rgba(255,255,255,0.1)';
      xc.beginPath(); xc.arc(cx-r*0.28,cy,r*0.5,0,Math.PI*2); xc.fill(); xc.stroke();
      xc.beginPath(); xc.arc(cx+r*0.28,cy,r*0.5,0,Math.PI*2); xc.fill(); xc.stroke();
      // Link symbol in middle
      xc.fillStyle='rgba(255,255,255,0.8)';
      xc.beginPath(); xc.arc(cx,cy,r*0.14,0,Math.PI*2); xc.fill();
      break;
    }
    default: {
      xc.fillStyle='rgba(255,255,255,0.5)';
      xc.beginPath(); xc.arc(cx,cy,r*0.45,0,Math.PI*2); xc.fill();
    }
  }
  xc.restore();
}

function rrect(xc,x,y,w,h,r) {
  r=Math.min(r,w/2,h/2);
  xc.beginPath();
  xc.moveTo(x+r,y); xc.lineTo(x+w-r,y); xc.arcTo(x+w,y,x+w,y+r,r);
  xc.lineTo(x+w,y+h-r); xc.arcTo(x+w,y+h,x+w-r,y+h,r);
  xc.lineTo(x+r,y+h); xc.arcTo(x,y+h,x,y+h-r,r);
  xc.lineTo(x,y+r); xc.arcTo(x,y,x+r,y,r);
  xc.closePath();
}

function adjCol(hex,amt) {
  const n=parseInt(hex.replace('#',''),16);
  const r=clamp((n>>16)+amt,0,255);
  const g=clamp(((n>>8)&0xff)+amt,0,255);
  const b=clamp((n&0xff)+amt,0,255);
  return `rgb(${r},${g},${b})`;
}

// ── CLUSTER / GROUP RENDERING HELPERS ────────────────

// Find ALL connected groups on the board (any size ≥ 1), returns [{type,cells}]
function findAllGroups(brd) {
  const vis = mkBoard().map(()=>Array(COLS).fill(false));
  const groups = [];
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++) {
    if(vis[r][c]) continue;
    let raw = brd[r][c]; if(!raw) continue;
    const type = typeof raw==='string' ? raw.replace('_F_','') : raw;
    if(type==='FROZEN') continue;
    if(SPECIALS.includes(type)) { vis[r][c]=true; groups.push({type,cells:[[r,c]]}); continue; }
    // BFS
    const cells=[], q=[[r,c]];
    vis[r][c]=true;
    while(q.length) {
      const [cr,cc]=q.shift(); cells.push([cr,cc]);
      for(const[dr,dc] of [[-1,0],[1,0],[0,-1],[0,1]]) {
        const nr=cr+dr,nc=cc+dc;
        if(nr<0||nr>=ROWS||nc<0||nc>=COLS||vis[nr][nc]) continue;
        const nt = brd[nr][nc]; if(!nt) continue;
        const ntc = typeof nt==='string'?nt.replace('_F_',''):nt;
        if(ntc===type) { vis[nr][nc]=true; q.push([nr,nc]); } // strict match — no WILD bleed
      }
    }
    groups.push({type,cells});
  }
  return groups;
}

// Draw a group of connected board tiles as a single merged blob
function drawMergedCluster(xc, grp, pulse=0) {
  const {type, cells} = grp;
  const th = TILE_THEMES[type] || TILE_THEMES.GARBAGE;
  const isValid = cells.length >= MIN_CLUSTER;
  const pad = 2;

  // Build a set for quick adjacency lookups
  const cellSet = new Set(cells.map(([r,c])=>r+','+c));
  const has = (r,c) => cellSet.has(r+','+c);

  // 1. Fill each cell with the gem body — shared gradient across whole blob
  cells.forEach(([r,c]) => {
    const px=colX[c], py=r*TS, pw=colW[c], ph=TS;
    xc.save();

    // Determine which edges are internal (shared with same group)
    const adjT=has(r-1,c), adjB=has(r+1,c), adjL=has(r,c-1), adjR=has(r,c+1);

    // Build a path that dissolves shared edges with neighbours
    const rr=8; // corner radius
    const x1=px+pad, y1=py+pad, x2=px+pw-pad, y2=py+ph-pad;
    const tlr = (adjT||adjL)?0:rr, trr = (adjT||adjR)?0:rr;
    const blr = (adjB||adjL)?0:rr, brr = (adjB||adjR)?0:rr;

    // Extend into adjacent cells slightly to fill gap
    const x1e = adjL ? px-COL_GAP/2 : x1;
    const x2e = adjR ? px+pw+COL_GAP/2 : x2;
    const y1e = adjT ? py-1 : y1;
    const y2e = adjB ? py+ph+1 : y2;

    xc.beginPath();
    xc.moveTo(x1e+tlr, y1e);
    xc.lineTo(x2e-trr, y1e); if(trr) xc.arcTo(x2e,y1e,x2e,y1e+trr,trr); else xc.lineTo(x2e,y1e);
    xc.lineTo(x2e, y2e-brr); if(brr) xc.arcTo(x2e,y2e,x2e-brr,y2e,brr); else xc.lineTo(x2e,y2e);
    xc.lineTo(x1e+blr, y2e); if(blr) xc.arcTo(x1e,y2e,x1e,y2e-blr,blr); else xc.lineTo(x1e,y2e);
    xc.lineTo(x1e, y1e+tlr); if(tlr) xc.arcTo(x1e,y1e,x1e+tlr,y1e,tlr); else xc.lineTo(x1e,y1e);
    xc.closePath();

    // Body gradient
    const bg=xc.createLinearGradient(px,py,px,py+ph);
    bg.addColorStop(0,th.mid); bg.addColorStop(0.5,th.base); bg.addColorStop(1,th.dark);
    xc.fillStyle=bg;
    xc.shadowColor=th.glow; xc.shadowBlur=3;
    xc.fill();

    // Side shading
    const sg=xc.createLinearGradient(px,py,px+pw,py);
    sg.addColorStop(0,'rgba(255,255,255,0.12)'); sg.addColorStop(1,'rgba(0,0,0,0.12)');
    xc.fillStyle=sg; xc.shadowBlur=0; xc.fill();

    xc.restore();
  });

  // 2. Draw specular highlight + icon on each cell
  cells.forEach(([r,c]) => {
    const px=colX[c], py=r*TS, pw=colW[c], ph=TS;
    xc.save();

    // Top specular
    const hg=xc.createRadialGradient(px+pw*0.36,py+ph*0.2,0,px+pw*0.36,py+ph*0.2,pw*0.5);
    hg.addColorStop(0,'rgba(255,255,255,0.48)');
    hg.addColorStop(0.5,'rgba(255,255,255,0.12)');
    hg.addColorStop(1,'rgba(255,255,255,0)');
    xc.fillStyle=hg;
    xc.fillRect(px+pad,py+pad,pw-pad*2,ph*0.52);

    // Glint dot
    const dg=xc.createRadialGradient(px+pw*0.26,py+ph*0.2,0,px+pw*0.26,py+ph*0.2,pw*0.14);
    dg.addColorStop(0,'rgba(255,255,255,0.88)'); dg.addColorStop(1,'rgba(255,255,255,0)');
    xc.fillStyle=dg;
    xc.beginPath(); xc.arc(px+pw*0.26,py+ph*0.2,pw*0.14,0,Math.PI*2); xc.fill();

    // Icon (only on non-adjacent cells or on largest cell in group)
    drawTileIcon(xc, px+pw*0.5, py+ph*0.5, Math.min(pw,ph)*0.34, type, th);

    xc.restore();
  });

  // 3. Viscous paint outer rim — thick chunky border, no thin lines
  // Two-pass: outer dark shadow stroke, inner bright highlight stroke
  const borderW = isValid ? 3.5 : 2;
  cells.forEach(([r,c]) => {
    const px=colX[c], py=r*TS, pw=colW[c], ph=TS;
    const adjT=has(r-1,c), adjB=has(r+1,c), adjL=has(r,c-1), adjR=has(r,c+1);
    // Expand edges to neighbours
    const x1e=adjL?px-0.5:px+pad, x2e=adjR?px+pw+0.5:px+pw-pad;
    const y1e=adjT?py-0.5:py+pad, y2e=adjB?py+ph+0.5:py+ph-pad;

    // Outer dark shadow pass
    xc.save();
    xc.strokeStyle='rgba(0,0,0,0.55)'; xc.lineWidth=borderW+2;
    xc.globalAlpha=0.8; xc.lineCap='round';
    if(!adjT){xc.beginPath();xc.moveTo(x1e,y1e);xc.lineTo(x2e,y1e);xc.stroke();}
    if(!adjB){xc.beginPath();xc.moveTo(x1e,y2e);xc.lineTo(x2e,y2e);xc.stroke();}
    if(!adjL){xc.beginPath();xc.moveTo(x1e,y1e);xc.lineTo(x1e,y2e);xc.stroke();}
    if(!adjR){xc.beginPath();xc.moveTo(x2e,y1e);xc.lineTo(x2e,y2e);xc.stroke();}
    xc.restore();

    // Inner bright paint rim
    xc.save();
    xc.strokeStyle = isValid ? th.light : 'rgba(255,255,255,0.25)';
    xc.lineWidth = borderW;
    xc.globalAlpha = isValid ? 0.75 : 0.35;
    xc.lineCap='round';
    xc.shadowColor = isValid ? th.glow : 'rgba(0,0,0,0)';
    xc.shadowBlur = isValid ? 8 : 0;
    if(!adjT){xc.beginPath();xc.moveTo(x1e,y1e);xc.lineTo(x2e,y1e);xc.stroke();}
    if(!adjB){xc.beginPath();xc.moveTo(x1e,y2e);xc.lineTo(x2e,y2e);xc.stroke();}
    if(!adjL){xc.beginPath();xc.moveTo(x1e,y1e);xc.lineTo(x1e,y2e);xc.stroke();}
    if(!adjR){xc.beginPath();xc.moveTo(x2e,y1e);xc.lineTo(x2e,y2e);xc.stroke();}
    xc.restore();
  });

  // 4. Valid cluster ambient glow + size badge
  if(isValid) {
    // Pulsing ambient glow fill behind entire cluster
    xc.save();
    xc.globalAlpha=0.08+pulse*0.12;
    xc.fillStyle=th.glow;
    xc.shadowColor=th.glow; xc.shadowBlur=20+pulse*15;
    cells.forEach(([r,c])=>{
      xc.fillRect(colX[c],r*TS,colW[c],TS);
    });
    xc.restore();

    // Size badge
    const topCell = cells.reduce((a,b)=> a[0]<b[0]||(a[0]===b[0]&&a[1]>b[1])?a:b);
    const bx = colX[topCell[1]]+colW[topCell[1]]-6;
    const by = topCell[0]*TS+6;
    xc.save();
    xc.fillStyle=th.glow; xc.shadowColor=th.glow; xc.shadowBlur=6;
    xc.beginPath(); xc.arc(bx,by,7,0,Math.PI*2); xc.fill();
    xc.fillStyle='#000'; xc.font=`bold 7px 'Barlow Condensed',sans-serif`;
    xc.textAlign='center'; xc.textBaseline='middle';
    xc.shadowBlur=0;
    xc.fillText(cells.length, bx, by);
    xc.restore();
  }
}

// Draw a falling piece as a connected blob (same-type tiles only)
function drawMergedPiece(xc, cells, type) {
  const th = TILE_THEMES[type] || TILE_THEMES.GARBAGE;
  const pad = 2, rr = 10;
  const cellSet = new Set(cells.map(({x,y})=>x+','+y));
  const hasP = (x,y)=>cellSet.has(x+','+y);

  // Step 1: Build ONE unified fill path that merges all cells
  // Each cell expands into neighbours to fully close gaps
  xc.save();
  xc.beginPath();
  cells.forEach(({x,y})=>{
    const px=colX[x], py=y*TS, pw=colW[x], ph=TS;
    const aT=hasP(x,y-1), aB=hasP(x,y+1), aL=hasP(x-1,y), aR=hasP(x+1,y);
    // Expand: if adjacent, eat the full gap
    const x1 = aL ? px - COL_GAP : px + pad;
    const x2 = aR ? px + pw + COL_GAP : px + pw - pad;
    const y1 = aT ? py - 2 : py + pad;
    const y2 = aB ? py + ph + 2 : py + ph - pad;
    const tlr=(aT||aL)?0:rr, trr=(aT||aR)?0:rr;
    const blr=(aB||aL)?0:rr, brr=(aB||aR)?0:rr;
    xc.moveTo(x1+tlr, y1);
    xc.lineTo(x2-trr, y1); if(trr)xc.arcTo(x2,y1,x2,y1+trr,trr);else xc.lineTo(x2,y1);
    xc.lineTo(x2, y2-brr); if(brr)xc.arcTo(x2,y2,x2-brr,y2,brr);else xc.lineTo(x2,y2);
    xc.lineTo(x1+blr, y2); if(blr)xc.arcTo(x1,y2,x1,y2-blr,blr);else xc.lineTo(x1,y2);
    xc.lineTo(x1, y1+tlr); if(tlr)xc.arcTo(x1,y1,x1+tlr,y1,tlr);else xc.lineTo(x1,y1);
    xc.closePath();
  });

  // Compute bounding box for the gradient
  const minX=Math.min(...cells.map(({x})=>colX[x]));
  const maxX=Math.max(...cells.map(({x})=>colX[x]+colW[x]));
  const minY=Math.min(...cells.map(({y})=>y*TS));
  const maxY=Math.max(...cells.map(({y})=>(y+1)*TS));

  // Fill: top-to-bottom gem gradient
  const bg=xc.createLinearGradient(minX,minY,minX,maxY);
  bg.addColorStop(0,th.mid); bg.addColorStop(0.45,th.base); bg.addColorStop(1,th.dark);
  xc.fillStyle=bg;
  xc.shadowColor=th.glow; xc.shadowBlur=8;
  xc.fill('nonzero');

  // Side shading pass (left bright, right dark)
  xc.shadowBlur=0;
  const sg=xc.createLinearGradient(minX,0,maxX,0);
  sg.addColorStop(0,'rgba(255,255,255,0.13)'); sg.addColorStop(1,'rgba(0,0,0,0.12)');
  xc.fillStyle=sg; xc.fill('nonzero');

  xc.restore();

  // Step 2: Clip to the exact shape, then draw specular highlights inside
  xc.save();
  xc.beginPath();
  cells.forEach(({x,y})=>{
    const px=colX[x],py=y*TS,pw=colW[x],ph=TS;
    const aT=hasP(x,y-1),aB=hasP(x,y+1),aL=hasP(x-1,y),aR=hasP(x+1,y);
    const x1=aL?px-COL_GAP:px+pad, x2=aR?px+pw+COL_GAP:px+pw-pad;
    const y1=aT?py-2:py+pad, y2=aB?py+ph+2:py+ph-pad;
    const tlr=(aT||aL)?0:rr,trr=(aT||aR)?0:rr,blr=(aB||aL)?0:rr,brr=(aB||aR)?0:rr;
    xc.moveTo(x1+tlr,y1);
    xc.lineTo(x2-trr,y1);if(trr)xc.arcTo(x2,y1,x2,y1+trr,trr);else xc.lineTo(x2,y1);
    xc.lineTo(x2,y2-brr);if(brr)xc.arcTo(x2,y2,x2-brr,y2,brr);else xc.lineTo(x2,y2);
    xc.lineTo(x1+blr,y2);if(blr)xc.arcTo(x1,y2,x1,y2-blr,blr);else xc.lineTo(x1,y2);
    xc.lineTo(x1,y1+tlr);if(tlr)xc.arcTo(x1,y1,x1+tlr,y1,tlr);else xc.lineTo(x1,y1);
    xc.closePath();
  });
  xc.clip('nonzero');

  // Specular: one large radial across whole shape
  const specX=minX+(maxX-minX)*0.3, specY=minY+(maxY-minY)*0.18;
  const hg=xc.createRadialGradient(specX,specY,0,specX,specY,(maxX-minX)*0.55);
  hg.addColorStop(0,'rgba(255,255,255,0.52)');
  hg.addColorStop(0.4,'rgba(255,255,255,0.14)');
  hg.addColorStop(1,'rgba(255,255,255,0)');
  xc.fillStyle=hg; xc.fillRect(minX,minY,maxX-minX,maxY-minY);

  // Glint dot top-left of topmost cell
  const topCell=cells.reduce((a,b)=>a.y<b.y||(a.y===b.y&&a.x<b.x)?a:b);
  const gx=colX[topCell.x]+colW[topCell.x]*0.25, gy=topCell.y*TS+TS*0.2;
  const dg=xc.createRadialGradient(gx,gy,0,gx,gy,colW[topCell.x]*0.15);
  dg.addColorStop(0,'rgba(255,255,255,0.9)'); dg.addColorStop(1,'rgba(255,255,255,0)');
  xc.fillStyle=dg; xc.fillRect(minX,minY,maxX-minX,maxY-minY);

  xc.restore();

  // Step 3: Icons on each cell
  cells.forEach(({x,y})=>{
    drawTileIcon(xc,colX[x]+colW[x]*0.5,y*TS+TS*0.5,Math.min(colW[x],TS)*0.33,type,th);
  });

  // Step 4: Outer border only — no internal lines
  xc.save();
  xc.strokeStyle=th.light; xc.lineWidth=1.5; xc.globalAlpha=0.55;
  xc.shadowColor=th.glow; xc.shadowBlur=6;
  cells.forEach(({x,y})=>{
    const px=colX[x],py=y*TS,pw=colW[x],ph=TS;
    const x1=px+pad,y1=py+pad,x2=px+pw-pad,y2=py+ph-pad;
    const aT=hasP(x,y-1),aB=hasP(x,y+1),aL=hasP(x-1,y),aR=hasP(x+1,y);
    if(!aT){xc.beginPath();xc.moveTo(aL?x1-2:x1,y1);xc.lineTo(aR?x2+2:x2,y1);xc.stroke();}
    if(!aB){xc.beginPath();xc.moveTo(aL?x1-2:x1,y2);xc.lineTo(aR?x2+2:x2,y2);xc.stroke();}
    if(!aL){xc.beginPath();xc.moveTo(x1,aT?y1-2:y1);xc.lineTo(x1,aB?y2+2:y2);xc.stroke();}
    if(!aR){xc.beginPath();xc.moveTo(x2,aT?y1-2:y1);xc.lineTo(x2,aB?y2+2:y2);xc.stroke();}
  });
  xc.restore();
}

// ── SCORE POPUPS ─────────────────────────────────────
let scorePopups = [];
function spawnScorePopup(x, y, text, color) {
  scorePopups.push({ x, y, vy:-2.2, life:1, text, color });
}
function updateScorePopups() {
  scorePopups.forEach(p=>{ p.y+=p.vy; p.vy*=0.92; p.life-=0.022; });
  scorePopups=scorePopups.filter(p=>p.life>0);
}

// ── MAIN DRAW ────────────────────────────────────────
function drawAll() {
  const now = Date.now();
  const pulse = 0.5 + Math.sin(now * 0.0045) * 0.5;

  // Enhanced screen shake with rotation and elastic decay
  let shakeX = 0, shakeY = 0, shakeRot = 0;
  if (screenShake > 0.3) {
    const shakePhase = now * 0.025;
    shakeX = Math.sin(shakePhase) * screenShake * 0.8;
    shakeY = Math.cos(shakePhase * 1.3) * screenShake * 0.5;
    shakeRot = Math.sin(shakePhase * 0.7) * screenShake * 0.002;
  }

  boardCtx.save();
  boardCtx.translate(boardCvs.width / 2 + shakeX, boardCvs.height / 2 + shakeY);
  boardCtx.rotate(shakeRot);
  boardCtx.translate(-boardCvs.width / 2, -boardCvs.height / 2);

  // Premium board background with depth
  const bgGrad = boardCtx.createLinearGradient(0, 0, 0, boardCvs.height);
  bgGrad.addColorStop(0, '#08071a');
  bgGrad.addColorStop(0.3, '#050414');
  bgGrad.addColorStop(0.7, '#040310');
  bgGrad.addColorStop(1, '#02020a');
  boardCtx.fillStyle = bgGrad;
  boardCtx.fillRect(-4, -4, boardCvs.width+8, boardCvs.height+8);

  // Subtle grid pattern for depth (very faint)
  boardCtx.strokeStyle = 'rgba(255,255,255,0.015)';
  boardCtx.lineWidth = 0.5;
  for(let c=0; c<=COLS; c++) {
    const gx = c * TS;
    boardCtx.beginPath();
    boardCtx.moveTo(gx, 0);
    boardCtx.lineTo(gx, boardCvs.height);
    boardCtx.stroke();
  }
  for(let r=0; r<=ROWS; r++) {
    const gy = r * TS;
    boardCtx.beginPath();
    boardCtx.moveTo(0, gy);
    boardCtx.lineTo(boardCvs.width, gy);
    boardCtx.stroke();
  }

  // Animated ambient glows - more dynamic and colorful
  const t = Date.now() * 0.0006;
  const glows = [
    {x:boardCvs.width*(0.25+Math.sin(t*0.7)*0.1), y:boardCvs.height*(0.7+Math.cos(t*0.5)*0.1), r:boardCvs.width*0.5, col:'rgba(255,45,110,0.04)'},
    {x:boardCvs.width*(0.75+Math.cos(t*0.8)*0.1), y:boardCvs.height*(0.35+Math.sin(t*0.6)*0.1), r:boardCvs.width*0.45, col:'rgba(0,229,255,0.035)'},
    {x:boardCvs.width*(0.5+Math.sin(t)*0.15), y:boardCvs.height*(0.5+Math.cos(t*0.7)*0.15), r:boardCvs.width*0.4, col:'rgba(57,255,20,0.025)'},
    {x:boardCvs.width*(0.6+Math.cos(t*1.1)*0.1), y:boardCvs.height*(0.8+Math.sin(t*0.9)*0.08), r:boardCvs.width*0.35, col:'rgba(255,215,0,0.02)'},
  ];
  glows.forEach(g => {
    const rg = boardCtx.createRadialGradient(g.x, g.y, 0, g.x, g.y, g.r);
    rg.addColorStop(0, g.col);
    rg.addColorStop(0.6, g.col.replace(/[\d.]+\)$/, '0.01)'));
    rg.addColorStop(1, 'rgba(0,0,0,0)');
    boardCtx.fillStyle = rg;
    boardCtx.fillRect(0, 0, boardCvs.width, boardCvs.height);
  });

  // Enhanced vignette for focus
  const vig = boardCtx.createRadialGradient(
    boardCvs.width/2, boardCvs.height/2, boardCvs.height*0.15,
    boardCvs.width/2, boardCvs.height/2, boardCvs.height*0.8
  );
  vig.addColorStop(0, 'rgba(0,0,0,0)');
  vig.addColorStop(0.6, 'rgba(0,0,0,0.15)');
  vig.addColorStop(1, 'rgba(0,0,0,0.45)');
  boardCtx.fillStyle = vig;
  boardCtx.fillRect(0, 0, boardCvs.width, boardCvs.height);

  // Valid cluster glow — outer blooms, no grid lines
  if(!resolving) {
    findClusters(board).forEach(cl=>{
      const th=TILE_THEMES[cl.type]; if(!th) return;
      cl.cells.forEach(([r,c])=>{
        boardCtx.save();
        boardCtx.shadowColor=th.glow; boardCtx.shadowBlur=14+pulse*14;
        boardCtx.globalAlpha=0.18+pulse*0.28;
        boardCtx.fillStyle=th.glow;
        rrect(boardCtx,colX[c]+2,r*TS+2,colW[c]-4,TS-4,8);
        boardCtx.fill();
        boardCtx.restore();
      });
    });
    invalidCells.forEach(([r,c])=>{
      boardCtx.save();
      boardCtx.shadowColor='#ff2222'; boardCtx.shadowBlur=16;
      boardCtx.globalAlpha=0.5;
      boardCtx.fillStyle='rgba(255,0,0,0.15)';
      rrect(boardCtx,colX[c]+1,r*TS+1,colW[c]-2,TS-2,6); boardCtx.fill();
      boardCtx.restore();
    });
  }

  // ── BOARD TILES — merged cluster rendering ───────────
  // Build a map of which cells belong to a colourable cluster
  const clusterMap = {}; // key "r,c" → cluster index
  const boardClusters = findAllGroups(board); // all connected groups ≥ 1

  boardClusters.forEach((grp, gi) => {
    grp.cells.forEach(([r,c]) => { clusterMap[r+','+c] = gi; });
  });

  // Draw flash tiles first (white flash, no merge)
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++) {
    const raw = board[r][c];
    if(!raw) continue;
    const flash = typeof raw==='string' && raw.startsWith('_F_');
    if(flash) drawTile(boardCtx, colX[c], r*TS, colW[c], TS, raw.replace('_F_',''), 1, true, 0);
  }

  // Draw merged blobs for clusters ≥ MIN_CLUSTER, individual tiles otherwise
  const drawnGroups = new Set();
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++) {
    let raw = board[r][c]; if(!raw) continue;
    if(typeof raw==='string' && raw.startsWith('_F_')) continue; // already drawn

    const gi = clusterMap[r+','+c];
    const grp = boardClusters[gi];

    if(grp && grp.cells.length >= MIN_CLUSTER && !SPECIALS.includes(grp.type)) {
      // Draw as merged blob — once per group
      if(!drawnGroups.has(gi)) {
        drawnGroups.add(gi);
        drawMergedCluster(boardCtx, grp, pulse);
      }
    } else {
      // Single tile or garbage/special — draw normally
      const t = typeof raw==='string' ? raw.replace('_F_','') : raw;
      drawTile(boardCtx, colX[c], r*TS, colW[c], TS, t, 1, false, 0);
    }
  }

  // ── GHOST PIECE — single outer silhouette, no per-cell borders ──
  if(piece && !resolving) {
    const ghost={...piece};
    while(fits({...ghost,y:ghost.y+1},board)) ghost.y++;
    if(ghost.y !== piece.y) {
      const gCells = pieceCells(ghost).filter(({x,y})=>y>=0&&x>=0&&x<COLS);
      if(gCells.length>0) {
        // Build the outer contour of the whole ghost shape as one path
        const cellSet=new Set(gCells.map(({x,y})=>x+','+y));
        const hP=(x,y)=>cellSet.has(x+','+y);
        const firstType=gCells[0].t;
        const thG=TILE_THEMES[firstType]||TILE_THEMES.GARBAGE;
        boardCtx.save();
        boardCtx.globalAlpha=0.28;
        boardCtx.strokeStyle=thG.light||'#ffffff';
        boardCtx.lineWidth=1.5;
        boardCtx.setLineDash([4,4]);
        boardCtx.shadowColor=thG.glow; boardCtx.shadowBlur=4;
        // Draw only external edges — no internal cell boundaries
        gCells.forEach(({x,y})=>{
          const px=colX[x],py=ghost.y!==y?y*TS:y*TS; // use integer y for ghost
          const x1=px+2,y1=py+2,x2=px+colW[x]-2,y2=py+TS-2;
          if(!hP(x,y-1)){boardCtx.beginPath();boardCtx.moveTo(x1,y1);boardCtx.lineTo(x2,y1);boardCtx.stroke();}
          if(!hP(x,y+1)){boardCtx.beginPath();boardCtx.moveTo(x1,y2);boardCtx.lineTo(x2,y2);boardCtx.stroke();}
          if(!hP(x-1,y)){boardCtx.beginPath();boardCtx.moveTo(x1,y1);boardCtx.lineTo(x1,y2);boardCtx.stroke();}
          if(!hP(x+1,y)){boardCtx.beginPath();boardCtx.moveTo(x2,y1);boardCtx.lineTo(x2,y2);boardCtx.stroke();}
        });
        boardCtx.setLineDash([]);
        boardCtx.restore();
      }
    }

    // ── Active falling piece — smooth sub-pixel position, clean merged blob ──
    // Use pieceYf for smooth Y, integer X
    const yOffset = (pieceYf - piece.y) * TS; // sub-pixel offset in pixels
    const liveCells = pieceCells(piece).filter(({x,y})=>y>=0&&x>=0&&x<COLS);
    if(liveCells.length>0) {
      boardCtx.save();
      boardCtx.translate(0, yOffset);
      const pieceTypes=[...new Set(liveCells.map(c=>c.t))];
      const isMerged = pieceTypes.length===1 && liveCells.length>=2 && !SPECIALS.includes(pieceTypes[0]);
      if(isMerged) {
        drawMergedPiece(boardCtx, liveCells, pieceTypes[0]);
      } else {
        liveCells.forEach(({x,y,t})=>drawTile(boardCtx,colX[x],y*TS,colW[x],TS,t,1));
      }
      boardCtx.restore();
    }
  }

  // ══════════════════════════════════════════════════════════════
  // AAA PARTICLE RENDERING - Premium visual effects
  // ══════════════════════════════════════════════════════════════
  particles.forEach(p=>{
    boardCtx.save();
    const alpha = Math.max(0, p.life);
    boardCtx.globalAlpha = alpha;

    // Update rotation for sparkles and stars
    if(p.rotation !== undefined && p.rotationSpeed) {
      p.rotation += p.rotationSpeed;
    }

    if(p.glow) {
      boardCtx.shadowColor = p.color;
      boardCtx.shadowBlur = p.size * 4;
    }

    if(p.shape==='streak') {
      // STREAK - Comet-like trail with gradient
      const speed = Math.sqrt(p.vx*p.vx + p.vy*p.vy);
      const trailMult = Math.min(1.2, speed * 0.08);
      const grad = boardCtx.createLinearGradient(
        p.x, p.y,
        p.x - p.vx * trailMult, p.y - p.vy * trailMult
      );
      grad.addColorStop(0, '#ffffff');
      grad.addColorStop(0.2, p.color);
      grad.addColorStop(1, 'transparent');
      boardCtx.strokeStyle = grad;
      boardCtx.lineWidth = p.size * 1.5;
      boardCtx.lineCap = 'round';
      boardCtx.beginPath();
      boardCtx.moveTo(p.x, p.y);
      boardCtx.lineTo(p.x - p.vx * trailMult, p.y - p.vy * trailMult);
      boardCtx.stroke();
      // Bright glowing tip
      boardCtx.shadowBlur = p.size * 6;
      boardCtx.fillStyle = '#ffffff';
      boardCtx.globalAlpha = alpha * 0.9;
      boardCtx.beginPath();
      boardCtx.arc(p.x, p.y, p.size * 0.6, 0, Math.PI * 2);
      boardCtx.fill();
    }
    else if(p.shape==='sparkle') {
      // SPARKLE - 4-point diamond with rotation
      const rot = p.rotation || 0;
      boardCtx.save();
      boardCtx.translate(p.x, p.y);
      boardCtx.rotate(rot);
      boardCtx.shadowBlur = p.size * 3;
      boardCtx.fillStyle = p.color;
      boardCtx.beginPath();
      boardCtx.moveTo(0, -p.size);
      boardCtx.lineTo(p.size * 0.3, 0);
      boardCtx.lineTo(0, p.size);
      boardCtx.lineTo(-p.size * 0.3, 0);
      boardCtx.closePath();
      boardCtx.fill();
      boardCtx.beginPath();
      boardCtx.moveTo(-p.size, 0);
      boardCtx.lineTo(0, p.size * 0.3);
      boardCtx.lineTo(p.size, 0);
      boardCtx.lineTo(0, -p.size * 0.3);
      boardCtx.closePath();
      boardCtx.fill();
      boardCtx.globalAlpha = alpha * 0.9;
      boardCtx.fillStyle = '#ffffff';
      boardCtx.beginPath();
      boardCtx.arc(0, 0, p.size * 0.25, 0, Math.PI * 2);
      boardCtx.fill();
      boardCtx.restore();
    }
    else if(p.shape==='ring') {
      // RING - Expanding circle outline with glow
      boardCtx.strokeStyle = p.color;
      boardCtx.lineWidth = Math.max(1.5, p.size * 0.4);
      boardCtx.shadowBlur = p.size * 2;
      boardCtx.beginPath();
      boardCtx.arc(p.x, p.y, p.size * 1.5, 0, Math.PI * 2);
      boardCtx.stroke();
      boardCtx.globalAlpha = alpha * 0.6;
      boardCtx.strokeStyle = '#ffffff';
      boardCtx.lineWidth = Math.max(1, p.size * 0.2);
      boardCtx.beginPath();
      boardCtx.arc(p.x, p.y, p.size * 1.2, 0, Math.PI * 2);
      boardCtx.stroke();
    }
    else if(p.shape==='star') {
      // STAR - 5-point with rotation and glow
      const rot = p.rotation || 0;
      boardCtx.save();
      boardCtx.translate(p.x, p.y);
      boardCtx.rotate(rot);
      boardCtx.shadowBlur = p.size * 4;
      boardCtx.fillStyle = p.color;
      boardCtx.beginPath();
      for(let i = 0; i < 5; i++) {
        const angle = (i * 4 * Math.PI / 5) - Math.PI / 2;
        const innerAngle = angle + Math.PI / 5;
        const outerR = p.size;
        const innerR = p.size * 0.38;
        if(i === 0) boardCtx.moveTo(Math.cos(angle) * outerR, Math.sin(angle) * outerR);
        else boardCtx.lineTo(Math.cos(angle) * outerR, Math.sin(angle) * outerR);
        boardCtx.lineTo(Math.cos(innerAngle) * innerR, Math.sin(innerAngle) * innerR);
      }
      boardCtx.closePath();
      boardCtx.fill();
      boardCtx.globalAlpha = alpha * 0.8;
      boardCtx.fillStyle = '#ffffff';
      boardCtx.beginPath();
      for(let i = 0; i < 5; i++) {
        const angle = (i * 4 * Math.PI / 5) - Math.PI / 2;
        const innerAngle = angle + Math.PI / 5;
        const outerR = p.size * 0.5;
        const innerR = p.size * 0.2;
        if(i === 0) boardCtx.moveTo(Math.cos(angle) * outerR, Math.sin(angle) * outerR);
        else boardCtx.lineTo(Math.cos(angle) * outerR, Math.sin(angle) * outerR);
        boardCtx.lineTo(Math.cos(innerAngle) * innerR, Math.sin(innerAngle) * innerR);
      }
      boardCtx.closePath();
      boardCtx.fill();
      boardCtx.restore();
    }
    else if(p.shape==='sq') {
      // SQUARE - Confetti piece with gradient
      const s = p.size;
      const grad = boardCtx.createLinearGradient(p.x - s/2, p.y - s/2, p.x + s/2, p.y + s/2);
      grad.addColorStop(0, '#ffffff');
      grad.addColorStop(0.3, p.color);
      grad.addColorStop(1, p.color);
      boardCtx.fillStyle = grad;
      boardCtx.beginPath();
      boardCtx.roundRect(p.x - s/2, p.y - s/2, s, s, s * 0.15);
      boardCtx.fill();
    }
    else {
      // CIRCLE - Default with radial gradient glow
      const grad = boardCtx.createRadialGradient(
        p.x - p.size * 0.25, p.y - p.size * 0.25, 0,
        p.x, p.y, p.size * 1.2
      );
      grad.addColorStop(0, '#ffffff');
      grad.addColorStop(0.25, p.color);
      grad.addColorStop(0.8, p.color);
      grad.addColorStop(1, 'transparent');
      boardCtx.fillStyle = p.glow ? grad : p.color;
      boardCtx.beginPath();
      boardCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      boardCtx.fill();
    }
    boardCtx.restore();
  });

  // Score popups
  updateScorePopups();
  scorePopups.forEach(p=>{
    boardCtx.save();
    boardCtx.globalAlpha=Math.max(0,Math.min(1,p.life*1.5-0.2));
    boardCtx.fillStyle=p.color; boardCtx.shadowColor=p.color; boardCtx.shadowBlur=8;
    boardCtx.font=`bold ${Math.floor(TS*0.38)}px 'Barlow Condensed',sans-serif`;
    boardCtx.textAlign='center'; boardCtx.textBaseline='middle';
    boardCtx.fillText(p.text, p.x, p.y);
    boardCtx.restore();
  });

  boardCtx.shadowBlur=0;

  // Pressure bar
  const pFrac=pressureTimer/pressureSpeed;
  boardCtx.save();
  if(pressureWarning){
    boardCtx.shadowColor='#ff2d6e'; boardCtx.shadowBlur=10*(0.5+Math.sin(now*0.012)*0.5);
    boardCtx.globalAlpha=0.9; boardCtx.fillStyle='#ff2d6e';
  } else {
    boardCtx.globalAlpha=0.38; boardCtx.fillStyle='#445577';
  }
  boardCtx.fillRect(0,boardCvs.height-4,boardCvs.width*pFrac,4);
  boardCtx.restore();

  if(viralMult>1){
    boardCtx.save();
    boardCtx.globalAlpha=0.9+Math.sin(now*0.009)*0.1;
    boardCtx.fillStyle='#ff4444'; boardCtx.shadowColor='#ff4444'; boardCtx.shadowBlur=14;
    boardCtx.font=`bold 9px 'Press Start 2P',monospace`;
    boardCtx.textAlign='right'; boardCtx.textBaseline='top';
    boardCtx.fillText('\uD83D\uDD25'+String.fromCharCode(0xD83D,0xDD25)+'x'+viralMult+'('+viralLeft+')',boardCvs.width-4,4);
    boardCtx.restore();
  }

  boardCtx.restore();
}

function drawNext() {
  const size=68;
  nextCvs.width=size; nextCvs.height=size;
  nextCtx.fillStyle='rgba(6,6,16,0.9)';
  nextCtx.fillRect(0,0,size,size);
  if(!nextPiece) return;
  const cells=pieceCells({...nextPiece,x:0,y:0,rot:0});
  const maxC=Math.max(...cells.map(c=>c.x),0);
  const maxR=Math.max(...cells.map(c=>c.y),0);
  const ts2=Math.floor(Math.min((size-8)/(maxC+1),(size-8)/(maxR+1)));
  const offX=Math.floor((size-(maxC+1)*ts2)/2);
  const offY=Math.floor((size-(maxR+1)*ts2)/2);
  cells.forEach(({x,y,t})=>drawTile(nextCtx,offX+x*ts2,offY+y*ts2,ts2,ts2,t,1));
}

  if (soundscape) {

    if (tints.length > 0) {

      bgCtx.globalCompositeOperation = 'overlay';
      tints.forEach((tint, i) => {

        bgCtx.fillStyle = tint;
        bgCtx.globalAlpha = alpha;
        bgCtx.fillRect(0, 0, W, H);

      bgCtx.restore();
    }
  }
}

// ── PARTICLES ────────────────────────────────────────
// ── DIRECTIONAL PARTICLE SYSTEM ──────────────────────
// Design language:
//  STREAMS  (VOCAL/FLOW)  → straight UP  — cyan/teal streaks, fast, tight column
//  FOLLOWERS(LABEL/BEAT)  → outward FAN  — purple/pink arcs, medium speed
//  VISIBILITY(HYPE/WILD)  → RADIAL PULSE — gold/orange ring expanding globally
//  Generic collapse       → scatter with gravity, tile colour
//  Land FX                → tiny dust puff downward at tile bottom

// Particle: {x,y,vx,vy,life,decay,size,shrink,color,glow,shape,gravity}
// gravity override: 0 = floats up, 1 = normal (0.12/frame), -1 = repel

function spawnBurst(x, y, color, count=18, tileType=null) {
  const th2 = TILE_THEMES[tileType] || Object.values(TILE_THEMES).find(t=>t.glow===color||t.mid===color) || {light:'#ffffff',glow:color};
  const light = th2.light||'#ffffff';
  const glow  = th2.glow||color;

  // ── Determine directional flavour by tile type ─────
  const isStreams    = ['VIBE','MELODY'].includes(tileType);
  const isFollowers  = ['BEAT'].includes(tileType);
  const isVisibility = ['WILD'].includes(tileType);

  if(isStreams) {
    // STREAMS: tight vertical jet, cyan/teal streaks racing upward
    for(let i=0;i<count+4;i++){
      const spread = rnd(-0.4,0.4); // narrow column
      const spd = rnd(6,14);
      particles.push({x:x+rnd(-6,6), y, vx:spread*spd*0.4, vy:-spd,
        life:1, decay:rnd(0.025,0.055),
        size:rnd(2,5), color: i%3===0?'#ffffff':i%3===1?glow:light,
        shrink:0.93, glow:true, shape:'circle', gravity:0.04});
    }
    // Long skinny streaks — the "stream" visual
    for(let i=0;i<8;i++){
      particles.push({x:x+rnd(-10,10), y, vx:rnd(-1,1), vy:-rnd(8,18),
        life:0.9, decay:rnd(0.03,0.06),
        size:rnd(1.2,2.5), color:glow,
        shrink:0.88, glow:true, shape:'streak', gravity:0.02});
    }
    // Shockwave at base — horizontal ring
    for(let i=0;i<12;i++){
      const a=(i/12)*Math.PI*2;
      particles.push({x,y, vx:Math.cos(a)*rnd(3,7), vy:Math.sin(a)*rnd(1,3)-1,
        life:0.5, decay:0.08, size:2, color:light, shrink:0.85, glow:true, shape:'circle', gravity:0});
    }
  }
  else if(isFollowers) {
    // FOLLOWERS: fan burst outward left+right, purple/pink arcs
    for(let i=0;i<count;i++){
      // Bias toward horizontal fan (left/right +/- 40° from horizontal)
      const side = Math.random()<0.5 ? -1 : 1;
      const angle = side*(rnd(0.3, Math.PI-0.3)); // fan spread
      const spd = rnd(3,9);
      particles.push({x, y, vx:Math.cos(angle)*spd, vy:Math.sin(angle)*spd*0.5-rnd(0,3),
        life:1, decay:rnd(0.022,0.045),
        size:rnd(TS*0.09,TS*0.2),
        color: i%4===0?'#ffffff':i%4===1?glow:i%4===2?light:color,
        shrink:rnd(0.92,0.97), glow:true,
        shape:Math.random()<0.4?'sq':'circle', gravity:0.1});
    }
    // Heart-like pulse: ring of small dots fanning out
    for(let i=0;i<10;i++){
      const a = (i/10)*Math.PI - Math.PI/2 + rnd(-0.3,0.3);
      particles.push({x, y, vx:Math.cos(a)*rnd(4,8), vy:Math.sin(a)*rnd(2,5)-1,
        life:0.7, decay:0.06, size:rnd(2,4), color:light,
        shrink:0.9, glow:true, shape:'circle', gravity:0.08});
    }
  }
  else if(isVisibility) {
    // VISIBILITY: expanding radial shockwave ring, gold/orange glow
    // Big ring that expands outward in all directions
    const ringCount = 24;
    for(let i=0;i<ringCount;i++){
      const a=(i/ringCount)*Math.PI*2;
      const spd=rnd(5,12);
      particles.push({x,y, vx:Math.cos(a)*spd, vy:Math.sin(a)*spd,
        life:0.85, decay:rnd(0.03,0.055),
        size:rnd(3,7), color: i%3===0?'#ffffff':i%3===1?glow:light,
        shrink:rnd(0.88,0.95), glow:true, shape:'circle', gravity:0});
    }
    // Floating gold motes rising slowly
    for(let i=0;i<10;i++){
      particles.push({x:x+rnd(-TS,TS), y:y+rnd(-TS*0.5,TS*0.5),
        vx:rnd(-1.5,1.5), vy:rnd(-3,0),
        life:1.2, decay:rnd(0.015,0.03),
        size:rnd(2,5), color:glow,
        shrink:0.97, glow:true, shape:'circle', gravity:-0.02}); // float up
    }
    // Shockwave rim — large fast ring
    for(let i=0;i<8;i++){
      const a=(i/8)*Math.PI*2;
      particles.push({x,y, vx:Math.cos(a)*rnd(10,18), vy:Math.sin(a)*rnd(10,18),
        life:0.45, decay:0.12, size:4, color:'rgba(255,255,255,0.6)',
        shrink:0.82, glow:true, shape:'circle', gravity:0});
    }
  }
  else {
    // GENERIC scatter — tile colour, gravity pull
    for(let i=0;i<count;i++){
      const a=rnd(0,Math.PI*2), spd=rnd(2.5,8+TS*0.14);
      particles.push({x,y, vx:Math.cos(a)*spd, vy:Math.sin(a)*spd-rnd(0,3.5),
        life:1, decay:rnd(0.018,0.042),
        size:rnd(TS*0.09,TS*0.22),
        color: Math.random()<0.35?light:color,
        shrink:rnd(0.91,0.97), glow:true,
        shape:Math.random()<0.45?'sq':'circle', gravity:0.12});
    }
    // White sparkles
    for(let i=0;i<12;i++){
      const a=rnd(0,Math.PI*2), spd=rnd(4,11);
      particles.push({x,y, vx:Math.cos(a)*spd, vy:Math.sin(a)*spd-rnd(1,4),
        life:0.8, decay:rnd(0.05,0.09),
        size:rnd(1.5,3), color:'#ffffff',
        shrink:0.88, glow:true, shape:'circle', gravity:0.12});
    }
    // Shockwave ring
    for(let i=0;i<14;i++){
      const a=(i/14)*Math.PI*2;
      particles.push({x,y, vx:Math.cos(a)*rnd(4,8), vy:Math.sin(a)*rnd(4,8),
        life:0.6, decay:0.075, size:2.5, color:'rgba(255,255,255,0.7)',
        shrink:0.87, glow:true, shape:'circle', gravity:0});
    }
    // Confetti
    for(let i=0;i<6;i++){
      const a=rnd(0,Math.PI*2), spd=rnd(2,5);
      particles.push({x,y, vx:Math.cos(a)*spd, vy:Math.sin(a)*spd-rnd(2,6),
        life:1, decay:rnd(0.016,0.032),
        size:rnd(TS*0.07,TS*0.14),
        color:[color,light,'#ffffff'][rndI(0,3)],
        shrink:0.975, glow:false, shape:'sq', gravity:0.12});
    }
  }
}

function spawnLandFX(cells) {
  cells.forEach(({x,y,t})=>{
    for(let i=0;i<4;i++) particles.push({
      x:colX[x]+rnd(4,colW[x]-4), y:y*TS+TS-2,
      vx:rnd(-1.5,1.5), vy:rnd(-2,0.5),
      life:0.5, decay:0.06,
      size:rnd(1,3), color:COLORS[t]||'#fff',
      shrink:0.88, glow:false, shape:'circle', gravity:0.15});
  });
}

function updateParticles() {
  particles.forEach(p=>{
    p.x+=p.vx; p.y+=p.vy;
    const g = p.gravity!==undefined ? p.gravity : 0.12;
    p.vy += g;
    p.vx *= 0.97;
    p.life -= p.decay;
    p.size *= p.shrink;
  });
  particles=particles.filter(p=>p.life>0&&p.size>0.3);
  // Smoother elastic screen shake decay
  if(screenShake>0) screenShake *= 0.88;
  if(screenShake < 0.2) screenShake = 0;
}

// ── HUD ──────────────────────────────────────────────
function showToast(msg,color,duration=1800) {
  const el=document.getElementById('toast');
  el.textContent=msg; el.style.color=color;
  el.classList.remove('show'); void el.offsetWidth; el.classList.add('show');
  clearTimeout(el._t); el._t=setTimeout(()=>el.classList.remove('show'),duration);
}

function showCombo(cleared,type,pts) {
  const el=document.getElementById('combo-text');
  let msg='',color='var(--flow)';
  if(SPECIALS.includes(type))  {msg=`✨ ${type}!`;color=`var(--${type.toLowerCase()})`;}
  else if(cleared>=10) {msg=`🔥 MASSIVE ×${cleared}!`;color='var(--beat)';}
  else if(cleared>=7)  {msg=`⚡ HUGE! ×${cleared}`;  color='var(--hype)';}
  else if(cleared>=5)  {msg=`🎵 BIG! ×${cleared}`;   color='var(--vocal)';}
  else if(pts>150)     {msg=`+${fmtNum(pts)} STR`;   color='var(--flow)';}
  if(!msg) return;
  el.textContent=msg; el.style.color=color;
  el.className=''; void el.offsetWidth; el.className='show';
}

function updateHUD() {
  document.getElementById('streams-val').textContent   = fmtNum(streams);
  document.getElementById('rank-num').textContent      = '#'+rank;
  document.getElementById('stage-tag').textContent     = STAGES[stageIdx].name;

  // Resource points display
  document.getElementById('beat-val').textContent = resources.beat;
  document.getElementById('vibe-val').textContent = resources.vibe;
  document.getElementById('melody-val').textContent = resources.melody;

  // Progress bars - fill based on next unlock cost
  const maxPts = 50; // visual cap for progress bars
  document.getElementById('beat-fill').style.width = Math.min(100, (resources.beat / maxPts) * 100) + '%';
  document.getElementById('vibe-fill').style.width = Math.min(100, (resources.vibe / maxPts) * 100) + '%';
  document.getElementById('melody-fill').style.width = Math.min(100, (resources.melody / maxPts) * 100) + '%';

  document.getElementById('streams-fill').style.width = Math.min(100,(streams/STREAM_CAP)*100)+'%';
}

function updateAbilityHint() {
  if(!nextPiece) return;
  const type = nextPiece.special ? nextPiece.spType : (nextPiece.tiles?.[0]||'');
  const hint = ABILITY_DESC[type]||'';
  document.getElementById('ability-hint').textContent = hint;
}

function checkStageUp() {
  if(stageIdx<STAGES.length-1 && streams>=STAGES[stageIdx+1].streams) {
    stageIdx++;
    SFX.levelup();
    showToast(`⬆ ${STAGES[stageIdx].name}`,'var(--hype)',3000);
    // Redraw BG for new scene
    drawBackground();
  }
}

function endGame() {
  gameOver=true;
  SFX.gameover();
  const ov=document.getElementById('overlay');
  document.getElementById('overlay-title').textContent='SESSION OVER';
  document.getElementById('overlay-title').style.color='var(--beat)';
  document.getElementById('overlay-msg').textContent=
    `${STAGES[stageIdx].name}\n\nChart: #${rank}\nStreams: ${fmtNum(streams)}\nBeat: ${resources.beat} | Vibe: ${resources.vibe} | Melody: ${resources.melody}`;
  document.getElementById('overlay-btn').textContent='NEW SESSION ▶';
  ov.classList.add('show');
}

// ── INPUT — swipe to move, tap to rotate/collapse ────
let touchStartX=0, touchStartY=0, touchMoved=false, dasInterval=null;
let touchLastMoveX=0;

// Touch anywhere in play column
const playCol = document.getElementById('play-col');

// Haptic feedback helper (mobile vibration)
function haptic(duration = 10) {
  if (navigator.vibrate) navigator.vibrate(duration);
}

playCol && playCol.addEventListener('touchstart', e => {
  e.preventDefault();
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
  touchLastMoveX = touchStartX;
  touchMoved = false;
}, { passive: false });

playCol && playCol.addEventListener('touchmove', e => {
  e.preventDefault();
  if (paused || gameOver || !piece || resolving) return;

  const cx = e.touches[0].clientX;
  const cy = e.touches[0].clientY;
  const dx = cx - touchLastMoveX;
  const totalDx = cx - touchStartX;
  const totalDy = cy - touchStartY;

  // Mobile-optimized swipe thresholds (smaller for responsiveness)
  const swipeThreshold = Math.max(TS * 0.35, 20);

  // Horizontal swipe to move piece
  if (Math.abs(dx) > swipeThreshold) {
    touchMoved = true;
    moveH(dx > 0 ? 1 : -1);
    haptic(5);
    touchLastMoveX = cx;
  }

  // Swipe down to hard drop (need significant vertical movement)
  if (!touchMoved && totalDy > TS * 1.0 && Math.abs(totalDx) < TS * 0.5) {
    touchMoved = true;
    haptic(20);
    hardDrop();
  }
}, { passive: false });

playCol && playCol.addEventListener('touchend', e => {
  e.preventDefault();
  if (paused || gameOver) return;
  if (touchMoved) return;

  // Calculate tap position relative to board
  const rect = boardCvs.getBoundingClientRect();
  const tx = e.changedTouches[0].clientX - rect.left;
  const ty = e.changedTouches[0].clientY - rect.top;

  // Scale touch coordinates to canvas space (handles devicePixelRatio)
  const scaleX = boardCvs.width / rect.width;
  const scaleY = boardCvs.height / rect.height;
  const canvasX = tx * scaleX;
  const canvasY = ty * scaleY;

  // Find which column was tapped
  let col = -1;
  for (let c = 0; c < COLS; c++) {
    if (canvasX >= colX[c] && canvasX < colX[c] + colW[c]) {
      col = c;
      break;
    }
  }
  const row = Math.floor(canvasY / TS);

  // Check if tap is on a board tile
  if (col >= 0 && row >= 0 && row < ROWS) {
    const onBoard = board[row]?.[col];
    if (onBoard && !resolving) {
      haptic(15);
      tapCollapse(row, col);
      return;
    }
  }

  // Tap on empty space or falling piece = rotate
  if (piece && !resolving) {
    haptic(8);
    rotate();
  }
}, { passive: false });

// Mouse click support for desktop
boardCvs && boardCvs.addEventListener('click', e => {
  if(paused||gameOver||resolving) return;
  const rect = boardCvs.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;

  // Scale mouse coordinates to canvas space (handles devicePixelRatio and CSS scaling)
  const scaleX = boardCvs.width / rect.width;
  const scaleY = boardCvs.height / rect.height;
  const canvasX = mx * scaleX;
  const canvasY = my * scaleY;

  let col = -1;
  for(let c=0;c<COLS;c++) if(canvasX>=colX[c]&&canvasX<colX[c]+colW[c]){col=c;break;}
  const row = Math.floor(canvasY/TS);

  if(col>=0&&row>=0&&row<ROWS) {
    const onBoard = board[row]?.[col];
    if(onBoard) { tapCollapse(row,col); return; }
  }
  // Click on empty = rotate piece
  if(piece) rotate();
});

document.addEventListener('keydown',e=>{
  if(paused||gameOver) return;
  if(e.code==='ArrowLeft') moveH(-1);
  if(e.code==='ArrowRight') moveH(1);
  if(e.code==='ArrowDown'&&piece&&!resolving){const np={...piece,y:piece.y+1};if(fits(np,board))piece=np;}
  if(e.code==='ArrowUp'||e.code==='KeyZ') rotate();
  if(e.code==='Space'){e.preventDefault();hardDrop();}
});

function startSession() {
  // Hide overlay
  document.getElementById('overlay').classList.remove('show');

  // Audio unlock
  try { getAudio(); } catch(err) { console.warn('Audio init:', err); }

  // Play collapse sound as feedback
  SFX.tap();

  // Start or resume
  if(gameOver) {
    initGame();
  } else {
    paused = false;
  }

  // Soundscape init (async, non-blocking)
  if (!soundscape) {
    soundscape = new SoundscapeEngine();
    soundscape.init().catch(err => console.warn('Soundscape:', err));
  }
}

// Support both click and touch
const startBtn = document.getElementById('overlay-btn');
if (startBtn) {
  startBtn.addEventListener('click', startSession);
  startBtn.addEventListener('touchend', function(e) {
    e.preventDefault();
    startSession();
  });
}

// ── GAME LOOP ────────────────────────────────────────
let bgRedrawTimer=0;
function loop(ts) {
  const dt=Math.min(ts-lastTs,50); lastTs=ts;

  if(!paused&&!gameOver) {
    if(piece&&!resolving) {
      const canFall = fits({...piece,y:piece.y+1},board);

      if(canFall) {
        // Piece can still fall — run gravity tick
        gravTimer+=dt;
        // Smooth visual interpolation between integer rows
        pieceYf = piece.y + Math.min(gravTimer/gravSpeed, 0.95);

        if(gravTimer>=gravSpeed) {
          gravTimer=0;
          piece={...piece,y:piece.y+1};
          pieceYf=piece.y;
          lockTimer=0;
        }
      } else {
        // Piece is resting on something — lock timer runs every frame
        pieceYf=piece.y; // snap visual to exact row, never overshoot
        gravTimer=0;
        lockTimer+=dt;
        if(lockTimer>=380) {
          // Final safety check: if fits() says it can fall now (board changed under us), don't commit
          if(fits({...piece,y:piece.y+1},board)){
            lockTimer=0; // board shifted, re-evaluate
          } else {
            commitPiece();
          }
        }
      }
    }
    pressureTimer+=dt;
    pressureWarning=pressureTimer>=pressureSpeed*0.75;
    if(pressureTimer>=pressureSpeed){pressureTimer=0;addPressureRow();}
    updateParticles();

    bgRedrawTimer+=dt;
    if(bgRedrawTimer>2000){bgRedrawTimer=0;drawBackground();}
  }

  drawAll();
  requestAnimationFrame(loop);
}

// ── LOOP PANEL UI ────────────────────────────────────
function renderLoopPanel() {
  ['beat', 'vibe', 'melody'].forEach(cat => {
    const container = document.getElementById(`${cat}-loops`);
    if (!container) return;
    container.innerHTML = '';

    LOOP_POOLS[cat].forEach((loop, idx) => {
      const isUnlocked = resources.unlocked[cat].includes(idx);
      const isActive = resources.active[cat] === idx;
      const cost = UNLOCK_COSTS[idx] || UNLOCK_COSTS[UNLOCK_COSTS.length - 1];
      const canAfford = resources[cat] >= cost;

      const item = document.createElement('div');
      item.className = 'loop-item' + (isUnlocked ? '' : ' locked') + (isActive ? ' active' : '');
      item.style.color = isActive ? `var(--${cat})` : '';

      if (isUnlocked) {
        item.innerHTML = `
          <span class="name">${loop.name}</span>
          <span class="status">${isActive ? '▶' : '○'}</span>
        `;
        item.onclick = () => {
          if (isActive) {
            // Deactivate
            resources.active[cat] = null;
            if (soundscape) soundscape.removeLoop(cat);
          } else {
            // Activate
            activateLoop(cat, idx);
          }
          renderLoopPanel();
          showToast(isActive ? `${cat.toUpperCase()} muted` : `Playing: ${loop.name}`, `var(--${cat})`, 1200);
        };
      } else {
        item.innerHTML = `
          <span class="name">${loop.name}</span>
          <span class="cost" style="color:${canAfford ? 'var(--melody)' : 'var(--beat)'}">${cost} pts</span>
        `;
        if (canAfford) {
          item.onclick = () => {
            if (unlockLoop(cat, idx)) {
              SFX.levelup();
              showToast(`Unlocked: ${loop.name}!`, `var(--${cat})`, 2000);
              renderLoopPanel();
              updateHUD();
            }
          };
        }
      }

      container.appendChild(item);
    });
  });
}

// Loop panel toggle
document.getElementById('loop-panel-toggle')?.addEventListener('click', () => {
  const panel = document.getElementById('loop-panel');
  panel.classList.toggle('open');
  renderLoopPanel();
});

document.getElementById('loop-panel-close')?.addEventListener('click', () => {
  document.getElementById('loop-panel').classList.remove('open');
});

// Close loop panel when clicking backdrop
document.getElementById('loop-panel-backdrop')?.addEventListener('click', () => {
  document.getElementById('loop-panel').classList.remove('open');
});

// ── INIT ────────────────────────────────────────────
function initGame() {
  board=mkBoard(); piece=mkPiece(); nextPiece=mkPiece();
  gameOver=false; paused=false; resolving=false;
  streams=0; followers=0; visibility=0; rank=99; stageIdx=0;
  viralMult=1; viralLeft=0; collabPending=false;
  gravTimer=0; gravSpeed=850; lockTimer=0; pieceYf=0;
  pressureTimer=0; pressureSpeed=20000; pressureWarning=false;
  particles=[]; screenShake=0; bgOffset=0;
  invalidCells=[]; scorePopups=[];

  // Reset resources
  resources.beat = 0;
  resources.vibe = 0;
  resources.melody = 0;
  resources.unlocked = { beat: [0], vibe: [0], melody: [0] };
  resources.active = { beat: null, vibe: null, melody: null };

  // Reset session data
  resetSessionData();

  // Initialize soundscape engine
  if (!soundscape) {
    soundscape = new SoundscapeEngine();
    soundscape.init();
  }

  drawBackground();
  updateHUD();
  drawNext();
  updateAbilityHint();
  // Brief tip on first load
  setTimeout(()=>showToast('Earn points to unlock loops!','var(--wild)',3000), 1800);
}

initGame();
// Start paused until user clicks Start Session
paused = true;
requestAnimationFrame(loop);

</script>
