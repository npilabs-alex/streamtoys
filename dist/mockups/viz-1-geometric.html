<!DOCTYPE html>
<html>
<head>
  <title>SONGSUGAR Viz Mockup 1: Geometric</title>
  <style>
    * { margin: 0; padding: 0; }
    body { overflow: hidden; background: #000; }
    canvas { display: block; }
    .info {
      position: fixed;
      top: 20px;
      left: 20px;
      color: #fff;
      font-family: system-ui;
      font-size: 14px;
      background: rgba(0,0,0,0.7);
      padding: 15px 20px;
      border-radius: 10px;
      z-index: 100;
    }
    .info h2 { margin-bottom: 8px; color: #ff2d6e; }
  </style>
</head>
<body>
  <div class="info">
    <h2>Geometric Tunnel</h2>
    <p>Reacts to BEAT/VIBE/MELODY intensity</p>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    // Scene setup
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    // Colors matching our game
    const BEAT_COLOR = new THREE.Color(0xff2d6e);
    const VIBE_COLOR = new THREE.Color(0x00e5ff);
    const MELODY_COLOR = new THREE.Color(0x39ff14);

    // Create tunnel rings
    const rings = [];
    const ringCount = 40;

    for (let i = 0; i < ringCount; i++) {
      const geometry = new THREE.TorusGeometry(2 + Math.sin(i * 0.3) * 0.5, 0.05, 8, 64);
      const material = new THREE.MeshBasicMaterial({
        color: i % 3 === 0 ? BEAT_COLOR : (i % 3 === 1 ? VIBE_COLOR : MELODY_COLOR),
        transparent: true,
        opacity: 0.8
      });
      const ring = new THREE.Mesh(geometry, material);
      ring.position.z = -i * 1.5;
      ring.rotation.x = Math.PI / 2;
      ring.userData = { baseZ: -i * 1.5, index: i };
      scene.add(ring);
      rings.push(ring);
    }

    // Add particles
    const particleCount = 500;
    const particleGeometry = new THREE.BufferGeometry();
    const positions = new Float32Array(particleCount * 3);
    const colors = new Float32Array(particleCount * 3);

    for (let i = 0; i < particleCount; i++) {
      const angle = Math.random() * Math.PI * 2;
      const radius = 1.5 + Math.random() * 2;
      positions[i * 3] = Math.cos(angle) * radius;
      positions[i * 3 + 1] = Math.sin(angle) * radius;
      positions[i * 3 + 2] = -Math.random() * 60;

      const color = [BEAT_COLOR, VIBE_COLOR, MELODY_COLOR][Math.floor(Math.random() * 3)];
      colors[i * 3] = color.r;
      colors[i * 3 + 1] = color.g;
      colors[i * 3 + 2] = color.b;
    }

    particleGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    particleGeometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

    const particleMaterial = new THREE.PointsMaterial({
      size: 0.08,
      vertexColors: true,
      transparent: true,
      opacity: 0.8
    });

    const particles = new THREE.Points(particleGeometry, particleMaterial);
    scene.add(particles);

    // Fog
    scene.fog = new THREE.Fog(0x000000, 5, 60);

    camera.position.z = 5;

    // Simulated audio levels
    let beat = 0, vibe = 0, melody = 0;

    // Animation
    function animate() {
      requestAnimationFrame(animate);

      const time = Date.now() * 0.001;

      // Simulate audio reactivity
      beat = 0.5 + Math.sin(time * 4) * 0.5 * Math.abs(Math.sin(time * 2));
      vibe = 0.3 + Math.sin(time * 0.5) * 0.3;
      melody = 0.5 + Math.sin(time * 3) * 0.3 * Math.abs(Math.cos(time * 1.5));

      // Animate rings
      rings.forEach((ring, i) => {
        ring.position.z += 0.15 + beat * 0.1;
        if (ring.position.z > 5) {
          ring.position.z = -60;
        }

        const pulse = i % 3 === 0 ? beat : (i % 3 === 1 ? vibe : melody);
        ring.scale.setScalar(1 + pulse * 0.3);
        ring.rotation.z = time * 0.2 + i * 0.1;
        ring.material.opacity = 0.3 + pulse * 0.7;
      });

      // Animate particles
      const pos = particles.geometry.attributes.position.array;
      for (let i = 0; i < particleCount; i++) {
        pos[i * 3 + 2] += 0.1 + beat * 0.05;
        if (pos[i * 3 + 2] > 5) {
          pos[i * 3 + 2] = -60;
        }
      }
      particles.geometry.attributes.position.needsUpdate = true;
      particles.rotation.z = time * 0.05;

      // Camera wobble
      camera.position.x = Math.sin(time * 0.3) * 0.3;
      camera.position.y = Math.cos(time * 0.2) * 0.2;

      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
