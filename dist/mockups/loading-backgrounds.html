<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SONGSUGAR - Loading/Start Screen Background Effects</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #0a0a0f;
      color: #fff;
      min-height: 100vh;
    }
    .controls {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 1000;
      background: rgba(0,0,0,0.8);
      padding: 15px;
      border-radius: 12px;
      backdrop-filter: blur(10px);
    }
    .controls h3 { margin-bottom: 10px; font-size: 14px; opacity: 0.7; }
    .controls select, .controls button {
      padding: 8px 12px;
      border-radius: 6px;
      border: none;
      margin: 4px;
      cursor: pointer;
      font-size: 13px;
    }
    .controls select { background: #222; color: #fff; }
    .controls button { background: #333; color: #fff; }
    .controls button:hover { background: #444; }
    .controls button.active { background: #ff6b9d; color: #000; }

    .effect-container {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      overflow: hidden;
    }
    canvas { display: block; }

    .overlay-content {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      z-index: 100;
      pointer-events: none;
    }
    .wordmark {
      font-size: 72px;
      font-weight: 800;
      background: linear-gradient(135deg, var(--beat), var(--melody), var(--vibe));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: 0 0 60px var(--beat);
      animation: wordmarkPulse 3s ease-in-out infinite;
    }
    @keyframes wordmarkPulse {
      0%, 100% { filter: brightness(1) drop-shadow(0 0 30px var(--beat)); }
      50% { filter: brightness(1.2) drop-shadow(0 0 50px var(--vibe)); }
    }
    .loading-text {
      margin-top: 40px;
      font-size: 18px;
      color: rgba(255,255,255,0.8);
      letter-spacing: 2px;
    }

    .effect-label {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.7);
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 14px;
      z-index: 1000;
    }
  </style>
</head>
<body>
  <div class="controls">
    <h3>PALETTE</h3>
    <select id="paletteSelect">
      <option value="signal">Signal (Default)</option>
      <option value="neon">Neon</option>
      <option value="sunset">Sunset</option>
      <option value="ocean">Ocean</option>
      <option value="forest">Forest</option>
    </select>
    <h3>EFFECT</h3>
    <div id="effectButtons"></div>
  </div>

  <div class="effect-container">
    <canvas id="bgCanvas"></canvas>
  </div>

  <div class="overlay-content">
    <div class="wordmark">SongSugar</div>
    <div class="loading-text">Loading<span id="dots"></span></div>
  </div>

  <div class="effect-label" id="effectLabel">Effect Name</div>

  <script>
    const canvas = document.getElementById('bgCanvas');
    const ctx = canvas.getContext('2d');

    // Palettes
    const PALETTES = {
      signal: { beat: '#ff6b9d', melody: '#4ecdc4', vibe: '#ffe66d', bg: '#0a0a0f' },
      neon: { beat: '#ff00ff', melody: '#00ffff', vibe: '#ffff00', bg: '#0a0010' },
      sunset: { beat: '#ff6b35', melody: '#f7c59f', vibe: '#efa29a', bg: '#1a0a0a' },
      ocean: { beat: '#0077b6', melody: '#00b4d8', vibe: '#90e0ef', bg: '#03071e' },
      forest: { beat: '#606c38', melody: '#283618', vibe: '#dda15e', bg: '#0a0f0a' }
    };

    let currentPalette = 'signal';
    let currentEffect = 0;
    let particles = [];
    let time = 0;

    function P() { return PALETTES[currentPalette]; }

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // Update CSS variables
    function updateCSSVars() {
      const p = P();
      document.documentElement.style.setProperty('--beat', p.beat);
      document.documentElement.style.setProperty('--melody', p.melody);
      document.documentElement.style.setProperty('--vibe', p.vibe);
    }
    updateCSSVars();

    document.getElementById('paletteSelect').addEventListener('change', (e) => {
      currentPalette = e.target.value;
      updateCSSVars();
      initEffect(currentEffect);
    });

    // ========== EFFECTS ==========

    const effects = [
      {
        name: '1. Particle Constellation',
        desc: 'Connected particles forming constellations',
        init() {
          particles = [];
          for (let i = 0; i < 120; i++) {
            particles.push({
              x: Math.random() * canvas.width,
              y: Math.random() * canvas.height,
              vx: (Math.random() - 0.5) * 0.8,
              vy: (Math.random() - 0.5) * 0.8,
              r: Math.random() * 3 + 1,
              color: [P().beat, P().melody, P().vibe][Math.floor(Math.random() * 3)]
            });
          }
        },
        draw() {
          const p = P();
          ctx.fillStyle = p.bg;
          ctx.fillRect(0, 0, canvas.width, canvas.height);

          // Update and draw particles
          particles.forEach(pt => {
            pt.x += pt.vx;
            pt.y += pt.vy;
            if (pt.x < 0 || pt.x > canvas.width) pt.vx *= -1;
            if (pt.y < 0 || pt.y > canvas.height) pt.vy *= -1;

            ctx.beginPath();
            ctx.arc(pt.x, pt.y, pt.r, 0, Math.PI * 2);
            ctx.fillStyle = pt.color;
            ctx.fill();
          });

          // Draw connections
          ctx.strokeStyle = 'rgba(255,255,255,0.1)';
          ctx.lineWidth = 0.5;
          for (let i = 0; i < particles.length; i++) {
            for (let j = i + 1; j < particles.length; j++) {
              const dx = particles[i].x - particles[j].x;
              const dy = particles[i].y - particles[j].y;
              const dist = Math.sqrt(dx * dx + dy * dy);
              if (dist < 120) {
                ctx.globalAlpha = 1 - dist / 120;
                ctx.beginPath();
                ctx.moveTo(particles[i].x, particles[i].y);
                ctx.lineTo(particles[j].x, particles[j].y);
                ctx.stroke();
              }
            }
          }
          ctx.globalAlpha = 1;
        }
      },

      {
        name: '2. Plasma Waves',
        desc: 'Colorful plasma effect using sine waves',
        init() {},
        draw() {
          const p = P();
          const imageData = ctx.createImageData(canvas.width, canvas.height);
          const data = imageData.data;

          const beatRGB = hexToRGB(p.beat);
          const melodyRGB = hexToRGB(p.melody);
          const vibeRGB = hexToRGB(p.vibe);

          for (let y = 0; y < canvas.height; y += 2) {
            for (let x = 0; x < canvas.width; x += 2) {
              const v1 = Math.sin(x * 0.01 + time);
              const v2 = Math.sin((y * 0.01 + time) * 0.5);
              const v3 = Math.sin((x * 0.01 + y * 0.01 + time) * 0.5);
              const v4 = Math.sin(Math.sqrt((x - canvas.width/2) ** 2 + (y - canvas.height/2) ** 2) * 0.02 - time);

              const v = (v1 + v2 + v3 + v4) / 4;

              let r, g, b;
              if (v < -0.33) {
                const t = (v + 1) / 0.67;
                r = lerp(beatRGB.r, melodyRGB.r, t);
                g = lerp(beatRGB.g, melodyRGB.g, t);
                b = lerp(beatRGB.b, melodyRGB.b, t);
              } else if (v < 0.33) {
                const t = (v + 0.33) / 0.66;
                r = lerp(melodyRGB.r, vibeRGB.r, t);
                g = lerp(melodyRGB.g, vibeRGB.g, t);
                b = lerp(melodyRGB.b, vibeRGB.b, t);
              } else {
                const t = (v - 0.33) / 0.67;
                r = lerp(vibeRGB.r, beatRGB.r, t);
                g = lerp(vibeRGB.g, beatRGB.g, t);
                b = lerp(vibeRGB.b, beatRGB.b, t);
              }

              // Fill 2x2 block for performance
              for (let dy = 0; dy < 2 && y + dy < canvas.height; dy++) {
                for (let dx = 0; dx < 2 && x + dx < canvas.width; dx++) {
                  const i = ((y + dy) * canvas.width + (x + dx)) * 4;
                  data[i] = r * 0.4;
                  data[i + 1] = g * 0.4;
                  data[i + 2] = b * 0.4;
                  data[i + 3] = 255;
                }
              }
            }
          }
          ctx.putImageData(imageData, 0, 0);
        }
      },

      {
        name: '3. Radial Pulse',
        desc: 'Concentric rings pulsing from center',
        init() {},
        draw() {
          const p = P();
          const cx = canvas.width / 2;
          const cy = canvas.height / 2;
          const maxR = Math.sqrt(cx * cx + cy * cy);

          ctx.fillStyle = p.bg;
          ctx.fillRect(0, 0, canvas.width, canvas.height);

          const colors = [p.beat, p.melody, p.vibe];
          const ringCount = 20;

          for (let i = ringCount; i >= 0; i--) {
            const baseR = (i / ringCount) * maxR;
            const pulse = Math.sin(time * 2 - i * 0.3) * 30;
            const r = baseR + pulse;

            const gradient = ctx.createRadialGradient(cx, cy, r * 0.8, cx, cy, r);
            const colorIdx = i % 3;
            gradient.addColorStop(0, 'transparent');
            gradient.addColorStop(0.5, colors[colorIdx] + '40');
            gradient.addColorStop(1, 'transparent');

            ctx.beginPath();
            ctx.arc(cx, cy, r, 0, Math.PI * 2);
            ctx.fillStyle = gradient;
            ctx.fill();
          }

          // Center glow
          const glowGradient = ctx.createRadialGradient(cx, cy, 0, cx, cy, 200);
          glowGradient.addColorStop(0, p.vibe + '60');
          glowGradient.addColorStop(0.5, p.melody + '20');
          glowGradient.addColorStop(1, 'transparent');
          ctx.beginPath();
          ctx.arc(cx, cy, 200, 0, Math.PI * 2);
          ctx.fillStyle = glowGradient;
          ctx.fill();
        }
      },

      {
        name: '4. Floating Orbs',
        desc: 'Large glowing orbs with blur effect',
        init() {
          particles = [];
          for (let i = 0; i < 8; i++) {
            particles.push({
              x: Math.random() * canvas.width,
              y: Math.random() * canvas.height,
              vx: (Math.random() - 0.5) * 1.5,
              vy: (Math.random() - 0.5) * 1.5,
              r: Math.random() * 150 + 100,
              color: [P().beat, P().melody, P().vibe][i % 3],
              phase: Math.random() * Math.PI * 2
            });
          }
        },
        draw() {
          const p = P();
          ctx.fillStyle = p.bg;
          ctx.fillRect(0, 0, canvas.width, canvas.height);

          particles.forEach(orb => {
            orb.x += orb.vx;
            orb.y += orb.vy;

            // Bounce
            if (orb.x < -orb.r) orb.x = canvas.width + orb.r;
            if (orb.x > canvas.width + orb.r) orb.x = -orb.r;
            if (orb.y < -orb.r) orb.y = canvas.height + orb.r;
            if (orb.y > canvas.height + orb.r) orb.y = -orb.r;

            const pulse = 1 + Math.sin(time * 2 + orb.phase) * 0.2;
            const r = orb.r * pulse;

            const gradient = ctx.createRadialGradient(orb.x, orb.y, 0, orb.x, orb.y, r);
            gradient.addColorStop(0, orb.color + 'aa');
            gradient.addColorStop(0.4, orb.color + '44');
            gradient.addColorStop(1, 'transparent');

            ctx.beginPath();
            ctx.arc(orb.x, orb.y, r, 0, Math.PI * 2);
            ctx.fillStyle = gradient;
            ctx.fill();
          });
        }
      },

      {
        name: '5. Matrix Rain',
        desc: 'Falling characters in palette colors',
        init() {
          particles = [];
          const cols = Math.floor(canvas.width / 20);
          for (let i = 0; i < cols; i++) {
            particles.push({
              x: i * 20,
              y: Math.random() * canvas.height,
              speed: Math.random() * 5 + 3,
              chars: [],
              color: [P().beat, P().melody, P().vibe][i % 3]
            });
            // Pre-generate characters
            for (let j = 0; j < 30; j++) {
              particles[i].chars.push(String.fromCharCode(0x30A0 + Math.random() * 96));
            }
          }
        },
        draw() {
          const p = P();
          // Fade effect
          ctx.fillStyle = p.bg + 'dd';
          ctx.fillRect(0, 0, canvas.width, canvas.height);

          ctx.font = '16px monospace';

          particles.forEach(col => {
            col.y += col.speed;
            if (col.y > canvas.height + 300) {
              col.y = -300;
              col.color = [p.beat, p.melody, p.vibe][Math.floor(Math.random() * 3)];
            }

            col.chars.forEach((char, i) => {
              const y = col.y - i * 20;
              if (y < 0 || y > canvas.height) return;

              const alpha = Math.max(0, 1 - i * 0.05);
              ctx.fillStyle = col.color;
              ctx.globalAlpha = alpha;
              ctx.fillText(char, col.x, y);
            });
          });
          ctx.globalAlpha = 1;
        }
      },

      {
        name: '6. Waveform Bars',
        desc: 'Audio visualizer style bars',
        init() {},
        draw() {
          const p = P();
          ctx.fillStyle = p.bg;
          ctx.fillRect(0, 0, canvas.width, canvas.height);

          const barCount = 64;
          const barWidth = canvas.width / barCount;
          const colors = [p.beat, p.melody, p.vibe];

          for (let i = 0; i < barCount; i++) {
            const freq = Math.sin(time * 3 + i * 0.2) * 0.5 + 0.5;
            const freq2 = Math.sin(time * 2 - i * 0.15) * 0.3 + 0.3;
            const height = (freq + freq2) * canvas.height * 0.4;

            const x = i * barWidth;
            const y = canvas.height / 2 - height / 2;

            const gradient = ctx.createLinearGradient(x, y, x, y + height);
            gradient.addColorStop(0, colors[i % 3]);
            gradient.addColorStop(0.5, colors[(i + 1) % 3] + '88');
            gradient.addColorStop(1, colors[i % 3]);

            ctx.fillStyle = gradient;
            ctx.fillRect(x + 2, y, barWidth - 4, height);

            // Glow
            ctx.shadowColor = colors[i % 3];
            ctx.shadowBlur = 20;
            ctx.fillRect(x + 2, y, barWidth - 4, height);
            ctx.shadowBlur = 0;
          }
        }
      },

      {
        name: '7. Morphing Blobs',
        desc: 'Organic blob shapes that morph and blend',
        init() {},
        draw() {
          const p = P();
          ctx.fillStyle = p.bg;
          ctx.fillRect(0, 0, canvas.width, canvas.height);

          const cx = canvas.width / 2;
          const cy = canvas.height / 2;
          const colors = [p.beat, p.melody, p.vibe];

          for (let b = 0; b < 3; b++) {
            const offsetX = Math.sin(time + b * 2) * 100;
            const offsetY = Math.cos(time * 0.7 + b * 2) * 80;

            ctx.beginPath();
            const points = 8;
            for (let i = 0; i <= points; i++) {
              const angle = (i / points) * Math.PI * 2;
              const wobble = Math.sin(angle * 3 + time * 2 + b) * 50;
              const r = 200 + wobble;
              const x = cx + offsetX + Math.cos(angle) * r;
              const y = cy + offsetY + Math.sin(angle) * r;

              if (i === 0) ctx.moveTo(x, y);
              else ctx.lineTo(x, y);
            }
            ctx.closePath();

            const gradient = ctx.createRadialGradient(
              cx + offsetX, cy + offsetY, 0,
              cx + offsetX, cy + offsetY, 250
            );
            gradient.addColorStop(0, colors[b] + 'aa');
            gradient.addColorStop(1, colors[b] + '00');

            ctx.fillStyle = gradient;
            ctx.fill();
          }
        }
      },

      {
        name: '8. Starfield Warp',
        desc: 'Hyperspace star tunnel effect',
        init() {
          particles = [];
          for (let i = 0; i < 400; i++) {
            particles.push({
              x: (Math.random() - 0.5) * canvas.width * 2,
              y: (Math.random() - 0.5) * canvas.height * 2,
              z: Math.random() * 1000,
              color: [P().beat, P().melody, P().vibe][Math.floor(Math.random() * 3)]
            });
          }
        },
        draw() {
          const p = P();
          ctx.fillStyle = p.bg + 'ee';
          ctx.fillRect(0, 0, canvas.width, canvas.height);

          const cx = canvas.width / 2;
          const cy = canvas.height / 2;

          particles.forEach(star => {
            star.z -= 8;
            if (star.z <= 0) {
              star.x = (Math.random() - 0.5) * canvas.width * 2;
              star.y = (Math.random() - 0.5) * canvas.height * 2;
              star.z = 1000;
              star.color = [p.beat, p.melody, p.vibe][Math.floor(Math.random() * 3)];
            }

            const sx = (star.x / star.z) * 500 + cx;
            const sy = (star.y / star.z) * 500 + cy;
            const size = (1 - star.z / 1000) * 4;

            if (sx < 0 || sx > canvas.width || sy < 0 || sy > canvas.height) return;

            // Trail
            const px = (star.x / (star.z + 20)) * 500 + cx;
            const py = (star.y / (star.z + 20)) * 500 + cy;

            ctx.beginPath();
            ctx.moveTo(px, py);
            ctx.lineTo(sx, sy);
            ctx.strokeStyle = star.color;
            ctx.lineWidth = size;
            ctx.stroke();

            ctx.beginPath();
            ctx.arc(sx, sy, size, 0, Math.PI * 2);
            ctx.fillStyle = star.color;
            ctx.fill();
          });
        }
      },

      {
        name: '9. Hexagon Grid',
        desc: 'Animated hexagonal grid pattern',
        init() {},
        draw() {
          const p = P();
          ctx.fillStyle = p.bg;
          ctx.fillRect(0, 0, canvas.width, canvas.height);

          const size = 40;
          const h = size * Math.sqrt(3);
          const colors = [p.beat, p.melody, p.vibe];

          for (let row = -1; row < canvas.height / h + 1; row++) {
            for (let col = -1; col < canvas.width / (size * 1.5) + 1; col++) {
              const x = col * size * 1.5;
              const y = row * h + (col % 2 ? h / 2 : 0);

              const dist = Math.sqrt((x - canvas.width/2) ** 2 + (y - canvas.height/2) ** 2);
              const wave = Math.sin(dist * 0.02 - time * 2) * 0.5 + 0.5;

              ctx.beginPath();
              for (let i = 0; i < 6; i++) {
                const angle = (i / 6) * Math.PI * 2 - Math.PI / 6;
                const hx = x + Math.cos(angle) * size * 0.9;
                const hy = y + Math.sin(angle) * size * 0.9;
                if (i === 0) ctx.moveTo(hx, hy);
                else ctx.lineTo(hx, hy);
              }
              ctx.closePath();

              const colorIdx = Math.floor((col + row) % 3);
              ctx.fillStyle = colors[colorIdx] + Math.floor(wave * 99 + 10).toString(16).padStart(2, '0');
              ctx.fill();
              ctx.strokeStyle = colors[colorIdx] + '44';
              ctx.lineWidth = 2;
              ctx.stroke();
            }
          }
        }
      },

      {
        name: '10. Aurora Borealis',
        desc: 'Northern lights wave effect',
        init() {},
        draw() {
          const p = P();
          ctx.fillStyle = p.bg;
          ctx.fillRect(0, 0, canvas.width, canvas.height);

          const colors = [p.beat, p.melody, p.vibe];

          for (let layer = 0; layer < 5; layer++) {
            ctx.beginPath();
            ctx.moveTo(0, canvas.height);

            for (let x = 0; x <= canvas.width; x += 10) {
              const wave1 = Math.sin(x * 0.005 + time + layer) * 100;
              const wave2 = Math.sin(x * 0.008 - time * 0.5 + layer * 2) * 50;
              const wave3 = Math.sin(x * 0.003 + time * 0.3) * 30;
              const y = canvas.height * 0.4 + wave1 + wave2 + wave3 + layer * 40;
              ctx.lineTo(x, y);
            }

            ctx.lineTo(canvas.width, canvas.height);
            ctx.closePath();

            const gradient = ctx.createLinearGradient(0, canvas.height * 0.3, 0, canvas.height);
            gradient.addColorStop(0, colors[layer % 3] + '00');
            gradient.addColorStop(0.3, colors[layer % 3] + '66');
            gradient.addColorStop(0.6, colors[(layer + 1) % 3] + '44');
            gradient.addColorStop(1, 'transparent');

            ctx.fillStyle = gradient;
            ctx.fill();
          }
        }
      }
    ];

    // Helpers
    function hexToRGB(hex) {
      const r = parseInt(hex.slice(1, 3), 16);
      const g = parseInt(hex.slice(3, 5), 16);
      const b = parseInt(hex.slice(5, 7), 16);
      return { r, g, b };
    }

    function lerp(a, b, t) { return a + (b - a) * t; }

    // Create effect buttons
    const btnContainer = document.getElementById('effectButtons');
    effects.forEach((effect, i) => {
      const btn = document.createElement('button');
      btn.textContent = effect.name.split('.')[0] + '.';
      btn.title = effect.desc;
      btn.onclick = () => {
        currentEffect = i;
        initEffect(i);
        document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
      };
      if (i === 0) btn.classList.add('active');
      btnContainer.appendChild(btn);
    });

    function initEffect(i) {
      effects[i].init();
      document.getElementById('effectLabel').textContent = effects[i].name + ' - ' + effects[i].desc;
    }

    // Animated dots
    let dotCount = 0;
    setInterval(() => {
      dotCount = (dotCount + 1) % 4;
      document.getElementById('dots').textContent = '.'.repeat(dotCount);
    }, 400);

    // Animation loop
    function animate() {
      time += 0.016;
      effects[currentEffect].draw();
      requestAnimationFrame(animate);
    }

    initEffect(0);
    animate();
  </script>
</body>
</html>
