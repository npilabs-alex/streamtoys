<!DOCTYPE html>
<html>
<head>
  <title>SONGSUGAR - Signal Palette</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #080D14; overflow: hidden; }

    /* CSS Background - Signal palette */
    .bg-layer {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    .bg-base {
      background: radial-gradient(ellipse at 50% 100%, #0c1420 0%, #080D14 40%, #040810 100%);
    }

    .bg-glow {
      opacity: 0.35;
      transition: opacity 0.3s;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.4;
      transition: transform 0.15s ease-out, opacity 0.15s ease-out;
    }

    /* Signal colors: BEAT=Cyan, MELODY=Pink, VIBE=Lime */
    .orb-beat {
      width: 400px; height: 400px;
      background: #00E5FF;
      left: -5%; top: 15%;
    }

    .orb-vibe {
      width: 500px; height: 500px;
      background: #AAFF00;
      left: 25%; top: 5%;
    }

    .orb-melody {
      width: 380px; height: 380px;
      background: #FF2D78;
      right: -5%; top: 20%;
    }

    .bg-vignette {
      background: radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,0.7) 100%);
    }

    /* Scan lines for cyberpunk feel - more visible */
    .bg-scanlines {
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 3px,
        rgba(0, 229, 255, 0.06) 3px,
        rgba(0, 229, 255, 0.06) 6px
      );
      animation: scanMove 4s linear infinite;
    }

    @keyframes scanMove {
      0% { background-position: 0 0; }
      100% { background-position: 0 120px; }
    }

    /* Horizontal moving scan line */
    .bg-scanlines::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        180deg,
        transparent 0%,
        rgba(0, 229, 255, 0.08) 50%,
        transparent 100%
      );
      height: 100px;
      animation: scanBar 3s ease-in-out infinite;
    }

    @keyframes scanBar {
      0% { transform: translateY(-100px); }
      100% { transform: translateY(100vh); }
    }

    /* Game canvas container */
    #game-wrapper {
      position: relative;
      z-index: 10;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    #game-canvas {
      border-radius: 8px;
      box-shadow:
        0 0 30px rgba(0, 229, 255, 0.3),
        0 0 60px rgba(0, 229, 255, 0.2),
        0 0 100px rgba(0, 229, 255, 0.1);
      border: 1px solid rgba(0, 229, 255, 0.3);
    }

    /* HUD overlay */
    .hud {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 30px;
      z-index: 20;
      font-family: system-ui;
      font-weight: bold;
    }

    .hud-item {
      text-align: center;
      padding: 10px 20px;
      background: rgba(8, 13, 20, 0.85);
      border-radius: 8px;
      border: 1px solid #1a2535;
    }

    .hud-item .label {
      font-size: 11px;
      color: #556677;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .hud-item .value {
      font-size: 24px;
      margin-top: 4px;
    }

    .hud-item.beat .value { color: #00E5FF; }
    .hud-item.vibe .value { color: #AAFF00; }
    .hud-item.melody .value { color: #FF2D78; }
    .hud-item.score .value { color: #FFD700; }

    /* Info */
    .info {
      position: fixed;
      bottom: 20px;
      left: 20px;
      color: #556677;
      font-family: system-ui;
      font-size: 12px;
      z-index: 100;
    }

    /* Palette switcher */
    .palette-switch {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 100;
      display: flex;
      gap: 10px;
    }

    .palette-switch a {
      padding: 10px 20px;
      background: rgba(8, 13, 20, 0.9);
      border: 1px solid #1a2535;
      border-radius: 8px;
      color: #fff;
      text-decoration: none;
      font-family: system-ui;
      font-size: 13px;
      transition: all 0.2s;
    }

    .palette-switch a:hover {
      background: rgba(0, 229, 255, 0.2);
      border-color: #00E5FF;
    }

    .palette-switch a.active {
      background: rgba(0, 229, 255, 0.3);
      border-color: #00E5FF;
      color: #00E5FF;
    }
  </style>
</head>
<body>
  <!-- Lightweight CSS background -->
  <div class="bg-layer bg-base"></div>
  <div class="bg-layer bg-glow">
    <div class="orb orb-beat" id="orb-beat"></div>
    <div class="orb orb-vibe" id="orb-vibe"></div>
    <div class="orb orb-melody" id="orb-melody"></div>
  </div>
  <div class="bg-layer bg-scanlines"></div>
  <div class="bg-layer bg-vignette"></div>

  <!-- Palette switcher -->
  <div class="palette-switch">
    <a href="viz-7-integrated.html">Analogue</a>
    <a href="viz-8-signal.html" class="active">Signal</a>
  </div>

  <!-- HUD -->
  <div class="hud">
    <div class="hud-item beat">
      <div class="label">Beat</div>
      <div class="value" id="beat-val">0</div>
    </div>
    <div class="hud-item vibe">
      <div class="label">Vibe</div>
      <div class="value" id="vibe-val">0</div>
    </div>
    <div class="hud-item melody">
      <div class="label">Melody</div>
      <div class="value" id="melody-val">0</div>
    </div>
    <div class="hud-item score">
      <div class="label">Score</div>
      <div class="value" id="score-val">0</div>
    </div>
  </div>

  <!-- Game canvas -->
  <div id="game-wrapper">
    <canvas id="game-canvas"></canvas>
  </div>

  <div class="info">Signal Palette | CSS Background | Mobile-safe</div>

  <script>
    const canvas = document.getElementById('game-canvas');
    const ctx = canvas.getContext('2d');

    // Responsive sizing
    const COLS = 8, ROWS = 12;
    const TILE_SIZE = Math.min(
      Math.floor((window.innerHeight * 0.8) / ROWS),
      Math.floor((window.innerWidth * 0.9) / COLS),
      50
    );
    canvas.width = COLS * TILE_SIZE;
    canvas.height = ROWS * TILE_SIZE;

    // Signal palette
    const COLORS = {
      bg: '#080D14',
      grid: '#0c1420',
      BEAT: { mid: '#00E5FF', shine: '#ccfaff', bot: '#00a5bb' },
      VIBE: { mid: '#AAFF00', shine: '#e5ffb3', bot: '#77bb00' },
      MELODY: { mid: '#FF2D78', shine: '#ffb3cc', bot: '#cc1a55' }
    };

    // Simulated game state
    const grid = [];
    const cats = ['BEAT', 'VIBE', 'MELODY'];

    for (let r = 0; r < ROWS; r++) {
      grid[r] = [];
      for (let c = 0; c < COLS; c++) {
        grid[r][c] = Math.random() > 0.3 ? cats[Math.floor(Math.random() * 3)] : null;
      }
    }

    // Simulated resources & score
    let resources = { BEAT: 45, VIBE: 32, MELODY: 28 };
    let score = 12450;

    // Background orbs
    const orbBeat = document.getElementById('orb-beat');
    const orbVibe = document.getElementById('orb-vibe');
    const orbMelody = document.getElementById('orb-melody');

    // Draw tile with candy/jewel style
    function drawTile(x, y, cat, pulse = 0) {
      const colors = COLORS[cat];
      const padding = 2;
      const radius = 8;
      const px = x * TILE_SIZE + padding;
      const py = y * TILE_SIZE + padding;
      const size = TILE_SIZE - padding * 2;

      // Shadow
      ctx.fillStyle = 'rgba(0,0,0,0.4)';
      ctx.beginPath();
      ctx.roundRect(px + 2, py + 2, size, size, radius);
      ctx.fill();

      // Main gradient
      const grad = ctx.createLinearGradient(px, py, px, py + size);
      grad.addColorStop(0, colors.shine);
      grad.addColorStop(0.3, colors.mid);
      grad.addColorStop(1, colors.bot);

      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.roundRect(px, py, size, size, radius);
      ctx.fill();

      // Highlight
      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      ctx.beginPath();
      ctx.ellipse(px + size/2, py + size * 0.25, size * 0.3, size * 0.15, 0, 0, Math.PI * 2);
      ctx.fill();

      // Constant glow + pulse on beat
      ctx.shadowColor = colors.mid;
      ctx.shadowBlur = 8 + (pulse * 30);
      ctx.beginPath();
      ctx.roundRect(px, py, size, size, radius);
      ctx.fill();
      ctx.shadowBlur = 0;
    }

    // Animation loop
    function render() {
      const time = Date.now() * 0.001;

      // Simulated audio
      const beat = 0.5 + Math.pow(Math.sin(time * 3.5), 4) * 0.5;
      const vibe = 0.4 + Math.sin(time * 0.7) * 0.3;
      const melody = 0.5 + Math.sin(time * 2.2) * 0.4;

      // Update CSS background orbs - brighter pulses
      orbBeat.style.opacity = 0.3 + beat * 0.4;
      orbBeat.style.transform = `scale(${1 + beat * 0.25})`;

      orbVibe.style.opacity = 0.25 + vibe * 0.35;
      orbVibe.style.transform = `scale(${1 + vibe * 0.2})`;

      orbMelody.style.opacity = 0.3 + melody * 0.4;
      orbMelody.style.transform = `scale(${1 + melody * 0.25})`;

      // Clear canvas
      ctx.fillStyle = COLORS.bg;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Draw grid lines
      ctx.strokeStyle = COLORS.grid;
      ctx.lineWidth = 1;
      for (let r = 0; r <= ROWS; r++) {
        ctx.beginPath();
        ctx.moveTo(0, r * TILE_SIZE);
        ctx.lineTo(canvas.width, r * TILE_SIZE);
        ctx.stroke();
      }
      for (let c = 0; c <= COLS; c++) {
        ctx.beginPath();
        ctx.moveTo(c * TILE_SIZE, 0);
        ctx.lineTo(c * TILE_SIZE, canvas.height);
        ctx.stroke();
      }

      // Draw tiles
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const cat = grid[r][c];
          if (cat) {
            let pulse = 0;
            if (cat === 'BEAT') pulse = beat * 0.6;
            else if (cat === 'VIBE') pulse = vibe * 0.4;
            else if (cat === 'MELODY') pulse = melody * 0.5;
            drawTile(c, r, cat, pulse);
          }
        }
      }

      // Update HUD
      document.getElementById('beat-val').textContent = resources.BEAT;
      document.getElementById('vibe-val').textContent = resources.VIBE;
      document.getElementById('melody-val').textContent = resources.MELODY;
      document.getElementById('score-val').textContent = score.toLocaleString();

      // Simulate score increase
      if (Math.random() > 0.95) {
        score += Math.floor(Math.random() * 100);
        resources[cats[Math.floor(Math.random() * 3)]] += Math.floor(Math.random() * 5);
      }

      requestAnimationFrame(render);
    }

    render();
  </script>
</body>
</html>
