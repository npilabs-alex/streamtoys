<!DOCTYPE html>
<html>
<head>
  <title>SONGSUGAR - CSS Background (Lightweight)</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1A1208;
      overflow: hidden;
      font-family: system-ui;
    }

    /* Animated gradient background - pure CSS, GPU accelerated */
    .bg-layer {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    /* Base gradient */
    .bg-base {
      background: radial-gradient(ellipse at 50% 120%, #2a1a0a 0%, #1A1208 50%, #0d0904 100%);
    }

    /* Animated color zones - represent BEAT/VIBE/MELODY */
    .bg-glow {
      opacity: 0.4;
      background:
        radial-gradient(ellipse at 15% 50%, rgba(212, 82, 26, 0.3) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 50%, rgba(46, 125, 122, 0.25) 0%, transparent 45%),
        radial-gradient(ellipse at 85% 50%, rgba(232, 160, 144, 0.3) 0%, transparent 50%);
      animation: glowPulse 4s ease-in-out infinite;
    }

    @keyframes glowPulse {
      0%, 100% { opacity: 0.3; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.02); }
    }

    /* Floating orbs - CSS only */
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(60px);
      animation: float 8s ease-in-out infinite;
      opacity: 0.3;
    }

    .orb-beat {
      width: 300px;
      height: 300px;
      background: #D4521A;
      left: 5%;
      top: 30%;
      animation-delay: 0s;
    }

    .orb-vibe {
      width: 400px;
      height: 400px;
      background: #2E7D7A;
      left: 35%;
      top: 20%;
      animation-delay: -2s;
    }

    .orb-melody {
      width: 280px;
      height: 280px;
      background: #E8A090;
      right: 5%;
      top: 35%;
      animation-delay: -4s;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) scale(1); opacity: 0.25; }
      50% { transform: translateY(-20px) scale(1.1); opacity: 0.4; }
    }

    /* Subtle grid lines */
    .bg-grid {
      background-image:
        linear-gradient(rgba(207, 181, 59, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(207, 181, 59, 0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: gridMove 20s linear infinite;
    }

    @keyframes gridMove {
      0% { background-position: 0 0; }
      100% { background-position: 40px 40px; }
    }

    /* Vignette */
    .bg-vignette {
      background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.6) 100%);
    }

    /* Game container mock */
    .game-container {
      position: relative;
      z-index: 10;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .game-mock {
      width: 400px;
      height: 600px;
      background: rgba(26, 18, 8, 0.85);
      border: 2px solid #3a2a18;
      border-radius: 16px;
      backdrop-filter: blur(10px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #f5e6d0;
    }

    .game-mock h2 {
      font-size: 24px;
      margin-bottom: 20px;
      background: linear-gradient(135deg, #D4521A, #E8A090);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .game-mock p {
      color: #776655;
      text-align: center;
      padding: 0 30px;
      line-height: 1.6;
    }

    /* Audio reactive simulation */
    .beat-pulse {
      animation: beatPulse 0.5s ease-out infinite;
    }

    @keyframes beatPulse {
      0% { transform: scale(1); }
      10% { transform: scale(1.15); }
      100% { transform: scale(1); }
    }

    /* Info panel */
    .info {
      position: fixed;
      top: 20px;
      left: 20px;
      color: #f5e6d0;
      font-size: 14px;
      background: rgba(26,18,8,0.9);
      padding: 15px 20px;
      border-radius: 10px;
      border: 1px solid #3a2a18;
      z-index: 100;
    }
    .info h2 { margin-bottom: 8px; color: #CFB53B; }
    .info .stat { display: flex; justify-content: space-between; margin: 5px 0; }
    .info .stat span:last-child { color: #70e000; }
  </style>
</head>
<body>
  <!-- Background layers -->
  <div class="bg-layer bg-base"></div>
  <div class="bg-layer bg-glow"></div>
  <div class="bg-layer">
    <div class="orb orb-beat"></div>
    <div class="orb orb-vibe"></div>
    <div class="orb orb-melody"></div>
  </div>
  <div class="bg-layer bg-grid"></div>
  <div class="bg-layer bg-vignette"></div>

  <!-- Game area mock -->
  <div class="game-container">
    <div class="game-mock">
      <h2>SONGSUGAR</h2>
      <p>Game canvas would render here.<br><br>
      Background uses pure CSS - no JavaScript, no WebGL.<br><br>
      GPU-accelerated animations with near-zero CPU cost.</p>
    </div>
  </div>

  <div class="info">
    <h2>CSS Background</h2>
    <div class="stat"><span>CPU Usage:</span><span>~0.1%</span></div>
    <div class="stat"><span>GPU Accel:</span><span>Yes</span></div>
    <div class="stat"><span>Mobile Safe:</span><span>Yes</span></div>
  </div>

  <!-- Optional: Audio reactivity with minimal JS -->
  <script>
    // Simulated audio reactivity - would connect to real audio analyzer
    const orbs = document.querySelectorAll('.orb');
    const glowLayer = document.querySelector('.bg-glow');

    function simulateAudio() {
      const time = Date.now() * 0.001;

      // Simulated audio levels
      const beat = 0.5 + Math.pow(Math.sin(time * 3.5), 4) * 0.5;
      const vibe = 0.4 + Math.sin(time * 0.7) * 0.3;
      const melody = 0.5 + Math.sin(time * 2.2) * 0.4;

      // Apply to orbs via CSS custom properties
      orbs[0].style.opacity = 0.2 + beat * 0.3;
      orbs[0].style.transform = `scale(${1 + beat * 0.2})`;

      orbs[1].style.opacity = 0.2 + vibe * 0.25;
      orbs[1].style.transform = `scale(${1 + vibe * 0.15})`;

      orbs[2].style.opacity = 0.2 + melody * 0.3;
      orbs[2].style.transform = `scale(${1 + melody * 0.2})`;

      // Glow intensity
      glowLayer.style.opacity = 0.3 + (beat + vibe + melody) / 10;

      requestAnimationFrame(simulateAudio);
    }

    simulateAudio();
  </script>
</body>
</html>
