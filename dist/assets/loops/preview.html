<!DOCTYPE html>
<html>
<head>
  <title>SONGSUGAR Loop Preview</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0f;
      color: #fff;
      padding: 40px;
      min-height: 100vh;
    }
    h1 {
      text-align: center;
      margin-bottom: 10px;
      background: linear-gradient(135deg, #ff2d6e, #00e5ff, #39ff14);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-size: 2.5em;
    }
    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 40px;
    }
    .categories {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 30px;
      max-width: 1200px;
      margin: 0 auto;
    }
    .category {
      background: #15151f;
      border-radius: 16px;
      padding: 24px;
      border: 1px solid #222;
    }
    .category h2 {
      margin-bottom: 20px;
      padding-bottom: 10px;
      border-bottom: 2px solid;
    }
    .category.beat h2 { color: #ff2d6e; border-color: #ff2d6e; }
    .category.vibe h2 { color: #00e5ff; border-color: #00e5ff; }
    .category.melody h2 { color: #39ff14; border-color: #39ff14; }
    .loop {
      margin-bottom: 20px;
      padding: 12px;
      background: #1a1a25;
      border-radius: 8px;
    }
    .loop-name {
      font-weight: 600;
      margin-bottom: 8px;
      font-size: 14px;
    }
    .loop audio {
      width: 100%;
      height: 32px;
    }
    .mix-section {
      max-width: 1200px;
      margin: 40px auto;
      background: linear-gradient(135deg, #1a1a25, #15151f);
      border-radius: 16px;
      padding: 30px;
      border: 1px solid #333;
    }
    .mix-section h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #ffd700;
    }
    .mix-controls {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-bottom: 20px;
    }
    .mix-channel {
      text-align: center;
    }
    .mix-channel label {
      display: block;
      margin-bottom: 10px;
      font-weight: bold;
    }
    .mix-channel select {
      width: 100%;
      padding: 10px;
      background: #222;
      border: 1px solid #444;
      color: #fff;
      border-radius: 6px;
      font-size: 14px;
    }
    .mix-channel.beat label { color: #ff2d6e; }
    .mix-channel.vibe label { color: #00e5ff; }
    .mix-channel.melody label { color: #39ff14; }
    .play-mix {
      display: block;
      width: 200px;
      margin: 20px auto;
      padding: 15px 30px;
      background: linear-gradient(135deg, #ff2d6e, #ff6b9d);
      border: none;
      color: #fff;
      font-size: 18px;
      font-weight: bold;
      border-radius: 30px;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .play-mix:hover { transform: scale(1.05); }
    .play-mix:active { transform: scale(0.95); }
  </style>
</head>
<body>
  <h1>SONGSUGAR Loop Preview</h1>
  <p class="subtitle">115 BPM | C Minor | 8 seconds per loop</p>

  <div class="categories">
    <div class="category beat">
      <h2>BEAT</h2>
      <div class="loop">
        <div class="loop-name">TRAP 808</div>
        <audio controls loop src="beat/trap_808.mp3"></audio>
      </div>
      <div class="loop">
        <div class="loop-name">LOFI DUSTY</div>
        <audio controls loop src="beat/lofi_dusty.mp3"></audio>
      </div>
      <div class="loop">
        <div class="loop-name">HOUSE GROOVE</div>
        <audio controls loop src="beat/house_groove.mp3"></audio>
      </div>
    </div>

    <div class="category vibe">
      <h2>VIBE</h2>
      <div class="loop">
        <div class="loop-name">VINYL WARM</div>
        <audio controls loop src="vibe/lofi_vinyl.mp3"></audio>
      </div>
      <div class="loop">
        <div class="loop-name">DREAM PAD</div>
        <audio controls loop src="vibe/dream_pad.mp3"></audio>
      </div>
      <div class="loop">
        <div class="loop-name">DARK CLOUD</div>
        <audio controls loop src="vibe/dark_ambient.mp3"></audio>
      </div>
    </div>

    <div class="category melody">
      <h2>MELODY</h2>
      <div class="loop">
        <div class="loop-name">LOFI KEYS</div>
        <audio controls loop src="melody/lofi_keys.mp3"></audio>
      </div>
      <div class="loop">
        <div class="loop-name">TRAP BELLS</div>
        <audio controls loop src="melody/trap_bells.mp3"></audio>
      </div>
      <div class="loop">
        <div class="loop-name">PLUCK</div>
        <audio controls loop src="melody/synth_pluck.mp3"></audio>
      </div>
    </div>
  </div>

  <div class="mix-section">
    <h2>Mix Preview</h2>
    <div class="mix-controls">
      <div class="mix-channel beat">
        <label>BEAT</label>
        <select id="beat-select">
          <option value="">None</option>
          <option value="beat/trap_808.mp3">TRAP 808</option>
          <option value="beat/lofi_dusty.mp3">LOFI DUSTY</option>
          <option value="beat/house_groove.mp3">HOUSE GROOVE</option>
        </select>
      </div>
      <div class="mix-channel vibe">
        <label>VIBE</label>
        <select id="vibe-select">
          <option value="">None</option>
          <option value="vibe/lofi_vinyl.mp3">VINYL WARM</option>
          <option value="vibe/dream_pad.mp3">DREAM PAD</option>
          <option value="vibe/dark_ambient.mp3">DARK CLOUD</option>
        </select>
      </div>
      <div class="mix-channel melody">
        <label>MELODY</label>
        <select id="melody-select">
          <option value="">None</option>
          <option value="melody/lofi_keys.mp3">LOFI KEYS</option>
          <option value="melody/trap_bells.mp3">TRAP BELLS</option>
          <option value="melody/synth_pluck.mp3">PLUCK</option>
        </select>
      </div>
    </div>
    <button class="play-mix" onclick="toggleMix()">Play Mix</button>
  </div>

  <script>
    let ctx, playing = false;
    const players = { beat: null, vibe: null, melody: null };
    const buffers = {};

    async function loadBuffer(url) {
      if (!url || buffers[url]) return buffers[url];
      const res = await fetch(url);
      const data = await res.arrayBuffer();
      buffers[url] = await ctx.decodeAudioData(data);
      return buffers[url];
    }

    async function toggleMix() {
      if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();

      if (playing) {
        Object.values(players).forEach(p => p?.stop());
        playing = false;
        document.querySelector('.play-mix').textContent = 'Play Mix';
        return;
      }

      const beat = document.getElementById('beat-select').value;
      const vibe = document.getElementById('vibe-select').value;
      const melody = document.getElementById('melody-select').value;

      const startTime = ctx.currentTime + 0.1;

      for (const [key, url] of [['beat', beat], ['vibe', vibe], ['melody', melody]]) {
        if (url) {
          const buffer = await loadBuffer(url);
          const source = ctx.createBufferSource();
          source.buffer = buffer;
          source.loop = true;
          source.connect(ctx.destination);
          source.start(startTime);
          players[key] = source;
        }
      }

      playing = true;
      document.querySelector('.play-mix').textContent = 'Stop Mix';
    }
  </script>
</body>
</html>
