function renderGame() {
  // Hide background effects canvas during gameplay
  if (BgEffects.active) {
    BgEffects.hide();
  }

  const p = P(), g = new PIXI.Graphics();
  // Draw solid background (since PIXI canvas is transparent)
  g.beginFill(p.bg); g.drawRect(0, 0, W, H); g.endFill();

  // Corner glow accents - palette colors with staggered pulse
  const now = Date.now();
  const glowSize = Math.min(W, H) * 0.4;
  const cornerGlows = [
    { x: 0, y: 0, color: p.beat, phase: 0 },           // TL - beat
    { x: W, y: 0, color: p.melody, phase: 1 },         // TR - melody
    { x: 0, y: H, color: p.vibe, phase: 2 },           // BL - vibe
    { x: W, y: H, color: p.social[1] || p.beat, phase: 3 }  // BR - social
  ];

  cornerGlows.forEach(corner => {
    const pulse = 0.15 + Math.sin(now * 0.002 + corner.phase * 1.5) * 0.1;
    const cg = new PIXI.Graphics();
    // Radial gradient approximation with concentric circles
    for (let i = 5; i >= 0; i--) {
      const ratio = i / 5;
      const alpha = pulse * ratio * ratio;
      const size = glowSize * (1 - ratio * 0.6);
      cg.beginFill(corner.color, alpha);
      cg.drawCircle(corner.x, corner.y, size);
      cg.endFill();
    }
    layers.bg.addChild(cg);
  });

  // Use cached cluster data (computed in findClusters, avoids per-frame garbage)
  const cache = G.clusterCache || { inCluster: new Map(), tileSets: new Map() };
  const inCluster = cache.inCluster;
  const clusterTileSets = cache.tileSets;

  const gap = 4, radius = Math.min(tileSize * 0.18, 7);

  // Wobble intensity based on danger level (0-3) - subtle, not violent
  const baseWobble = G.dangerLevel * 0.8; // 0, 0.8, 1.6, 2.4 pixels base (gentle)
  const wobbleSpeed = 3 + G.dangerLevel * 2; // Slower, more organic wobble

  // Extra wobble during session ending sequence (still gentle)
  const isEnding = G.over && G.sessionEndingAt > 0;
  const endingBoost = isEnding ? 1.3 : 1.0;

  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      let x = gridX + c * tileSize, y = gridY + r * tileSize;
      const cell = G.grid[r][c];
      if (!cell) continue;

      // Apply wobble effect when in danger - subtle wobble
      if (G.dangerLevel > 0 || isEnding) {
        // Tiles near top wobble slightly more
        const rowFactor = 1 + (4 - Math.min(r, 4)) * 0.1; // 1.4 at top, 1.0 at row 4+
        const tileWobble = baseWobble * rowFactor * endingBoost;

        // Single smooth wave for subtle organic feel
        const phase1 = now / (200 / wobbleSpeed) + r * 0.5 + c * 0.3;

        x += Math.sin(phase1) * tileWobble;
        y += Math.cos(phase1 * 0.8) * tileWobble * 0.4;
      }

      const type = cell.type;

      if (type === 'SOCIAL') { drawSocialTile(g, x, y, now); continue; }
      if (EFFECT_TILES.includes(type)) { drawEffectTile(g, x, y, type, now); continue; }

      const color = getColor(type), grad = getGradient(type), cluster = inCluster.get(`${r},${c}`);

      // FROSTED GLASS STYLE with cluster effects
      let tx = x+gap, ty = y+gap;
      const tw = tileSize-gap*2, th = tileSize-gap*2;

      // Cluster effect: Wave movement only
      if (cluster) {
        const wave = Math.sin(now * 0.006 + r * 0.4 + c * 0.3);
        ty += wave * 3;
      }

      if (cluster) {
        // Cluster tiles: solid fill with inner glow
        const pulse = 0.5 + Math.sin(now * 0.005 + r * 0.4 + c * 0.3) * 0.5;
        // Solid base fill
        g.beginFill(grad.mid, 1); g.drawRoundedRect(tx, ty, tw, th, radius); g.endFill();
        // Inner glow - bright center fading out
        const glowSize = tw * 0.35;
        g.beginFill(grad.shine, 0.4 + pulse * 0.3);
        g.drawRoundedRect(tx + tw/2 - glowSize/2, ty + th/2 - glowSize/2, glowSize, glowSize, glowSize/2);
        g.endFill();
        g.beginFill(grad.shine, 0.2 + pulse * 0.15);
        g.drawRoundedRect(tx + 4, ty + 4, tw - 8, th - 8, radius - 2);
        g.endFill();
      } else {
        // Solid tile color
        g.beginFill(grad.mid, 1); g.drawRoundedRect(tx, ty, tw, th, radius); g.endFill();
      }
    }
  }
  layers.bg.addChild(g);

  // Ghost and piece
  if (G.piece && !G.paused && !G.collapsing && !G.over) {
    const gy = ghostY();
    if (gy > G.piece.y) {
      const ghost = new PIXI.Graphics();
      for (const t of G.piece.tiles) {
        const c = G.piece.x + t.dx, r = gy + t.dy;
        if (r >= 0 && r < ROWS) {
          ghost.lineStyle(2, getColor(t.type), 0.2);
          ghost.drawRoundedRect(gridX + c*tileSize + gap, gridY + r*tileSize + gap, tileSize-gap*2, tileSize-gap*2, radius);
        }
      }
      layers.game.addChild(ghost);
    }

    const pg = new PIXI.Graphics();
    let minX = Infinity, minY = Infinity, maxX = 0, maxY = 0;
    // Use continuous visual Y for smooth falling
    const visualY = G.pieceVisualY;

    for (const t of G.piece.tiles) {
      const c = G.piece.x + t.dx, r = visualY + t.dy;
      if (r < -0.5) continue;
      const x = gridX + c * tileSize, y = gridY + r * tileSize;
      minX = Math.min(minX, x); minY = Math.min(minY, y);
      maxX = Math.max(maxX, x + tileSize); maxY = Math.max(maxY, y + tileSize);

      if (t.type === 'SOCIAL') { drawSocialTile(pg, x, y, now); }
      else if (EFFECT_TILES.includes(t.type)) { drawEffectTile(pg, x, y, t.type, now); }
      else {
        const grad = getGradient(t.type);
        const tx = x+gap, ty = y+gap, tw = tileSize-gap*2, th = tileSize-gap*2;
        // Solid tile color
        pg.beginFill(grad.mid, 1); pg.drawRoundedRect(tx, ty, tw, th, radius); pg.endFill();
      }
    }
    layers.game.addChild(pg);

    if (minX !== Infinity) {
      const hit = new PIXI.Graphics();
      hit.beginFill(0, 0.001); hit.drawRect(minX-15, minY-15, maxX-minX+30, maxY-minY+30); hit.endFill();
      hit.interactive = true;
      hit.on('pointerdown', e => { e.stopPropagation(); rotate(); G.dirty = true; });
      layers.game.addChild(hit);
    }
  }

  // Grid tap
  const gridHit = new PIXI.Graphics();
  gridHit.beginFill(0, 0.001); gridHit.drawRect(gridX, gridY, gridW, gridH); gridHit.endFill();
  gridHit.interactive = true;
  gridHit.on('pointerdown', e => {
    const inWobblePeriod = G.over && G.sessionEndingAt > 0 && !G.sessionOverShown;
    if (G.collapsing || G.paused || (G.over && !inWobblePeriod)) return;
    const lx = e.data.global.x - gridX, ly = e.data.global.y - gridY;
    const c = Math.floor(lx / tileSize), r = Math.floor(ly / tileSize);
    if (r >= 0 && r < ROWS && c >= 0 && c < COLS) collapse(r, c);
  });
  layers.game.addChild(gridHit);

  // HUD
  renderHUD();
}

function drawSocialTile(g, x, y, now) {
  const p = P(), gap = 4, radius = Math.min(tileSize*0.18, 7);
  const tx = x+gap, ty = y+gap, tw = tileSize-gap*2, th = tileSize-gap*2;
  const golds = p.social;
  const pulse = 0.7 + Math.sin(now/80)*0.3;

  // Simple fill only - no 3D extrusion
  g.beginFill(golds[1]); g.drawRoundedRect(tx, ty, tw, th, radius); g.endFill();

  // Gold outline (pulsing)
  g.lineStyle(2 + pulse * 0.3, golds[0], 0.9); g.drawRoundedRect(tx, ty, tw, th, radius); g.lineStyle(0);

  // Glint animation
  const gp = (now % 1800) / 1800, glintX = tx + (gp * 1.5 - 0.25) * tw;
  if (gp < 0.6) {
    g.beginFill(0xffffff, Math.sin(gp/0.6*Math.PI)*0.4);
    g.drawRect(Math.max(tx, glintX), ty, Math.min(tw*0.25, tx+tw-glintX), th);
    g.endFill();
  }

  // Diamond icon (rare special)
  g.beginFill(golds[1], 0.95);
  const cx = tx+tw/2, cy = ty+th/2, dr = tw*0.28;
  g.moveTo(cx, cy - dr);
  g.lineTo(cx + dr*0.8, cy);
  g.lineTo(cx, cy + dr);
  g.lineTo(cx - dr*0.8, cy);
  g.closePath();
  g.endFill();

  // Diamond shine
  g.beginFill(0xffffff, 0.5);
  g.moveTo(cx, cy - dr*0.5);
  g.lineTo(cx + dr*0.3, cy);
  g.lineTo(cx, cy - dr*0.2);
  g.closePath();
  g.endFill();
}

function drawEffectTile(g, x, y, type, now) {
  const p = P(), gap = 4, radius = Math.min(tileSize*0.18, 7);
  const tx = x+gap, ty = y+gap, tw = tileSize-gap*2, th = tileSize-gap*2;

  // Neon outline color based on palette
  const neonColor = p.text || 0xffffff;
  const pulse = 0.7 + Math.sin(now * 0.004) * 0.3;

  // NEON OUTLINE STYLE - dark interior with glowing border
  // Dark fill (background color)
  g.beginFill(p.bg, 0.9); g.drawRoundedRect(tx, ty, tw, th, radius); g.endFill();
  // Inner glow
  g.beginFill(neonColor, 0.1 * pulse); g.drawRoundedRect(tx + 3, ty + 3, tw - 6, th - 6, radius - 2); g.endFill();

  // Animated dashed border - draw segments around perimeter
  const dashLen = 6, gapLen = 4, totalLen = (tw + th) * 2;
  const offset = (now * 0.03) % (dashLen + gapLen); // Animate rotation
  const perimeter = 2 * (tw + th);

  g.lineStyle(2, neonColor, 0.85);
  for (let d = -offset; d < perimeter; d += dashLen + gapLen) {
    const start = Math.max(0, d);
    const end = Math.min(perimeter, d + dashLen);
    if (end <= start) continue;

    // Convert linear position to x,y coordinates around rectangle
    const getPoint = (pos) => {
      pos = pos % perimeter;
      if (pos < tw) return { x: tx + pos, y: ty }; // Top
      pos -= tw;
      if (pos < th) return { x: tx + tw, y: ty + pos }; // Right
      pos -= th;
      if (pos < tw) return { x: tx + tw - pos, y: ty + th }; // Bottom
      pos -= tw;
      return { x: tx, y: ty + th - pos }; // Left
    };

    const p1 = getPoint(start), p2 = getPoint(end);
    g.moveTo(p1.x, p1.y);
    g.lineTo(p2.x, p2.y);
  }
  g.lineStyle(0);

  const cx = tx+tw/2, cy = ty+th/2, ir = tw*0.28;

  // Draw icon based on type
  if (type === 'WILD') {
    // Star icon
    g.beginFill(neonColor, 0.9);
    for (let i = 0; i < 5; i++) {
      const a = (i*72-90)*Math.PI/180, ia = ((i*72)+36-90)*Math.PI/180;
      if (i === 0) g.moveTo(cx+Math.cos(a)*ir, cy+Math.sin(a)*ir);
      else g.lineTo(cx+Math.cos(a)*ir, cy+Math.sin(a)*ir);
      g.lineTo(cx+Math.cos(ia)*ir*0.45, cy+Math.sin(ia)*ir*0.45);
    }
    g.closePath(); g.endFill();
  } else if (type === 'BOMB') {
    // Bomb icon - circle with fuse
    g.beginFill(neonColor, 0.85); g.drawCircle(cx, cy+ir*0.1, ir*0.65); g.endFill();
    g.lineStyle(2, neonColor, 0.9); g.moveTo(cx, cy-ir*0.5); g.lineTo(cx+ir*0.25, cy-ir*0.85);
    g.lineStyle(0);
    g.beginFill(0xffaa00, 0.95); g.drawCircle(cx+ir*0.3, cy-ir*0.85, 3); g.endFill();
  } else if (type === 'FREEZE') {
    // Snowflake icon
    g.lineStyle(2, neonColor, 0.9);
    for (let i = 0; i < 6; i++) {
      const a = i * Math.PI / 3;
      g.moveTo(cx, cy);
      g.lineTo(cx + Math.cos(a) * ir, cy + Math.sin(a) * ir);
      // Small branches
      const bx = cx + Math.cos(a) * ir * 0.6, by = cy + Math.sin(a) * ir * 0.6;
      g.moveTo(bx, by);
      g.lineTo(bx + Math.cos(a + 0.5) * ir * 0.3, by + Math.sin(a + 0.5) * ir * 0.3);
      g.moveTo(bx, by);
      g.lineTo(bx + Math.cos(a - 0.5) * ir * 0.3, by + Math.sin(a - 0.5) * ir * 0.3);
    }
    g.lineStyle(0);
    g.beginFill(neonColor, 0.7); g.drawCircle(cx, cy, ir*0.15); g.endFill();
  } else if (type === 'SHUFFLE') {
    // Shuffle arrows icon
    g.lineStyle(2.5, neonColor, 0.9);
    // Curved arrows
    g.moveTo(cx - ir*0.6, cy - ir*0.3);
    g.lineTo(cx + ir*0.3, cy - ir*0.3);
    g.lineTo(cx + ir*0.1, cy - ir*0.55);
    g.moveTo(cx + ir*0.3, cy - ir*0.3);
    g.lineTo(cx + ir*0.1, cy - ir*0.05);
    g.moveTo(cx + ir*0.6, cy + ir*0.3);
    g.lineTo(cx - ir*0.3, cy + ir*0.3);
    g.lineTo(cx - ir*0.1, cy + ir*0.55);
    g.moveTo(cx - ir*0.3, cy + ir*0.3);
    g.lineTo(cx - ir*0.1, cy + ir*0.05);
    g.lineStyle(0);
  } else if (type === 'DOUBLE') {
    // 2x text
    g.beginFill(neonColor, 0.9);
    // Draw "2×" using shapes
    const fontSize = tw * 0.35;
    // Simple 2
    g.drawRoundedRect(cx - ir*0.7, cy - ir*0.5, ir*0.6, ir*0.2, 2);
    g.drawRoundedRect(cx - ir*0.7 + ir*0.4, cy - ir*0.5, ir*0.2, ir*0.5, 2);
    g.drawRoundedRect(cx - ir*0.7, cy - ir*0.1, ir*0.6, ir*0.2, 2);
    g.drawRoundedRect(cx - ir*0.7, cy - ir*0.1, ir*0.2, ir*0.5, 2);
    g.drawRoundedRect(cx - ir*0.7, cy + ir*0.3, ir*0.6, ir*0.2, 2);
    // × symbol
    g.lineStyle(2.5, neonColor, 0.9);
    g.moveTo(cx + ir*0.2, cy - ir*0.25);
    g.lineTo(cx + ir*0.65, cy + ir*0.25);
    g.moveTo(cx + ir*0.65, cy - ir*0.25);
    g.lineTo(cx + ir*0.2, cy + ir*0.25);
    g.lineStyle(0);
    g.endFill();
  }
}

function renderHUD() {
  const p = P();
  const sc = Math.min(W / 375, H / 667, 1.8);
  const pad = Math.floor(12 * sc);

  // === FIXED LAYOUT POSITIONS (doesn't shift based on piece size) ===
  const scoreFontSize = Math.max(22, Math.floor(32 * sc));
  const nextFontSize = Math.max(8, Math.floor(10 * sc));
  const ps = Math.max(14, Math.min(tileSize * 0.5, 22 * sc)); // Piece tile size
  const maxPieceH = ps * 3; // Reserve space for tallest piece (3 tiles high)
  const labelSize = Math.max(8, Math.floor(10 * sc));
  const meterH = Math.min(104, Math.floor(78 * sc)); // 30% taller
  const meterW = Math.max(14, Math.floor(16 * sc));
  const meterGap = Math.floor(10 * sc);

  // Fixed Y positions
  const scoreY = pad;
  const nextLabelY = scoreY + scoreFontSize + Math.floor(12 * sc);
  const nextPieceY = nextLabelY + nextFontSize + 6;
  const metersY = nextPieceY + maxPieceH + Math.floor(24 * sc); // Extra space before meters
  const mixBtnY = metersY + meterH + labelSize + Math.floor(16 * sc);

  // === SCORE ===
  const score = new PIXI.Text(G.score.toLocaleString(), {
    fontFamily: FONT_UI, fontSize: scoreFontSize, fill: p.text,
    fontWeight: '800',
    dropShadow: true, dropShadowBlur: 4, dropShadowDistance: 0
  });
  score.x = pad;
  score.y = scoreY;
  layers.hud.addChild(score);

  // === NEXT PIECE (fixed area) ===
  if (G.next && !G.over) {
    const lbl = new PIXI.Text('NEXT', { fontFamily: FONT_UI, fontSize: nextFontSize, fill: p.dim, fontWeight: '600', letterSpacing: 1 });
    lbl.x = pad;
    lbl.y = nextLabelY;
    layers.hud.addChild(lbl);

    const ng = new PIXI.Graphics();
    for (const t of G.next.tiles) {
      const grad = getGradient(t.type);
      const tx = pad + t.dx * ps, ty = nextPieceY + t.dy * ps, tw = ps - 2, th = ps - 2;
      // Solid tile color
      ng.beginFill(grad.mid, 1); ng.drawRoundedRect(tx, ty, tw, th, 3); ng.endFill();
    }
    layers.hud.addChild(ng);
  }

  // === VERTICAL METERS WITH HORIZONTAL LABELS ===
  const catNames = ['Beat', 'Vibe', 'Melody'];

  CATS.forEach((cat, i) => {
    const mx = pad + i * (meterW + meterGap);
    const progress = Math.min(G.res[cat] / G.unlockCost, 1);
    const color = getColor(cat);

    // Background bar
    const bg = new PIXI.Graphics();
    bg.beginFill(p.dim, 0.25);
    bg.drawRoundedRect(mx, metersY, meterW, meterH, 4);
    bg.endFill();
    layers.hud.addChild(bg);

    // Fill bar (grows upward from bottom)
    if (progress > 0) {
      const fillH = meterH * progress;
      const fill = new PIXI.Graphics();
      fill.beginFill(color);
      fill.drawRoundedRect(mx, metersY + meterH - fillH, meterW, fillH, 4);
      fill.endFill();
      if (progress >= 1) fill.alpha = 0.7 + Math.sin(Date.now() / 100) * 0.3;
      layers.hud.addChild(fill);
    }

    // Full category name below bar (horizontal)
    const lbl = new PIXI.Text(catNames[i], { fontFamily: FONT_UI, fontSize: labelSize, fill: color, fontWeight: '600' });
    lbl.anchor.set(0, 0);
    lbl.x = mx;
    lbl.y = metersY + meterH + 4;
    layers.hud.addChild(lbl);
  });

  // === MIX BUTTON (fixed position) ===
  const hudSectionW = 3 * meterW + 2 * meterGap + Math.floor(40 * sc); // Wide enough for labels
  const mixBtnH = Math.floor(32 * sc);
  const anyReady = CATS.some(c => G.res[c] >= G.unlockCost);
  const mixCol = anyReady && Math.sin(Date.now() / 100) > 0 ? p.social[1] : p.vibe;

  // Custom MIX button with large text
  const mixBtn = new PIXI.Container();
  const mixBg = new PIXI.Graphics();
  mixBg.beginFill(mixCol, 0.9);
  mixBg.drawRoundedRect(0, 0, hudSectionW, mixBtnH, 6);
  mixBg.endFill();
  mixBtn.addChild(mixBg);

  const mixText = new PIXI.Text('MIX', {
    fontFamily: FONT_UI, fontSize: Math.floor(mixBtnH * 0.8), fill: 0x000000, fontWeight: '800'
  });
  mixText.anchor.set(0.5);
  mixText.x = hudSectionW / 2;
  mixText.y = mixBtnH / 2;
  mixBtn.addChild(mixText);

  mixBtn.x = pad;
  mixBtn.y = mixBtnY;
  mixBtn.interactive = true;
  mixBtn.cursor = 'pointer';
  mixBtn.on('pointerdown', () => { G.screen = 'MIX'; G.dirty = true; });
  layers.hud.addChild(mixBtn);

  // === TOP RIGHT: Pause button (text) ===
  const pauseFontSize = Math.max(10, Math.floor(12 * sc));
  const pauseBtn = new PIXI.Text('Pause', {
    fontFamily: FONT_UI, fontSize: pauseFontSize, fill: p.dim, fontWeight: '600'
  });
  pauseBtn.anchor.set(1, 0);
  pauseBtn.x = W - pad;
  pauseBtn.y = pad;
  pauseBtn.interactive = true;
  pauseBtn.cursor = 'pointer';
  pauseBtn.on('pointerdown', () => {
    G.paused = true;
    G.screen = 'SETTINGS';
    if (Audio.ready) { try { Tone.Transport.pause(); } catch(e) {} }
    G.dirty = true;
  });
  layers.hud.addChild(pauseBtn);

  // Freeze indicator
  if (G.frozen && Date.now() < G.freezeEnd) {
    const rem = Math.ceil((G.freezeEnd - Date.now()) / 1000);
    const freezeFontSize = Math.max(10, Math.floor(14 * sc));
    const ft = new PIXI.Text(`FREEZE ${rem}s`, {
      fontFamily: FONT_MSG, fontSize: freezeFontSize + 8, fill: p.vibe,
      dropShadow: true, dropShadowBlur: 6, dropShadowDistance: 0
    });
    ft.anchor.set(0.5);
    ft.x = W / 2;
    ft.y = gridY - Math.floor(15 * sc);
    layers.hud.addChild(ft);
  } else if (G.frozen) G.frozen = false;


  // Double score indicator
  if (G.doubleScore) {
    const dblFontSize = Math.max(12, Math.floor(18 * sc));
    const pulse = 0.8 + Math.sin(Date.now() / 100) * 0.2;
    const dt = new PIXI.Text('2× NEXT!', {
      fontFamily: FONT_MSG, fontSize: dblFontSize + 6, fill: p.social[1],
      dropShadow: true, dropShadowColor: p.social[2], dropShadowBlur: 8, dropShadowDistance: 0
    });
    dt.anchor.set(0.5);
    dt.x = W / 2;
    dt.y = gridY - Math.floor(35 * sc);
    dt.scale.set(pulse);
    layers.hud.addChild(dt);
  }

  // Speed boost indicator - pulsing "RUSH!" text
  if (G.speedBoost.active) {
    const boostFontSize = Math.max(24, Math.floor(36 * sc));
    const pulse = 0.8 + Math.sin(Date.now() / 80) * 0.2;
    const bt = new PIXI.Text('RUSH!', {
      fontFamily: FONT_MSG, fontSize: boostFontSize, fill: p.social[1],
      dropShadow: true, dropShadowBlur: 8, dropShadowDistance: 0, dropShadowColor: p.beat
    });
    bt.anchor.set(0.5);
    bt.x = W / 2;
    bt.y = gridY - Math.floor(40 * sc);
    bt.scale.set(pulse);
    bt.alpha = 0.9;
    layers.hud.addChild(bt);
    G.dirty = true; // Keep rendering while boost is active
  }

  // Combo popups with retro stack effect - MUCH BIGGER for impact
  const comboFontSize = Math.max(48, Math.floor(72 * sc));
  for (const popup of G.comboPopups) {
    // Get retro stack colors based on current palette
    const stackColors = [p.beat, p.melody, p.vibe];
    const mainColor = popup.color;
    const shadow1 = stackColors[(stackColors.indexOf(mainColor) + 1) % 3] || p.melody;
    const shadow2 = stackColors[(stackColors.indexOf(mainColor) + 2) % 3] || p.vibe;

    // Create container for layered text
    const container = new PIXI.Container();
    container.x = popup.x;
    container.y = popup.y;
    container.alpha = Math.min(1, popup.life * 1.2);
    container.scale.set(0.7 + popup.life * 0.4);

    // Shadow layer 2 (deepest)
    const s2 = new PIXI.Text(popup.text, {
      fontFamily: FONT_MSG, fontSize: comboFontSize, fill: shadow2,
      fontWeight: 'bold'
    });
    s2.anchor.set(0.5);
    s2.x = 6; s2.y = 6;
    container.addChild(s2);

    // Shadow layer 1
    const s1 = new PIXI.Text(popup.text, {
      fontFamily: FONT_MSG, fontSize: comboFontSize, fill: shadow1,
      fontWeight: 'bold'
    });
    s1.anchor.set(0.5);
    s1.x = 3; s1.y = 3;
    container.addChild(s1);

    // Main text
    const ct = new PIXI.Text(popup.text, {
      fontFamily: FONT_MSG, fontSize: comboFontSize, fill: mainColor,
      fontWeight: 'bold'
    });
    ct.anchor.set(0.5);
    container.addChild(ct);

    layers.hud.addChild(container);
  }

}

function makePaletteToggle(x, y, scale) {
  const p = P(), c = new PIXI.Container(), g = new PIXI.Graphics();
  const sc = typeof scale === 'number' ? scale : (scale ? 1.4 : 1);
  const size = Math.max(8, Math.floor(12 * sc));
  const spacing = Math.max(10, Math.floor(14 * sc));
  g.beginFill(p.grid, 0.8); g.drawRoundedRect(-spacing*1.5, -size, spacing*3, size*2, size); g.endFill();
  [p.beat, p.melody, p.vibe].forEach((col, i) => { g.beginFill(col); g.drawCircle((i-1)*spacing, 0, size/2); g.endFill(); });
  c.addChild(g); c.x = x; c.y = y; c.interactive = true; c.cursor = 'pointer';
  c.on('pointerdown', togglePalette);
  return c;
}

function makePalettePills(x, y, isMobile) {
  const c = new PIXI.Container();

  // Bigger dots for better visibility and tap targets
  const dotR = isMobile ? 8 : 10;
  const dotGap = isMobile ? 5 : 6;
  const pillGap = isMobile ? 20 : 28;
  const pillW = dotR * 2 * 3 + dotGap * 2; // Width of one pill (3 dots)

  const totalW = PALETTE_ORDER.length * pillW + (PALETTE_ORDER.length - 1) * pillGap;
  let startX = -totalW / 2;

  PALETTE_ORDER.forEach((palName, palIdx) => {
    const pal = PALETTES[palName];
    const isActive = currentPalette === palName;
    const pillX = startX + palIdx * (pillW + pillGap);

    // Create a container for each pill (clickable)
    const pill = new PIXI.Container();
    const pg = new PIXI.Graphics();

    // Three dots for each palette
    const colors = [pal.beat, pal.melody, pal.vibe];
    colors.forEach((color, i) => {
      const dx = dotR + i * (dotR * 2 + dotGap);

      // Subtle glow for active palette
      if (isActive) {
        pg.beginFill(color, 0.25);
        pg.drawCircle(dx, 0, dotR + 4);
        pg.endFill();
      }

      pg.beginFill(color, isActive ? 1 : 0.4);
      pg.drawCircle(dx, 0, dotR);
      pg.endFill();
    });

    // Invisible hit area covering the pill
    pg.beginFill(0x000000, 0.001); // Tiny alpha for hit detection
    pg.drawRect(-8, -dotR - 8, pillW + 16, dotR * 2 + 16);
    pg.endFill();

    pill.addChild(pg);
    pill.x = pillX;
    pill.interactive = true;
    pill.cursor = 'pointer';
    pill.on('pointerdown', () => {
      setPalette(palName);
      G.dirty = true;
      render();
    });

    c.addChild(pill);
  });

  c.x = x; c.y = y;
  return c;
}

function makePaletteBrush(x, y, size) {
  const p = P(), c = new PIXI.Container(), g = new PIXI.Graphics();

  // Background circle
  g.beginFill(p.grid, 0.9);
  g.lineStyle(2, p.vibe, 0.6);
  g.drawCircle(0, 0, size/2);
  g.endFill();

  // Paint brush icon using palette colors
  const s = size * 0.2;
  // Brush handle
  g.lineStyle(0);
  g.beginFill(p.dim);
  g.drawRoundedRect(-s*0.3, -s*1.2, s*0.6, s*2, 2);
  g.endFill();
  // Brush tip with gradient colors
  g.beginFill(p.beat);
  g.drawEllipse(-s*0.4, s*1.1, s*0.5, s*0.4);
  g.endFill();
  g.beginFill(p.melody);
  g.drawEllipse(0, s*1.2, s*0.5, s*0.4);
  g.endFill();
  g.beginFill(p.vibe);
  g.drawEllipse(s*0.4, s*1.0, s*0.5, s*0.4);
  g.endFill();

  c.addChild(g);
  c.x = x; c.y = y;
  c.interactive = true; c.cursor = 'pointer';
  c.on('pointerdown', () => {
    palettePickerOpen = !palettePickerOpen;
    G.dirty = true; render();
  });
  return c;
}

function renderPalettePicker() {
  const p = P();
  const isMobile = W < 500;

  // Semi-transparent backdrop
  const backdrop = new PIXI.Graphics();
  backdrop.beginFill(0x000000, 0.7);
  backdrop.drawRect(0, 0, W, H);
  backdrop.endFill();
  backdrop.interactive = true;
  backdrop.on('pointerdown', () => {
    palettePickerOpen = false;
    G.dirty = true; render();
  });
  layers.overlay.addChild(backdrop);

  // Picker panel
  const panelW = isMobile ? W - 40 : Math.min(400, W * 0.6);
  const panelH = isMobile ? 280 : 320;
  const panelX = (W - panelW) / 2;
  const panelY = (H - panelH) / 2;

  const panel = new PIXI.Graphics();
  panel.beginFill(p.bg, 0.98);
  panel.lineStyle(2, p.vibe, 0.5);
  panel.drawRoundedRect(panelX, panelY, panelW, panelH, 16);
  panel.endFill();
  panel.interactive = true; // Prevent clicks going through
  layers.overlay.addChild(panel);

  // Title
  const title = new PIXI.Text('CHOOSE PALETTE', {
    fontFamily: FONT_UI, fontSize: isMobile ? 14 : 18, fill: p.text, fontWeight: '700'
  });
  title.anchor.set(0.5);
  title.x = W/2; title.y = panelY + 30;
  layers.overlay.addChild(title);

  // Palette options
  const optionH = isMobile ? 50 : 56;
  const optionW = panelW - 40;
  const startY = panelY + 60;

  PALETTE_ORDER.forEach((palName, i) => {
    const pal = PALETTES[palName];
    const y = startY + i * (optionH + 8);
    const isActive = currentPalette === palName;

    const opt = new PIXI.Graphics();
    opt.beginFill(isActive ? pal.grid : p.grid, isActive ? 1 : 0.6);
    if (isActive) opt.lineStyle(2, pal.beat);
    opt.drawRoundedRect(panelX + 20, y, optionW, optionH, 8);
    opt.endFill();
    opt.interactive = true; opt.cursor = 'pointer';
    opt.on('pointerdown', () => {
      setPalette(palName);
      palettePickerOpen = false;
    });
    layers.overlay.addChild(opt);

    // Palette name
    const name = new PIXI.Text(pal.name, {
      fontFamily: FONT_UI, fontSize: isMobile ? 12 : 14, fill: isActive ? 0xffffff : p.dim, fontWeight: '600'
    });
    name.x = panelX + 35; name.y = y + optionH/2 - 6;
    layers.overlay.addChild(name);

    // Color swatches
    const swatchSize = isMobile ? 14 : 18;
    const swatchX = panelX + optionW - 10;
    [pal.beat, pal.melody, pal.vibe].forEach((col, j) => {
      const swatch = new PIXI.Graphics();
      swatch.beginFill(col);
      swatch.drawCircle(swatchX - j * (swatchSize + 6), y + optionH/2, swatchSize/2);
      swatch.endFill();
      layers.overlay.addChild(swatch);
    });
  });

  // Close button
  const closeBtn = new PIXI.Text('X', {
    fontFamily: FONT_UI, fontSize: 18, fill: p.dim, fontWeight: '700'
  });
  closeBtn.anchor.set(0.5);
  closeBtn.x = panelX + panelW - 20; closeBtn.y = panelY + 20;
  closeBtn.interactive = true; closeBtn.cursor = 'pointer';
  closeBtn.on('pointerdown', () => {
    palettePickerOpen = false;
    G.dirty = true; render();
  });
  layers.overlay.addChild(closeBtn);
}

  layers.overlay.addChild(bg);
  const panel = new PIXI.Graphics();

  const title = new PIXI.Text('SESSION PAUSED', { fontFamily: FONT_MSG, fontSize: 28, fill: p.text });

  layers.overlay.addChild(makeButton('RESUME', W/2, H/2, () => { resumeSession(); }, 130, 40, p.vibe));
  layers.overlay.addChild(makeButton('EXIT', W/2, H/2+50, () => { Audio.stopAll(); G.screen = 'HOME'; G.dirty = true; }, 110, 36, p.dim));
}

function renderSettings() {
  const p = P(), bg = new PIXI.Graphics();
  bg.beginFill(0, 0.9); bg.drawRect(0, 0, W, H); bg.endFill(); bg.interactive = true;
  layers.overlay.addChild(bg);

  // Responsive panel - scales with screen but has limits
  const maxW = 450, maxH = 380;
  const panelW = Math.min(maxW, W * 0.85);
  const panelH = Math.min(maxH, H * 0.55);
  const panelX = (W - panelW) / 2;
  const panelY = (H - panelH) / 2;

  // Scale factor for content
  const sc = Math.min(panelW / 300, panelH / 280);

  const panel = new PIXI.Graphics();
  panel.beginFill(p.grid); panel.lineStyle(2, p.vibe, 0.6);
  panel.drawRoundedRect(panelX, panelY, panelW, panelH, 12);
  panel.endFill();
  layers.overlay.addChild(panel);

  // Title
  const titleSize = Math.max(12, Math.round(16 * sc));
  const title = new PIXI.Text('SETTINGS', { fontFamily: FONT_UI, fontSize: titleSize, fill: p.text, fontWeight: '700' });
  title.anchor.set(0.5); title.x = W / 2; title.y = panelY + 30 * sc;
  layers.overlay.addChild(title);

  const padX = Math.round(20 * sc);
  const contentW = panelW - padX * 2;
  const labelSize = Math.max(8, Math.round(10 * sc));

  // Volume section
  const volY = panelY + 65 * sc;
  const volLabel = new PIXI.Text('VOLUME', { fontFamily: FONT_UI, fontSize: labelSize, fill: p.dim, fontWeight: '600' });
  volLabel.x = panelX + padX; volLabel.y = volY;
  layers.overlay.addChild(volLabel);

  // Volume slider
  const sliderY = volY + 28 * sc;
  const sliderH = Math.max(10, 14 * sc);
  const btnSize = Math.max(32, 38 * sc);
  const sliderW = contentW - btnSize * 2 - 30;
  const sliderX = panelX + padX;
  const currentVol = Audio.master ? Audio.master.gain.value : 0.7;

  const track = new PIXI.Graphics();
  track.beginFill(p.dim, 0.3); track.drawRoundedRect(sliderX, sliderY, sliderW, sliderH, 5); track.endFill();
  layers.overlay.addChild(track);

  const fill = new PIXI.Graphics();
  fill.beginFill(p.vibe); fill.drawRoundedRect(sliderX, sliderY, sliderW * currentVol, sliderH, 5); fill.endFill();
  layers.overlay.addChild(fill);

  // Volume buttons
  layers.overlay.addChild(makeButton('-', sliderX + sliderW + btnSize/2 + 8, sliderY + sliderH/2, () => {
    if (Audio.master) { Audio.master.gain.value = Math.max(0, Audio.master.gain.value - 0.1); G.dirty = true; }
  }, btnSize, btnSize, p.dim));
  layers.overlay.addChild(makeButton('+', sliderX + sliderW + btnSize * 1.5 + 16, sliderY + sliderH/2, () => {
    if (Audio.master) { Audio.master.gain.value = Math.min(1, Audio.master.gain.value + 0.1); G.dirty = true; }
  }, btnSize, btnSize, p.vibe));

  // Palette section
  const palY = sliderY + 55 * sc;
  const palLabel = new PIXI.Text('PALETTE', { fontFamily: FONT_UI, fontSize: labelSize, fill: p.dim, fontWeight: '600' });
  palLabel.x = panelX + padX; palLabel.y = palY;
  layers.overlay.addChild(palLabel);

  // Palette buttons
  const palBtnY = palY + 30 * sc;
  const palBtnW = Math.floor((contentW - 15) / 2);
  const palBtnH = Math.max(40, 48 * sc);
  const dotSize = Math.max(5, 6 * sc);
  const dotSpacing = Math.max(14, 18 * sc);

  Object.keys(PALETTES).forEach((key, i) => {
    const pal = PALETTES[key];
    const isActive = currentPalette === key;
    const btnX = panelX + padX + i * (palBtnW + 15) + palBtnW / 2;

    const btn = new PIXI.Container();
    const btnBg = new PIXI.Graphics();
    btnBg.beginFill(isActive ? pal.beat : p.grid, isActive ? 0.5 : 0.6);
    btnBg.lineStyle(2, isActive ? pal.vibe : p.dim, isActive ? 1 : 0.3);
    btnBg.drawRoundedRect(-palBtnW/2, -palBtnH/2, palBtnW, palBtnH, 8);
    btnBg.endFill();
    btn.addChild(btnBg);

    // Color dots
    [pal.beat, pal.melody, pal.vibe].forEach((col, j) => {
      const dot = new PIXI.Graphics();
      dot.beginFill(col); dot.drawCircle((j - 1) * dotSpacing, -8 * sc, dotSize); dot.endFill();
      btn.addChild(dot);
    });

    const nameSize = Math.max(7, 9 * sc);
    const name = new PIXI.Text(pal.name, { fontFamily: FONT_UI, fontSize: nameSize, fill: isActive ? p.text : p.dim, fontWeight: '500' });
    name.anchor.set(0.5); name.y = 10 * sc;
    btn.addChild(name);

    btn.x = btnX; btn.y = palBtnY + palBtnH/2;
    btn.interactive = true; btn.cursor = 'pointer';
    btn.on('pointerdown', () => { currentPalette = key; G.dirty = true; });
    layers.overlay.addChild(btn);
  });

  // Bottom buttons
  const btnY = panelY + panelH - 35 * sc;
  const actionBtnW = Math.floor((contentW - 15) / 2);
  const actionBtnH = Math.max(36, 44 * sc);

  layers.overlay.addChild(makeButton('PAUSE', panelX + padX + actionBtnW/2, btnY, () => {
    G.screen = 'PAUSE'; G.dirty = true;
  }, actionBtnW, actionBtnH, p.beat));

  layers.overlay.addChild(makeButton('CLOSE', panelX + padX + actionBtnW + 15 + actionBtnW/2, btnY, () => {
    resumeSession();
  }, actionBtnW, actionBtnH, p.vibe));
}

function renderMix() {
  const p = P();
  const bg = new PIXI.Graphics();
  bg.beginFill(p.bg);
  bg.drawRect(0, 0, W, H);
  bg.endFill();
  layers.overlay.addChild(bg);

  const isMobile = W < 500;
  const pad = isMobile ? 12 : 20;

  // Category colors (no orange)
  const catColors = {
    BEAT: 0xe05555,
    VIBE: 0x4caf70,
    MELODY: 0x5599e0
  };

  // Initialize state if not set
  if (!G.mixTab) G.mixTab = 'BEAT';
  if (typeof G.mixScrollY !== 'number') G.mixScrollY = 0;

  let curY = 0;

  // ========== HEADER ==========
  const headerH = isMobile ? 44 : 56;

  const title = new PIXI.Text('MIX', {
    fontFamily: FONT_UI,
    fontSize: isMobile ? 20 : 28,
    fill: 0xffffff,
    fontWeight: '800'
  });
  title.anchor.set(0.5);
  title.x = W / 2;
  title.y = headerH / 2;
  layers.overlay.addChild(title);

  // Close button
  const closeBtnSize = isMobile ? 32 : 40;
  const closeBtn = new PIXI.Graphics();
  closeBtn.beginFill(0x333333, 0.6);
  closeBtn.drawRoundedRect(0, 0, closeBtnSize, closeBtnSize, 6);
  closeBtn.endFill();
  closeBtn.x = W - closeBtnSize - pad;
  closeBtn.y = (headerH - closeBtnSize) / 2;
  closeBtn.interactive = true;
  closeBtn.cursor = 'pointer';
  closeBtn.on('pointerdown', () => { G.screen = 'PLAY'; G.dirty = true; });
  layers.overlay.addChild(closeBtn);

  const closeX = new PIXI.Text('✕', {
    fontFamily: FONT_UI,
    fontSize: isMobile ? 16 : 20,
    fill: 0x888888
  });
  closeX.anchor.set(0.5);
  closeX.x = closeBtn.x + closeBtnSize / 2;
  closeX.y = closeBtn.y + closeBtnSize / 2;
  layers.overlay.addChild(closeX);

  curY = headerH;

  // ========== SIGNAL CHAIN ==========
  const chainH = isMobile ? 50 : 60;
  const chainY = curY;
  const pillH = isMobile ? 26 : 32;
  const pillY = chainY + (chainH - pillH) / 2;

  // Get active loops per category
  const activeLoops = {
    BEAT: Audio.slots?.BEAT?.map(s => s.id) || [],
    VIBE: Audio.slots?.VIBE?.map(s => s.id) || [],
    MELODY: Audio.slots?.MELODY?.map(s => s.id) || []
  };

  let chainX = pad;

  ['BEAT', 'VIBE', 'MELODY'].forEach((cat, catIdx) => {
    const color = catColors[cat];
    const loops = activeLoops[cat];

    if (loops.length > 0) {
      // Draw active loop pills
      loops.forEach((loopId) => {
        const name = loopId.replace(/_/g, ' ').toUpperCase();
        const pillText = new PIXI.Text(name, {
          fontFamily: FONT_UI,
          fontSize: isMobile ? 9 : 11,
          fill: 0xffffff,
          fontWeight: '600'
        });
        const pillW = pillText.width + (isMobile ? 16 : 24);

        const pill = new PIXI.Graphics();
        pill.beginFill(color);
        pill.drawRoundedRect(0, 0, pillW, pillH, pillH / 2);
        pill.endFill();
        pill.x = chainX;
        pill.y = pillY;
        pill.interactive = true;
        pill.cursor = 'pointer';
        pill.on('pointerdown', () => {
          Audio.stopLoop(cat, loopId);
          G.dirty = true;
        });
        layers.overlay.addChild(pill);

        pillText.anchor.set(0.5);
        pillText.x = chainX + pillW / 2;
        pillText.y = pillY + pillH / 2;
        layers.overlay.addChild(pillText);

        chainX += pillW + 6;
      });
    } else {
      // Faint label only
      const label = new PIXI.Text(cat, {
        fontFamily: FONT_UI,
        fontSize: isMobile ? 9 : 11,
        fill: color,
        fontWeight: '500'
      });
      label.alpha = 0.4;
      label.x = chainX;
      label.y = pillY + (pillH - label.height) / 2;
      layers.overlay.addChild(label);
      chainX += label.width + 6;
    }

    // Arrow separator (except after last)
    if (catIdx < 2) {
      const arrow = new PIXI.Text('→', {
        fontFamily: FONT_UI,
        fontSize: isMobile ? 12 : 16,
        fill: 0x444444
      });
      arrow.x = chainX + 4;
      arrow.y = pillY + (pillH - arrow.height) / 2;
      layers.overlay.addChild(arrow);
      chainX += arrow.width + 12;
    }
  });

  curY = chainY + chainH;

  // ========== TRANSPORT & SOUND CONTROLS ==========
  const sliderH = isMobile ? 36 : 44;
  const sliderPad = isMobile ? 2 : 4;
  const trackH = 3;
  const knobR = 8;
  const labelW = isMobile ? 50 : 65;

  const drawGlobalSlider = (label, value, valueText, min, max, onChange) => {
    const rowY = curY;

    // Label
    const lbl = new PIXI.Text(label, {
      fontFamily: FONT_UI,
      fontSize: isMobile ? 10 : 12,
      fill: 0xffffff,
      fontWeight: '600'
    });
    lbl.x = pad;
    lbl.y = rowY + (sliderH - lbl.height) / 2;
    layers.overlay.addChild(lbl);

    // Value text
    const val = new PIXI.Text(valueText, {
      fontFamily: FONT_UI,
      fontSize: isMobile ? 10 : 12,
      fill: 0x666666,
      fontWeight: '500'
    });
    val.anchor.set(1, 0.5);
    val.x = W - pad;
    val.y = rowY + sliderH / 2;
    layers.overlay.addChild(val);

    // Slider
    const sliderX = pad + labelW;
    const sliderLen = W - pad * 2 - labelW - 40;
    const sliderY = rowY + sliderH / 2;
    const norm = (value - min) / (max - min);
    const knobX = sliderX + norm * sliderLen;

    const g = new PIXI.Graphics();
    // Track background
    g.beginFill(0x333333);
    g.drawRoundedRect(sliderX, sliderY - trackH / 2, sliderLen, trackH, 2);
    g.endFill();
    // Filled portion
    g.beginFill(0x555555);
    g.drawRoundedRect(sliderX, sliderY - trackH / 2, norm * sliderLen, trackH, 2);
    g.endFill();
    // Knob
    g.beginFill(0xffffff);
    g.drawCircle(knobX, sliderY, knobR);
    g.endFill();

    g.interactive = true;
    g.cursor = 'pointer';
    g.hitArea = new PIXI.Rectangle(sliderX - knobR, sliderY - knobR - 8, sliderLen + knobR * 2, knobR * 2 + 16);

    const updateFromEvent = (e) => {
      const local = e.data.global.x;
      const newNorm = Math.max(0, Math.min(1, (local - sliderX) / sliderLen));
      const newVal = min + newNorm * (max - min);
      onChange(newVal);
      G.dirty = true;
    };

    g.on('pointerdown', updateFromEvent);
    g.on('pointermove', (e) => { if (e.data.buttons) updateFromEvent(e); });
    layers.overlay.addChild(g);

    curY += sliderH + sliderPad;
  };

  curY += isMobile ? 6 : 10;

  // Transport controls
  drawGlobalSlider('BPM', G.bpm, G.bpm.toString(), 80, 140, (v) => Audio.setBPM(Math.round(v)));
  drawGlobalSlider('PITCH', G.pitch, (G.pitch >= 0 ? '+' : '') + G.pitch, -12, 12, (v) => Audio.setPitch(Math.round(v)));
  drawGlobalSlider('SWING', G.swing * 100, Math.round(G.swing * 100) + '%', 0, 100, (v) => Audio.setSwing(v / 100));

  curY += isMobile ? 4 : 8;

  // Sound controls
  drawGlobalSlider('TONE', G.filter, Math.round(G.filter * 100) + '%', 0, 1, (v) => Audio.setFilter(v));
  drawGlobalSlider('SPACE', G.effects, Math.round(G.effects * 100) + '%', 0, 1, (v) => Audio.setEffects(v));

  // ========== LOOP BROWSER ==========
  curY += isMobile ? 10 : 16;

  const tabH = isMobile ? 36 : 42;
  const tabW = (W - pad * 2) / 3;

  // Tabs
  ['BEAT', 'VIBE', 'MELODY'].forEach((cat, i) => {
    const isActive = G.mixTab === cat;
    const color = catColors[cat];

    const tab = new PIXI.Graphics();
    if (isActive) {
      tab.beginFill(color);
    } else {
      tab.beginFill(0x1a1a1a);
    }
    tab.drawRoundedRect(0, 0, tabW - 4, tabH, 6);
    tab.endFill();
    tab.x = pad + i * tabW + 2;
    tab.y = curY;
    tab.interactive = true;
    tab.cursor = 'pointer';
    tab.on('pointerdown', () => {
      G.mixTab = cat;
      G.mixScrollY = 0; // Reset scroll on tab change
      G.dirty = true;
    });
    layers.overlay.addChild(tab);

    const tabText = new PIXI.Text(cat, {
      fontFamily: FONT_UI,
      fontSize: isMobile ? 11 : 13,
      fill: isActive ? 0xffffff : 0x555555,
      fontWeight: '700'
    });
    tabText.anchor.set(0.5);
    tabText.x = tab.x + (tabW - 4) / 2;
    tabText.y = curY + tabH / 2;
    layers.overlay.addChild(tabText);
  });

  curY += tabH + (isMobile ? 6 : 10);

  // Loop list area
  const listAreaY = curY;
  const listAreaH = H - curY - (isMobile ? 8 : 12);
  const loopRowH = 44;
  const loopRowPad = isMobile ? 4 : 6;
  const currentCat = G.mixTab;
  const currentColor = catColors[currentCat];
  const currentActiveLoops = activeLoops[currentCat];

  // Get all loops for current category
  let allLoops = [];
  if (currentCat === 'BEAT') {
    allLoops = Object.keys(Audio.patterns?.BEAT || {});
  } else if (currentCat === 'MELODY') {
    allLoops = Object.keys(Audio.patterns?.MELODY || {});
  } else if (currentCat === 'VIBE') {
    allLoops = Object.keys(Audio.vibeEffects || {});
  }

  // Calculate content height and clamp scroll
  const contentH = allLoops.length * (loopRowH + loopRowPad);
  const maxScroll = Math.max(0, contentH - listAreaH);
  G.mixScrollY = Math.max(0, Math.min(maxScroll, G.mixScrollY));

  // Create scroll container with mask
  const scrollContainer = new PIXI.Container();
  scrollContainer.y = listAreaY;
  layers.overlay.addChild(scrollContainer);

  // Mask for clipping
  const mask = new PIXI.Graphics();
  mask.beginFill(0xffffff);
  mask.drawRect(0, listAreaY, W, listAreaH);
  mask.endFill();
  layers.overlay.addChild(mask);
  scrollContainer.mask = mask;

  // Scroll hit area for drag
  const scrollHit = new PIXI.Graphics();
  scrollHit.beginFill(0x000000, 0.001); // Nearly invisible
  scrollHit.drawRect(0, 0, W, listAreaH);
  scrollHit.endFill();
  scrollHit.interactive = true;
  scrollHit.cursor = 'grab';
  scrollContainer.addChild(scrollHit);

  let dragStartY = 0;
  let dragStartScroll = 0;
  let isDragging = false;

  scrollHit.on('pointerdown', (e) => {
    isDragging = true;
    dragStartY = e.data.global.y;
    dragStartScroll = G.mixScrollY;
    scrollHit.cursor = 'grabbing';
  });

  scrollHit.on('pointermove', (e) => {
    if (!isDragging) return;
    const dy = dragStartY - e.data.global.y;
    G.mixScrollY = Math.max(0, Math.min(maxScroll, dragStartScroll + dy));
    G.dirty = true;
  });

  scrollHit.on('pointerup', () => { isDragging = false; scrollHit.cursor = 'grab'; });
  scrollHit.on('pointerupoutside', () => { isDragging = false; scrollHit.cursor = 'grab'; });

  // Render all loop rows
  allLoops.forEach((loopId, i) => {
    const isActive = currentActiveLoops.includes(loopId);
    const rowY = i * (loopRowH + loopRowPad) - G.mixScrollY;

    // Skip rows outside visible area
    if (rowY + loopRowH < 0 || rowY > listAreaH) return;

    const name = loopId.replace(/_/g, ' ').toUpperCase();

    const row = new PIXI.Graphics();
    if (isActive) {
      row.beginFill(currentColor);
    } else {
      row.beginFill(0x1a1a1a);
    }
    row.drawRoundedRect(pad, rowY, W - pad * 2, loopRowH, 8);
    row.endFill();
    row.interactive = true;
    row.cursor = 'pointer';
    row.on('pointerdown', (e) => {
      // Only toggle if not dragging
      if (Math.abs(G.mixScrollY - dragStartScroll) < 5) {
        if (isActive) {
          Audio.stopLoop(currentCat, loopId);
        } else {
          Audio.startLoop(currentCat, loopId);
        }
        G.dirty = true;
      }
    });
    scrollContainer.addChild(row);

    // Loop name
    const rowText = new PIXI.Text(name, {
      fontFamily: FONT_UI,
      fontSize: isMobile ? 12 : 14,
      fill: isActive ? 0xffffff : currentColor,
      fontWeight: '600'
    });
    rowText.x = pad + 14;
    rowText.y = rowY + (loopRowH - rowText.height) / 2;
    scrollContainer.addChild(rowText);

    // Active indicator dot
    if (isActive) {
      const dot = new PIXI.Graphics();
      dot.beginFill(0xffffff);
      dot.drawCircle(W - pad - 18, rowY + loopRowH / 2, 4);
      dot.endFill();
      scrollContainer.addChild(dot);
    }
  });

  // Scroll indicator (if content overflows)
  if (contentH > listAreaH) {
    const scrollBarH = Math.max(20, (listAreaH / contentH) * listAreaH);
    const scrollBarY = listAreaY + (G.mixScrollY / maxScroll) * (listAreaH - scrollBarH);
    const scrollBar = new PIXI.Graphics();
    scrollBar.beginFill(0x444444, 0.5);
    scrollBar.drawRoundedRect(W - pad - 4, scrollBarY, 4, scrollBarH, 2);
    scrollBar.endFill();
    layers.overlay.addChild(scrollBar);
  }
}

function makeButton(text, x, y, action, w, h, borderColor) {
  const p = P(), c = new PIXI.Container(), bg = new PIXI.Graphics();
  bg.beginFill(0, 0.25); bg.drawRoundedRect(-w/2+2, -h/2+2, w, h, 6); bg.endFill();
  bg.beginFill(p.grid, 0.9); bg.lineStyle(2, borderColor || p.vibe); bg.drawRoundedRect(-w/2, -h/2, w, h, 6); bg.endFill();
  c.addChild(bg);
  const lbl = new PIXI.Text(text, { fontFamily: FONT_UI, fontSize: Math.min(12, h*0.32), fill: p.text, fontWeight: '700' });
  lbl.anchor.set(0.5); c.addChild(lbl);
  c.x = x; c.y = y; c.interactive = true; c.cursor = 'pointer';
  c.on('pointerdown', () => c.scale.set(0.92));
  c.on('pointerup', () => { c.scale.set(1); action(); });
  c.on('pointerupoutside', () => c.scale.set(1));
  return c;
}

// Game logic

// Start session with tutorial check for first-time players
async function startSessionWithTutorial() {
  const tutorialCompleted = localStorage.getItem('songsugar_tutorial_completed');
  await startSession();

  // Activate tutorial for first-time players
  if (!tutorialCompleted) {
    TutorialManager.start();
  }
}

async function startSession() {
  // Stop any existing audio first
  Audio.stopAll();

  await Audio.init();

  // Ensure AudioContext is running (user interaction just happened on button press)
  if (Tone.context.state !== 'running') {
    await Tone.context.resume();
  }

  // Initialize audio controls to defaults
  G.bpm = 115; G.pitch = 0;
  G.mix = { BEAT: 0.8, VIBE: 0.7, MELODY: 0.8 };
  G.filter = 1.0; G.effects = 0.5;
  Audio.setBPM(G.bpm);
  Audio.setPitch(G.pitch);
  CATS.forEach(cat => Audio.setMix(cat, G.mix[cat]));
  Audio.setFilter(G.filter);
  Audio.setEffects(G.effects);

  G.score = 0; G.combo = 0; G.lastCollapseTime = 0;
  G.res = { BEAT: 0, VIBE: 0, MELODY: 0 };
  G.layers = { BEAT: [], VIBE: [], MELODY: [] };
  G.loops = JSON.parse(JSON.stringify(LOOPS));
  G.over = false; G.paused = false; G.collapsing = false; G.needsSpawn = false;
  G.clusters = []; G.clusterCache = { inCluster: new Map(), tileSets: new Map() };
  G.frozen = false; G.comboPopups = []; G.doubleScore = false;
  G.speedBoost = { active: false, multiplier: 1, endTime: 0 }; // Reset speed boost
  G.dangerLevel = 0; G.sessionEndingAt = 0; // Reset danger/wobble state
  G.sessionOverShown = false; G.pieceVisualY = 0; G.lastRender = 0;
  // Reset tutorial state
  G.tutorial = { active: false, step: 0, stats: { tapCount: 0, moveCount: 0, rotateCount: 0, dropCount: 0, clustersCleared: 0, loopToggled: false } };

  // Properly destroy all particles
  while (particles.length) {
    const p = particles.pop();
    layers.fx.removeChild(p);
    p.destroy();
  }

  // Clear graphics pool if too large (memory cleanup)
  while (gfxPool.length > MAX_POOL_SIZE) {
    const g = gfxPool.pop();
    g.destroy();
  }

  initGrid();
  spawn();
  G.screen = 'PLAY';
  G.dirty = true;

  // Start gentle intro pad - will be replaced when user adds first loop
  Audio.startIntro();
  Tone.Transport.start();
}

function spawn() {
  G.piece = G.next || makePiece();
  G.next = makePiece();
  G.pieceVisualY = G.piece.y; // Reset visual Y to match grid position
  if (!canPlace(G.piece, G.piece.x, G.piece.y)) {
    // Tutorial safe environment: clear danger rows instead of game over
    if (G.tutorial.active) {
      TutorialManager.clearDangerRows();
      // Try again after clearing
      if (canPlace(G.piece, G.piece.x, G.piece.y)) {
        return; // Successfully recovered
      }
    }
    // Start session ending sequence with delay for dramatic effect
    G.over = true; G.piece = null;
    G.dangerLevel = 3; // Maximum wobble
    G.sessionEndingAt = Date.now() + 3000; // 3 second delay with wobble before showing overlay
    Audio.stopAll();
    // Don't show overlay yet - will be triggered in game loop after delay
  }
}

// Calculate danger level based on highest tile in grid
function updateDangerLevel() {
  let highestRow = ROWS; // Start at bottom (safe)
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (G.grid[r][c]) { highestRow = Math.min(highestRow, r); break; }
    }
  }
  // Danger levels: row 0-1 = level 3, row 2 = level 2, row 3 = level 1, else 0
  const prevLevel = G.dangerLevel;
  if (highestRow <= 1) G.dangerLevel = 3;
  else if (highestRow === 2) G.dangerLevel = 2;
  else if (highestRow === 3) G.dangerLevel = 1;
  else G.dangerLevel = 0;

  // Play danger sound when entering danger zone
  if (G.dangerLevel >= 2 && prevLevel < 2) {
    Audio.playDanger();
  }

  // Recovery: if danger cleared during wobble period, cancel game over
  // Need row 2+ to be clear (highestRow >= 2) so new piece can spawn
  if (G.over && G.sessionEndingAt > 0 && !G.sessionOverShown && highestRow >= 2) {
    G.over = false;
    G.sessionEndingAt = 0;
    G.dangerLevel = 0; // Stop wobble immediately on recovery
    // Resume audio
    if (Audio.ready) {
      CATS.forEach(cat => G.layers[cat].forEach(l => Audio.startLoop(cat, l.id)));
    }
    // Spawn a new piece to continue playing
    G.needsSpawn = true;
  }
}

function showSessionOver() {
  G.sessionOverShown = true;
  Audio.playGameOver();
  const p = P(), bg = new PIXI.Graphics();
  bg.beginFill(0, 0.85); bg.drawRect(0, 0, W, H); bg.endFill(); bg.interactive = true;
  layers.overlay.addChild(bg);
  const panel = new PIXI.Graphics();
  panel.beginFill(p.grid); panel.lineStyle(3, p.beat); panel.drawRoundedRect(W/2-110, H/2-120, 220, 240, 12); panel.endFill();
  layers.overlay.addChild(panel);
  const title = new PIXI.Text('SESSION OVER', { fontFamily: FONT_MSG, fontSize: 28, fill: p.beat });
  title.anchor.set(0.5); title.x = W/2; title.y = H/2 - 85;
  layers.overlay.addChild(title);
  const sc = new PIXI.Text(G.score.toLocaleString(), { fontFamily: FONT_UI, fontSize: 32, fill: p.social[1], fontWeight: '800' });
  sc.anchor.set(0.5); sc.x = W/2; sc.y = H/2 - 40;
  layers.overlay.addChild(sc);
  layers.overlay.addChild(makeButton('NEW SESSION', W/2, H/2+20, () => { G.sessionOverShown = false; layers.overlay.removeChildren(); startSession(); }, 150, 44, p.beat));
  layers.overlay.addChild(makeButton('HOME', W/2, H/2+75, () => { G.sessionOverShown = false; layers.overlay.removeChildren(); G.screen = 'HOME'; G.dirty = true; }, 120, 38, p.dim));
}

function toggleLoop(cat, id) {
  const active = G.layers[cat], idx = active.findIndex(l => l.id === id);
  if (idx >= 0) { Audio.stopLoop(cat, id); active.splice(idx, 1); }
  else if (active.length < 3) {
    const loop = G.loops[cat].find(l => l.id === id);
    if (loop?.unlocked) { Audio.startLoop(cat, id); active.push(loop); }
  }
  // Tutorial: record loop toggle
  if (G.tutorial.active) TutorialManager.recordLoopToggle();
}

function pauseSession() {
  G.paused = true;
  G.screen = 'PAUSE';
  // Pause transport to stop all loops
  if (Audio.ready) {
    try { Tone.Transport.pause(); } catch(e) {}
  }
  G.dirty = true;
}

function resumeSession() {
  G.paused = false;
  G.screen = 'PLAY';
  // Resume transport to restart loops
  if (Audio.ready) {
    try { Tone.Transport.start(); } catch(e) {}
  }
  G.dirty = true;
}

function unlock(cat, id) {
  if (G.res[cat] < G.unlockCost) return;
  const loop = G.loops[cat].find(l => l.id === id);
  if (loop && !loop.unlocked) {
    G.res[cat] -= G.unlockCost;
    loop.unlocked = true;
    // Visual unlock effect
    showUnlockEffect(cat, loop.name);
    // Play unlock sound
    if (Audio.ready) {
      try { Audio.sfx.combo.triggerAttackRelease(['C5', 'E5', 'G5'], '8n', Tone.now(), 0.4); } catch(e) {}
    }
    G.dirty = true;
  }
}

// Unlock popup effect
function showUnlockEffect(cat, loopName) {
  const color = getColor(cat);
  G.comboPopups.push({
    text: 'UNLOCKED!',
    x: W / 2,
    y: H / 2 - 30,
    life: 1.5,
    color: color
  });
  G.comboPopups.push({
    text: loopName,
    x: W / 2,
    y: H / 2 + 10,
    life: 1.5,
    color: P().social[1]
  });
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// Input
let touchX, touchY;
function onKey(e) {
  const keyTime = performance.now();
  console.log('KEY EVENT:', e.key, 'at', keyTime.toFixed(1));
  if (!['ArrowLeft','ArrowRight','ArrowDown','ArrowUp',' ','r','R'].includes(e.key)) return;
  e.preventDefault();
  if (G.screen !== 'PLAY' || G.paused || G.over || G.collapsing || !G.piece) return;

  if (e.key === 'ArrowLeft' && canPlace(G.piece, G.piece.x-1, G.piece.y)) {
    G.piece.x--; Audio.playMove();
    if (G.tutorial.active) TutorialManager.recordMove();
  }
  else if (e.key === 'ArrowRight' && canPlace(G.piece, G.piece.x+1, G.piece.y)) {
    G.piece.x++; Audio.playMove();
    if (G.tutorial.active) TutorialManager.recordMove();
  }
  else if (e.key === 'ArrowDown') {
    while (canPlace(G.piece, G.piece.x, G.piece.y+1)) G.piece.y++;
    G.pieceVisualY = G.piece.y; Audio.playDrop();
    if (G.tutorial.active) TutorialManager.recordDrop();
  }
  else if (['ArrowUp',' ','r','R'].includes(e.key)) {
    if (rotate() && G.tutorial.active) TutorialManager.recordRotate();
  }
  G.dirty = true;
}

function onTouchStart(e) { if (e.touches.length === 1) { touchX = e.touches[0].clientX; touchY = e.touches[0].clientY; } }
function onTouchEnd(e) {
  if (G.screen !== 'PLAY' || !touchX) return;
  const endX = e.changedTouches[0].clientX, endY = e.changedTouches[0].clientY;
  const dx = endX - touchX, dy = endY - touchY;

  if (!G.collapsing && !G.paused && !G.over && G.piece) {
    // Small tap = rotate if on piece area, otherwise let PIXI handle grid taps
    if (Math.abs(dx) < 20 && Math.abs(dy) < 20) {
      // Check if tap is on the falling piece
      const pieceScreenY = gridY + G.pieceVisualY * tileSize;
      const pieceMinX = gridX + G.piece.x * tileSize - 10;
      const pieceMaxX = gridX + (G.piece.x + Math.max(...G.piece.tiles.map(t => t.dx)) + 1) * tileSize + 10;
      const pieceMinY = pieceScreenY - 10;
      const pieceMaxY = pieceScreenY + (Math.max(...G.piece.tiles.map(t => t.dy)) + 1) * tileSize + 10;

      if (endX >= pieceMinX && endX <= pieceMaxX && endY >= pieceMinY && endY <= pieceMaxY) {
        if (rotate() && G.tutorial.active) TutorialManager.recordRotate();
        G.dirty = true;
      }
      // Grid taps are handled by PIXI
    } else if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 25) {
      // Horizontal swipe = move piece
      if (dx > 0 && canPlace(G.piece, G.piece.x+1, G.piece.y)) {
        G.piece.x++; Audio.playMove();
        if (G.tutorial.active) TutorialManager.recordMove();
      }
      else if (dx < 0 && canPlace(G.piece, G.piece.x-1, G.piece.y)) {
        G.piece.x--; Audio.playMove();
        if (G.tutorial.active) TutorialManager.recordMove();
      }
      G.dirty = true;
    } else if (dy > 35) {
      // Swipe down = hard drop
      while (canPlace(G.piece, G.piece.x, G.piece.y+1)) G.piece.y++;
      G.pieceVisualY = G.piece.y;
      Audio.playDrop();
      if (G.tutorial.active) TutorialManager.recordDrop();
      G.dirty = true;
    }
  }
  touchX = touchY = null;
}

// Speed boost function - triggers after big clusters to drive excitement
function triggerSpeedBoost(multiplier, duration) {
  G.speedBoost.active = true;
  G.speedBoost.multiplier = Math.max(G.speedBoost.multiplier, multiplier); // Keep higher boost
  G.speedBoost.endTime = Math.max(G.speedBoost.endTime, Date.now() + duration);
}

// Game loop - optimized with smooth continuous falling and error handling
let lastTime = 0;
const FALL_SPEED = 1.2; // Grid cells per second (normal speed)
const FALL_SPEED_FROZEN = 0.4; // Slower when frozen
let lastVisualY = 0;
let frameCount = 0;

function gameLoop(delta) {
  try {
    const now = performance.now(), dt = Math.min(now - lastTime, 50) / 1000; // dt in seconds
    lastTime = now;
    frameCount++;

    // Periodic memory cleanup (every ~10 seconds at 60fps)
    if (frameCount % 600 === 0) {
      // Trim graphics pool if oversized
      while (gfxPool.length > MAX_POOL_SIZE) {
        const g = gfxPool.pop();
        try { g.destroy(); } catch(e) {}
      }
      // Audio voice cleanup to prevent accumulation
      if (Audio.cleanup) Audio.cleanup();
    }

    // Update particles - only when we have some
    const hasParticles = particles.length > 0 || G.comboPopups.length > 0 || G.shake.active;
    if (hasParticles) updateParticles();

    // Check and update speed boost
    if (G.speedBoost.active && Date.now() >= G.speedBoost.endTime) {
      G.speedBoost.active = false;
      G.speedBoost.multiplier = 1;
      G.dirty = true;
    }

    // Smooth continuous falling
    if (G.screen === 'PLAY' && !G.paused && !G.over && !G.collapsing && G.piece) {
      let speed = G.frozen ? FALL_SPEED_FROZEN : FALL_SPEED;
      // Apply speed boost
      if (G.speedBoost.active) {
        speed *= G.speedBoost.multiplier;
      }
      const fallAmount = speed * dt;
      let targetVisualY = G.pieceVisualY + fallAmount;

      // Check if we can move to next row
      const canMoveDown = canPlace(G.piece, G.piece.x, G.piece.y + 1);

      if (canMoveDown) {
        // Can move down - allow visual to progress
        if (targetVisualY >= G.piece.y + 1) {
          G.piece.y++;
        }
        // Clamp visual to not exceed current grid position + 1
        G.pieceVisualY = Math.min(targetVisualY, G.piece.y + 0.99);
      } else {
        // Can't move down - clamp visual to current position and land
        if (G.pieceVisualY >= G.piece.y) {
          G.pieceVisualY = G.piece.y;
          place();
          G.piece = null;
          G.needsSpawn = true; // Flag for spawn instead of setTimeout
        } else {
          // Still catching up to grid position
          G.pieceVisualY = Math.min(targetVisualY, G.piece.y);
        }
      }

      // Only mark dirty if visual position changed enough to matter (more than 0.5 pixels)
      if (Math.abs(G.pieceVisualY - lastVisualY) * tileSize > 0.5) {
        G.dirty = true;
        lastVisualY = G.pieceVisualY;
      }
    }

    // Check and reset freeze state
    if (G.frozen && Date.now() >= G.freezeEnd) {
      G.frozen = false;
      G.dirty = true;
    }

    // Check for session ending after wobble delay
    if (G.over && G.sessionEndingAt > 0 && !G.sessionOverShown) {
      G.dirty = true; // Keep rendering wobble
      // Check for recovery BEFORE ending game
      updateDangerLevel();
      // Only end if still G.over after recovery check
      if (G.over && Date.now() >= G.sessionEndingAt) {
        G.sessionEndingAt = 0;
        showSessionOver();
      }
    }

    // Spawn new piece when ready (including after recovery)
    if (G.screen === 'PLAY' && !G.paused && !G.over && !G.collapsing && !G.piece) {
      G.needsSpawn = false;
      spawn();
    }

    // Render at ~60fps when needed
    const timeSinceRender = now - G.lastRender;
    // MIX screen needs continuous render for beat-synced pulse effect
    const needsRender = G.dirty || hasParticles || (G.frozen && Date.now() < G.freezeEnd) || G.screen === 'HOME' || G.screen === 'LOADING' || G.screen === 'MIX';

    if (needsRender && timeSinceRender > 16) {
      G.lastRender = now;
      render();
    }
  } catch (err) {
    console.error('Game loop error:', err);
    // Try to recover by resetting state
    G.collapsing = false;
    G.dirty = true;
  }
}

init();
